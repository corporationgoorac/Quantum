<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#121212">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Quantum | Profile Settings</title>
    
    <script src="config.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="components/theme.js"></script>

    <script src="components/imagePicker.js" defer></script>
    <script type="module" src="components/presence.js"></script>
    <script src="components/chatLoader.js" defer></script>
    <chat-loader></chat-loader>

    <style>
        :root { 
            --bg: #121212; 
            --surface: #262626; 
            --accent: #0095F6; 
            --text-main: #FAFAFA;
            --text-dim: #A8A8A8;
            --border: #333333;
            --error: #ff453a;
            --success: #30d158;
            --glass: rgba(18, 18, 18, 0.85);
        }
        
        body { 
            background: var(--bg);
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif; 
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* Fixed Header */
        .nav-header {
            position: fixed; top: 0; z-index: 100;
            width: 100%; max-width: 440px;
            background: var(--glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: space-between;
            padding: calc(12px + env(safe-area-inset-top)) 24px 12px; 
            box-sizing: border-box;
            border-bottom: 1px solid var(--border);
        }

        .container {
            width: 100%; max-width: 440px; 
            padding: calc(90px + env(safe-area-inset-top)) 24px 120px 24px; 
            box-sizing: border-box;
        }

        .back-link {
            background: transparent; border: none; color: var(--text-main);
            width: 32px; height: 32px; display: flex; align-items: center; cursor: pointer;
        }
        .page-title { font-size: 0.95rem; font-weight: 700; letter-spacing: -0.01em; text-transform: uppercase; }

        /* Profile Hero */
        .profile-hero {
            display: flex; flex-direction: column; align-items: center; 
            margin: 20px 0 25px 0;
        }
        .pfp-wrapper {
            position: relative; width: 100px; height: 100px; cursor: pointer;
        }
        .pfp-image {
            width: 100%; height: 100%; border-radius: 28px; /* Squircle style consistent with app */
            object-fit: cover; border: 1px solid var(--border); background: var(--surface);
        }
        .pfp-edit-btn {
            position: absolute; bottom: -5px; right: -5px;
            background: var(--accent); color: var(--bg); border-radius: 50%;
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border: 3px solid var(--bg);
        }
        .pfp-edit-btn svg { width: 14px; height: 14px; }

        .id-badge {
            background: var(--surface); color: var(--text-dim);
            padding: 4px 10px; border-radius: 6px; font-size: 0.65rem;
            font-weight: 800; letter-spacing: 0.05em; margin-top: 15px;
            border: 1px solid var(--border);
        }
        #display-id { color: var(--text-main); }

        /* Form Inputs */
        .form-group { margin-bottom: 20px; }
        .field-label {
            display: block; font-size: 0.65rem; font-weight: 700;
            color: var(--text-dim); margin-bottom: 8px;
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .input-box {
            width: 100%; background: var(--surface); border: 1px solid var(--border);
            padding: 16px; border-radius: 12px; color: var(--text-main);
            font-size: 0.9rem; outline: none; box-sizing: border-box;
            transition: 0.2s;
        }
        .input-box:focus { border-color: var(--accent); }

        #status { font-size: 0.75rem; margin-top: 8px; font-weight: 600; height: 1rem; }

        /* Fixed Bottom Action Dock */
        .action-dock {
            position: fixed; bottom: 0; width: 100%; max-width: 440px;
            background: linear-gradient(to top, var(--bg) 70%, transparent);
            padding: 20px 24px calc(30px + env(safe-area-inset-bottom)); 
            box-sizing: border-box; z-index: 100;
        }

        .btn-save {
            background: var(--text-main); color: var(--bg); border: none;
            width: 100%; padding: 18px; border-radius: 14px;
            font-weight: 800; font-size: 1rem; cursor: pointer;
            box-shadow: 0 10px 20px rgba(255,255,255,0.05);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: none;
        }
        .btn-save:active { transform: scale(0.97); }
        .btn-save:disabled { opacity: 0.4; filter: grayscale(1); }

        /* Toggle Switch Settings */
        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-top: 1px solid var(--border); margin-top: 10px; }
        .setting-info { display: flex; flex-direction: column; gap: 4px; max-width: 75%; }
        .setting-title { font-size: 0.85rem; font-weight: 600; color: var(--text-main); }
        .setting-desc { font-size: 0.65rem; color: var(--text-dim); line-height: 1.4; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: var(--border); transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: var(--text-main); transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }

        svg { fill: currentColor; }
    </style>
</head>
<body>

<image-picker id="setup-image-picker"></image-picker>

<div class="nav-header">
    <button class="back-link" onclick="history.back()">
        <svg width="24" height="24" viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
    </button>
    <span class="page-title">Profile Settings</span>
    <div style="width: 32px;"></div> 
</div>

<div class="container" id="mainContainer">
    <div class="profile-hero">
        <div class="pfp-wrapper" onclick="changePFP()">
            <img id="user-pfp" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" class="pfp-image">
            <div class="pfp-edit-btn">
                <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
            </div>
        </div>
        <div class="id-badge">Network ID: <span id="display-id">--------</span></div>
    </div>

    <div class="form-group">
        <label class="field-label">Display Name</label>
        <input type="text" id="full-name" class="input-box" placeholder="Your name">
    </div>

    <div class="form-group">
        <label class="field-label">Username</label>
        <input type="text" id="username" class="input-box" placeholder="@username" autocomplete="off">
        <div id="status"></div>
    </div>

    <div class="form-group">
        <label class="field-label">Directive (Bio)</label>
        <textarea id="bio" class="input-box" placeholder="System bio..." rows="3" style="resize: none;"></textarea>
    </div>

    <div class="setting-row">
        <div class="setting-info">
            <span class="setting-title">Profile Discoverability</span>
            <span class="setting-desc">When enabled, users can easily find you via search. Otherwise, your exact Network ID is required to locate you.</span>
        </div>
        <label class="switch">
            <input type="checkbox" id="search-result-toggle" checked>
            <span class="slider"></span>
        </label>
    </div>
</div>

<div class="action-dock">
    <button id="launchBtn" class="btn-save">Save Changes</button>
</div>

<script>
    // --- FIREBASE INIT ---
    if (typeof window.initFirebaseCore === 'function') {
        window.initFirebaseCore();
    } else if (!firebase.apps.length && window.firebaseConfig) {
        firebase.initializeApp(window.firebaseConfig);
    }
    
    const auth = firebase.auth();
    const db = firebase.firestore();

    let activeUser = null;
    let finalGooracID = null;
    let currentSavedUsername = "";
    let currentPhotoURL = "";

    // The required default image URL
    const DEFAULT_PFP_URL = "https://fabulouspic.com/wp-content/uploads/2024/08/a-black-and-white-circle-with-stars-on-it.jpg";

    const userInp = document.getElementById('username');
    const statusMsg = document.getElementById('status');
    const launchBtn = document.getElementById('launchBtn');

    // --- 0ms PRE-LOAD LOGIC ---
    const initialCache = JSON.parse(localStorage.getItem('goorac_profile'));
    if (initialCache) {
        populateUI(initialCache, false);
    }

    function populateUI(data, showButton = true) {
        document.getElementById('full-name').value = data.name || "";
        document.getElementById('username').value = data.username || "";
        document.getElementById('bio').value = data.bio || "";
        document.getElementById('display-id').innerText = data.gooracNumber || "--------";
        
        // Populate the real-time status of the search toggle (defaults ON for new users)
        const searchToggle = document.getElementById('search-result-toggle');
        if (searchToggle) {
            searchToggle.checked = data.searchResult !== false; 
        }

        // If data.photoURL exists, use it. If not, use the specific stars image.
        const src = data.photoURL || DEFAULT_PFP_URL;
        document.getElementById('user-pfp').src = src;
        
        currentPhotoURL = src;
        finalGooracID = data.gooracNumber;
        currentSavedUsername = data.username;
        
        if (showButton) launchBtn.style.display = "block";
    }

    function resetToAuthDefaults(user) {
        document.getElementById('full-name').value = user.displayName || "";
        // Logic: Use user.photoURL if available. If email login (no pic), use specific stars image.
        const picToUse = user.photoURL || DEFAULT_PFP_URL;
        document.getElementById('user-pfp').src = picToUse;
        currentPhotoURL = picToUse;
        launchBtn.style.display = "none";
    }

    const picker = document.getElementById('setup-image-picker');
    if(picker) {
        picker.addEventListener('image-uploaded', (e) => {
            currentPhotoURL = e.detail.url;
            document.getElementById('user-pfp').src = currentPhotoURL;
        });
    }

    function changePFP() { if(picker) picker.openPicker(); }

    auth.onAuthStateChanged((user) => {
        if (user) {
            activeUser = user;
            const localProfile = JSON.parse(localStorage.getItem('goorac_profile'));
            if (localProfile && localProfile.uid === user.uid) {
                populateUI(localProfile, true);
            } else {
                localStorage.removeItem('goorac_profile');
                resetToAuthDefaults(user);
            }
            syncWithCloud(user);
        } else {
            window.location.href = "login.html";
        }
    });

    async function syncWithCloud(user) {
        try {
            const doc = await db.collection("users").doc(user.uid).get();
            if (doc.exists) {
                const cloudData = doc.data();
                localStorage.setItem('goorac_profile', JSON.stringify(cloudData));
                populateUI(cloudData, true);
            } else {
                if (!finalGooracID) finalGooracID = Math.floor(1000000000 + Math.random() * 9000000000);
                document.getElementById('display-id').innerText = finalGooracID;
                document.getElementById('search-result-toggle').checked = true;
                launchBtn.style.display = "block";
            }
        } catch (error) { console.error("Cloud Sync failed:", error); }
    }

    userInp.addEventListener('input', async () => {
        const val = userInp.value.toLowerCase().trim().replace(/[^a-z0-9_]/g, '');
        userInp.value = val;

        if (val.length < 3) {
            statusMsg.innerHTML = "Username too short";
            statusMsg.style.color = "var(--text-dim)";
            return;
        }

        if (currentSavedUsername && val === currentSavedUsername) {
            statusMsg.innerHTML = "✓ Active Identity";
            statusMsg.style.color = "var(--success)";
            launchBtn.disabled = false;
            return;
        }

        try {
            const query = await db.collection("users").where("username", "==", val).get();
            if (query.empty) {
                statusMsg.innerHTML = "✓ Available";
                statusMsg.style.color = "var(--success)";
                launchBtn.disabled = false;
            } else {
                statusMsg.innerHTML = "✕ Unavailable";
                statusMsg.style.color = "var(--error)";
                launchBtn.disabled = true;
            }
        } catch(e) { console.warn("Validation error"); }
    });

    launchBtn.onclick = async () => {
        const originalText = launchBtn.innerText;
        launchBtn.innerText = "Synchronizing...";
        launchBtn.disabled = true;

        // Ensure currentPhotoURL falls back to the default if empty before saving
        const finalPhoto = currentPhotoURL || DEFAULT_PFP_URL;

        const profileData = {
            uid: activeUser.uid,
            gooracNumber: finalGooracID,
            name: document.getElementById('full-name').value,
            username: userInp.value,
            bio: document.getElementById('bio').value,
            photoURL: finalPhoto,
            searchResult: document.getElementById('search-result-toggle').checked, // Capture real-time toggle value
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            localStorage.setItem('goorac_profile', JSON.stringify(profileData));
            await db.collection("users").doc(activeUser.uid).set(profileData, { merge: true });
            await activeUser.updateProfile({
                displayName: profileData.name,
                photoURL: finalPhoto
            });
            window.location.href = "home.html";
        } catch (e) {
            alert("Save Error: " + e.message);
            launchBtn.disabled = false;
            launchBtn.innerText = originalText;
        }
    };
</script>
</body>
</html>
