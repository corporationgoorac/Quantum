<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Goorac | Quantum Bites</title>
    
    <script src="config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script src="components/navbar.js" defer></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons-Round" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --accent: #00d2ff;
            --danger: #ff4444;
            --border: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            background-color: var(--bg); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0; 
            overflow: hidden; /* Lock body for scroll-snapping */
        }

        /* HEADER */
        header {
            position: fixed; top: 0; width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            padding: max(15px, env(safe-area-inset-top)) 20px 25px; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 1000; pointer-events: none;
        }
        .header-title { 
            font-size: 1.5rem; font-weight: 900; letter-spacing: -1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8); pointer-events: auto;
        }
        .search-icon-btn {
            color: #fff; font-size: 30px; cursor: pointer; pointer-events: auto;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8); transition: transform 0.2s;
        }
        .search-icon-btn:active { transform: scale(0.85); color: var(--accent); }

        /* BITES FEED (Scroll Snapping) */
        #bites-feed-container {
            height: 100vh; width: 100vw;
            overflow-y: scroll; scroll-snap-type: y mandatory;
            scrollbar-width: none; -ms-overflow-style: none;
            background: var(--bg);
        }
        #bites-feed-container::-webkit-scrollbar { display: none; }

        /* BITE CARD */
        .bite-card {
            height: 100vh; width: 100vw;
            scroll-snap-align: start; scroll-snap-stop: always;
            position: relative; display: flex; flex-direction: column;
            justify-content: flex-end; padding: 20px; 
            padding-bottom: calc(90px + env(safe-area-inset-bottom));
            background-size: cover; background-position: center;
            background-color: #050505;
            border-bottom: 1px solid var(--border);
        }
        .bite-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 40%, rgba(0,0,0,0.1) 100%);
            z-index: 1; pointer-events: none;
        }
        
        .bite-content { position: relative; z-index: 2; display: flex; justify-content: space-between; align-items: flex-end; width: 100%; }
        
        .bite-info { flex: 1; padding-right: 15px; }
        .source-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .source-pfp { 
            width: 40px; height: 40px; border-radius: 12px; 
            background: #222; object-fit: cover; border: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.2rem; color: var(--accent);
        }
        .source-details { display: flex; flex-direction: column; }
        .source-name { font-weight: 800; font-size: 1.05rem; color: #fff; }
        .bite-time { font-size: 0.75rem; color: var(--text-dim); font-weight: 600; margin-top: 2px;}
        
        .bite-caption { font-size: 0.95rem; line-height: 1.4; color: #f0f0f0; margin-bottom: 8px;}
        .bite-tag { 
            background: rgba(0, 210, 255, 0.15); color: var(--accent); 
            padding: 4px 10px; border-radius: 12px; font-weight: 700; 
            display: inline-block; font-size: 0.75rem; border: 1px solid rgba(0, 210, 255, 0.3);
        }

        .bite-actions { display: flex; flex-direction: column; gap: 22px; align-items: center; padding-bottom: 5px; }
        .action-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #fff; cursor: pointer; }
        .action-btn .material-icons-round { font-size: 34px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .action-btn:active .material-icons-round { transform: scale(0.7); }
        .action-btn.liked .material-icons-round { color: var(--danger); }
        .action-label { font-size: 0.75rem; font-weight: 700; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

        /* SEARCH MODAL */
        #search-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--surface); z-index: 10001;
            transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column;
        }
        #search-modal.active { transform: translateX(0); }
        
        .search-header {
            padding: max(15px, env(safe-area-inset-top)) 20px 15px;
            display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
        }
        .back-btn { color: #fff; font-size: 28px; cursor: pointer; }
        .search-input-wrap { flex: 1; position: relative; }
        .search-input {
            width: 100%; background: #111; border: 1px solid var(--border);
            padding: 12px 15px; border-radius: 14px; color: white; outline: none;
            font-size: 16px; transition: 0.2s;
        }
        .search-input:focus { border-color: var(--accent); background: #151515; box-shadow: 0 0 10px rgba(0,210,255,0.1); }

        .search-results { flex: 1; overflow-y: auto; padding: 0; background: var(--bg); }
        
        /* SEARCH RESULT CARD */
        .search-card {
            display: flex; padding: 15px 20px; border-bottom: 1px solid var(--border);
            gap: 15px; align-items: center; cursor: pointer; transition: background 0.2s;
        }
        .search-card:active { background: #111; }
        .search-thumb { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; background: #222; }
        .search-text { flex: 1; }
        .search-title { font-size: 0.9rem; font-weight: 700; color: #fff; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .search-meta { font-size: 0.75rem; color: var(--text-dim); margin-top: 5px; font-weight: 600;}

        /* SKELETON LOADER */
        .skeleton-card { background: #080808; animation: pulse 1.5s infinite; }
        .skel-box { background: #222; border-radius: 4px; }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        
        .loading-spinner {
            text-align: center; padding: 20px; color: var(--accent); font-weight: 800; font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 2px; animation: pulse 1s infinite;
        }

        /* Prevent navbar from blocking content */
        main-navbar { z-index: 10000; position: relative; }
    </style>
</head>
<body>

<header>
    <div class="header-title">Bites</div>
    <span class="material-icons-round search-icon-btn" onclick="openSearch()">search</span>
</header>

<div id="bites-feed-container">
    <script>
        // 🚀 INSTANT 0ms LOAD FROM LOCAL STORAGE
        const cachedBites = localStorage.getItem('goorac_bites_cache');
        if (cachedBites) {
            document.write(cachedBites);
        } else {
            // Skeleton loader if no cache exists
            document.write(`
                <div class="bite-card skeleton-card">
                    <div class="bite-overlay"></div>
                    <div class="bite-content" style="opacity: 0.7;">
                        <div class="bite-info">
                            <div class="source-row"><div class="source-pfp"></div><div class="source-details"><div class="skel-box" style="width:100px; height:15px; margin-bottom:5px;"></div><div class="skel-box" style="width:60px; height:10px;"></div></div></div>
                            <div class="skel-box" style="width:90%; height:14px; margin-bottom:8px;"></div>
                            <div class="skel-box" style="width:70%; height:14px; margin-bottom:15px;"></div>
                            <div class="skel-box" style="width:80px; height:20px; border-radius:12px;"></div>
                        </div>
                        <div class="bite-actions">
                            <div class="skel-box" style="width:34px; height:34px; border-radius:50%;"></div>
                            <div class="skel-box" style="width:34px; height:34px; border-radius:50%;"></div>
                        </div>
                    </div>
                </div>
            `);
        }
    </script>
</div>

<main-navbar></main-navbar>

<div id="search-modal">
    <div class="search-header">
        <span class="material-icons-round back-btn" onclick="closeSearch()">arrow_back</span>
        <div class="search-input-wrap">
            <input type="text" class="search-input" id="bite-search-box" placeholder="Search internet, topics, news..." autocomplete="off">
        </div>
    </div>
    <div class="search-results" id="search-results-container">
        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; opacity:0.5; padding: 40px;">
            <span class="material-icons-round" style="font-size: 48px; margin-bottom:15px;">travel_explore</span>
            <p style="text-align: center; font-size: 0.9rem; font-weight: 600;">Search anything. The algorithm learns your interests instantly.</p>
        </div>
    </div>
</div>

<script>
    // --- 1. FIREBASE & STATE INITIALIZATION ---
    if (typeof window.initFirebaseCore === 'function') {
        window.initFirebaseCore();
    } else if (!firebase.apps.length && window.firebaseConfig) {
        firebase.initializeApp(window.firebaseConfig);
    }
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let myUid = null;
    let userInterests = {}; // The Brain (Loaded from Firebase)
    let seenBites = new Set(); // Prevent duplicates
    let isFetching = false;
    let viewTimers = {}; // 5-second Intersection timers

    // Default algorithm topics if user is brand new
    const DEFAULT_TOPICS = ["worldnews", "Cricket", "mildlyinteresting", "sports"];

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            myUid = user.uid;
            await loadMachineLearningProfile();
            initEngine();
        } else {
            window.location.href = "login.html";
        }
    });

    // --- 2. THE MACHINE LEARNING BRAIN ---
    async function loadMachineLearningProfile() {
        try {
            const doc = await db.collection("users").doc(myUid).get();
            if(doc.exists && doc.data().bitesProfile) {
                userInterests = doc.data().bitesProfile;
            }
        } catch(e) { console.error("ML Load Error", e); }
    }

    function updateInterestScore(topic, points) {
        if (!myUid || !topic) return;
        const cleanTopic = topic.toLowerCase().trim();
        
        // Update Local Memory
        userInterests[cleanTopic] = (userInterests[cleanTopic] || 0) + points;
        
        // Update Firebase Silently
        db.collection("users").doc(myUid).update({
            [`bitesProfile.${cleanTopic}`]: firebase.firestore.FieldValue.increment(points)
        }).catch(e => {
            // If field doesn't exist yet, merge it
            db.collection("users").doc(myUid).set({ bitesProfile: { [cleanTopic]: points } }, { merge: true });
        });
        
        console.log(`🤖 Algorithm Learned: +${points} to [${cleanTopic}]`);
    }

    // --- 3. THE INTERNET FETCHER (WITH CORS PROXY FIX) ---
    // Uses Reddit's open JSON architecture, routed through a proxy to bypass the 403 Forbidden errors
    async function fetchFromInternet(topic, limit = 10) {
        try {
            let targetUrl = `https://www.reddit.com/r/${topic.replace(/\s+/g, '')}/hot.json?limit=${limit}`;
            if(topic.includes(' ')) {
                // If it's a complex query (e.g. "MS Dhoni"), use the search endpoint
                targetUrl = `https://www.reddit.com/search.json?q=${encodeURIComponent(topic)}&sort=hot&limit=${limit}`;
            }
            
            // THE FIX: Wrap the URL in a CORS Proxy to bypass browser restrictions
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;
            
            const response = await fetch(proxyUrl);
            
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            const json = await response.json();
            
            // Normalize data and filter out text-only posts
            let rawBites = json.data.children.map(c => c.data);
            let richBites = rawBites.filter(b => b.url && b.url.match(/\.(jpeg|jpg|gif|png)$/i) && !b.over_18);
            
            return richBites.map(b => ({
                id: b.id,
                category: topic,
                source: b.subreddit_name_prefixed,
                author: b.author,
                title: b.title,
                imgUrl: b.url,
                likes: b.ups,
                timestamp: b.created_utc * 1000
            }));
        } catch(error) {
            console.warn(`Failed to fetch topic: ${topic} -`, error);
            return [];
        }
    }

    // --- 4. THE FEED GENERATOR (WEIGHTED BLEND) ---
    async function fetchNextBatch() {
        if (isFetching) return;
        isFetching = true;
        
        // 1. Determine what to fetch based on interests
        let topicsToFetch = [];
        let interestsArr = Object.entries(userInterests).sort((a,b) => b[1] - a[1]);
        
        if (interestsArr.length === 0) {
            topicsToFetch = DEFAULT_TOPICS;
        } else {
            // Grab top 2 interests
            topicsToFetch.push(interestsArr[0][0]);
            if(interestsArr[1]) topicsToFetch.push(interestsArr[1][0]);
            
            // ML Exploration Slot: Pick a random default to keep feed fresh
            topicsToFetch.push(DEFAULT_TOPICS[Math.floor(Math.random() * DEFAULT_TOPICS.length)]);
        }

        // 2. Fetch all simultaneously
        const fetchPromises = topicsToFetch.map(topic => fetchFromInternet(topic, 5));
        const resultsArray = await Promise.all(fetchPromises);
        
        // 3. Flatten, shuffle, and filter duplicates
        let newBites = resultsArray.flat();
        newBites = newBites.filter(bite => {
            if (seenBites.has(bite.id)) return false;
            seenBites.add(bite.id);
            return true;
        });
        
        // Shuffle array for natural TikTok feel
        newBites.sort(() => Math.random() - 0.5);
        
        // 4. Render to DOM
        if(newBites.length > 0) {
            appendBitesToDOM(newBites);
        }
        
        isFetching = false;
    }

    function formatTime(ms) {
        const sec = Math.floor((Date.now() - ms) / 1000);
        if (sec < 3600) return Math.floor(sec/60) + "m ago";
        if (sec < 86400) return Math.floor(sec/3600) + "h ago";
        return Math.floor(sec/86400) + "d ago";
    }

    function appendBitesToDOM(bites) {
        const container = document.getElementById('bites-feed-container');
        
        // Clear skeleton if it's the first real load
        if(container.querySelector('.skeleton-card')) {
            container.innerHTML = ''; 
        }

        bites.forEach((bite, index) => {
            const el = document.createElement('div');
            el.className = 'bite-card';
            el.style.backgroundImage = `url('${bite.imgUrl}')`;
            el.dataset.id = bite.id;
            el.dataset.category = bite.category;
            
            const firstLetter = bite.source.replace('r/', '').charAt(0).toUpperCase();

            el.innerHTML = `
                <div class="bite-overlay"></div>
                <div class="bite-content">
                    <div class="bite-info">
                        <div class="source-row">
                            <div class="source-pfp">${firstLetter}</div>
                            <div class="source-details">
                                <span class="source-name">${bite.source}</span>
                                <span class="bite-time">@${bite.author} • ${formatTime(bite.timestamp)}</span>
                            </div>
                        </div>
                        <div class="bite-caption">${bite.title}</div>
                        <div class="bite-tag">#${bite.category.replace(/\s+/g, '')}</div>
                    </div>
                    <div class="bite-actions">
                        <div class="action-btn" onclick="handleLike(this, '${bite.category}')">
                            <span class="material-icons-round">favorite_border</span>
                            <span class="action-label">${bite.likes > 1000 ? (bite.likes/1000).toFixed(1)+'k' : bite.likes}</span>
                        </div>
                        <div class="action-btn" onclick="shareBite('${bite.imgUrl}')">
                            <span class="material-icons-round">send</span>
                            <span class="action-label">Share</span>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(el);
            
            // Attach 5-second ML Observer
            mlObserver.observe(el);

            // Attach Infinite Scroll Observer to the 2nd to last item
            if (index === bites.length - 2) {
                infiniteScrollObserver.observe(el);
            }
        });

        // Update 0ms Cache
        localStorage.setItem('goorac_bites_cache', container.innerHTML);
    }

    // --- 5. OBSERVERS (ML & INFINITE SCROLL) ---
    
    // The ML Observer: Learns what user watches for 5 seconds
    const mlObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const biteId = entry.target.dataset.id;
            const category = entry.target.dataset.category;

            if (entry.isIntersecting) {
                // User stopped on this bite. Start 5 sec timer!
                viewTimers[biteId] = setTimeout(() => {
                    updateInterestScore(category, 1); // +1 Point for watching
                }, 5000); 
            } else {
                // User scrolled away. Cancel timer.
                clearTimeout(viewTimers[biteId]);
            }
        });
    }, { threshold: 0.7 }); // Triggers when 70% of card is visible

    // Infinite Scroll Observer: Fetches next batch silently
    const infiniteScrollObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                infiniteScrollObserver.unobserve(entry.target); // Unobserve this one
                fetchNextBatch(); // Fetch more!
            }
        });
    }, { rootMargin: "0px 0px 500px 0px" }); // Trigger 500px before reaching it

    function initEngine() {
        // If the container only has a skeleton, fetch immediately
        if (document.getElementById('bites-feed-container').querySelector('.skeleton-card')) {
            fetchNextBatch();
        } else {
            // It loaded from cache. Fetch next batch silently in background.
            setTimeout(fetchNextBatch, 1000);
            // Re-attach observers to cached elements
            document.querySelectorAll('.bite-card').forEach(card => mlObserver.observe(card));
        }
    }

    // --- 6. USER ACTIONS ---
    function handleLike(btnEl, category) {
        const icon = btnEl.querySelector('.material-icons-round');
        let likesCount = parseInt(btnEl.querySelector('.action-label').innerText) || 0;
        
        if (btnEl.classList.contains('liked')) {
            btnEl.classList.remove('liked');
            icon.innerText = 'favorite_border';
        } else {
            // User Liked it! HUGE ML SIGNAL. +5 Points.
            btnEl.classList.add('liked');
            icon.innerText = 'favorite';
            updateInterestScore(category, 5);
            
            // Haptic Feedback
            if(navigator.vibrate) navigator.vibrate(50);
        }
    }

    function shareBite(url) {
        if (navigator.share) {
            navigator.share({ title: 'Quantum Bite', url: url });
        } else {
            prompt("Copy this link to share:", url);
        }
    }

    // --- 7. SEARCH MODAL & MANUAL OVERRIDE ---
    function openSearch() {
        document.getElementById('search-modal').classList.add('active');
        document.getElementById('bite-search-box').focus();
        history.pushState({ modalOpen: true }, "", "#search");
    }

    function closeSearch() {
        document.getElementById('search-modal').classList.remove('active');
        if (window.location.hash === "#search") history.back();
    }

    window.addEventListener('popstate', () => {
        if (document.getElementById('search-modal').classList.contains('active')) {
            document.getElementById('search-modal').classList.remove('active');
        }
    });

    document.getElementById('bite-search-box').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            const query = this.value.trim();
            if(query.length > 0) executeAutoLearningSearch(query);
        }
    });

    async function executeAutoLearningSearch(query) {
        const container = document.getElementById('search-results-container');
        container.innerHTML = `<div class="loading-spinner">Searching Quantum Network...</div>`;
        
        // Massive ML Signal: User actively typed a search. +10 Points!
        updateInterestScore(query, 10);
        
        // Fetch specific query
        const results = await fetchFromInternet(query, 15);
        
        container.innerHTML = '';
        if(results.length === 0) {
            container.innerHTML = `<p style="text-align:center; color:var(--text-dim); padding:20px;">No signal found for "${query}".</p>`;
            return;
        }

        results.forEach(res => {
            const card = document.createElement('div');
            card.className = 'search-card';
            // When clicked, close search and push this item to the very top of the main feed
            card.onclick = () => {
                closeSearch();
                window.scrollTo(0,0);
                appendBitesToDOM([res]); // Forces it into DOM
            };
            
            card.innerHTML = `
                <img src="${res.imgUrl}" class="search-thumb">
                <div class="search-text">
                    <div class="search-title">${res.title}</div>
                    <div class="search-meta">${res.source} • ${formatTime(res.timestamp)}</div>
                </div>
            `;
            container.appendChild(card);
        });
    }
</script>

</body>
</html>
