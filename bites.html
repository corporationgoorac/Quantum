<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Goorac | Bites</title>
    
    <script src="config.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        if (typeof window.initFirebaseCore === 'function') {
            window.initFirebaseCore();
        } else if (!firebase.apps.length && window.firebaseConfig) {
            firebase.initializeApp(window.firebaseConfig);
        }
    </script>

    <script type="module" src="components/presence.js"></script>
    <script src="components/chatLoader.js" defer></script>
    <script src="components/call-notifier.js" defer></script>
    <script src="components/navbar.js" defer></script>
    <script src="components/shareBites.js" defer></script>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <style>
        /* ==========================================================================
           GLOBAL RESET & THEME
           ========================================================================== */
        * { box-sizing: border-box !important; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #000;
            --accent: #00d2ff;
            --border: rgba(255, 255, 255, 0.1);
            --text-dim: #888;
            --danger: #ff4444;
            --glass: rgba(0, 0, 0, 0.4);
            --text-main: #ffffff;
            --nav-height: calc(65px + env(safe-area-inset-bottom)); 
        }

        body {
            background: var(--bg); color: white; margin: 0;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden; 
            width: 100vw; height: 100vh;
        }

        /* ==========================================================================
           HEADER (TRANSPARENT FLOATING)
           ========================================================================== */
        header {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 15px 20px; display: flex; justify-content: space-between;
            align-items: center; z-index: 1000;
            padding-top: max(15px, env(safe-area-inset-top));
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            pointer-events: none; 
        }
        .header-title { font-weight: 800; font-size: 1.4rem; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.5); pointer-events: auto; }
        .header-right { pointer-events: auto; }
        
        .search-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            color: #fff; cursor: pointer; border: 1px solid rgba(255,255,255,0.2);
            transition: 0.2s;
        }
        .search-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }

        /* ==========================================================================
           THE VIRTUAL SWIPER ENGINE (CSS SNAP)
           ========================================================================== */
        #bites-viewport {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            overflow-y: scroll; scroll-snap-type: y mandatory;
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
            z-index: 10; padding-bottom: var(--nav-height);
            scroll-behavior: smooth; 
        }
        #bites-viewport::-webkit-scrollbar { display: none; }

        .bite-slide {
            width: 100vw; height: calc(100vh - var(--nav-height));
            scroll-snap-align: start; scroll-snap-stop: always;
            position: relative;
        }

        /* THE HARDWARE PLAYERS (FIXED BEHIND SCROLL) */
        .yt-player-container {
            position: fixed; top: 0; left: 0; width: 100vw; 
            height: calc(100vh - var(--nav-height));
            z-index: 1; opacity: 0; pointer-events: none; background: #000;
            transform: scale(1.05); 
            transition: opacity 0.35s ease-in-out; 
        }
        .yt-player-container.active { opacity: 1; z-index: 2; }
        
        /* STRICT IFRAME LOCK: Prevents YouTube from stealing clicks */
        iframe { width: 100%; height: 100%; border: none; pointer-events: none !important; }

        /* ==========================================================================
           BITES UI OVERLAY (Tiktok Style)
           ========================================================================== */
        .bite-ui-layer {
            position: absolute; inset: 0; z-index: 20;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 15px; 
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 45%);
            padding-bottom: 25px; 
        }

        .side-actions {
            position: absolute; right: 15px; 
            bottom: 25px; 
            display: flex; flex-direction: column; gap: 25px; align-items: center;
        }

        .action-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; color: #fff; cursor: pointer; transition: 0.2s;}
        .action-btn:active { transform: scale(0.85); }
        
        .action-btn .material-icons-round { 
            font-size: 36px; 
            color: #fff; 
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6)); 
        }
        
        .action-btn span.count { font-size: 0.75rem; font-weight: 700; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
        
        .action-btn.liked .material-icons-round { color: var(--danger); }
        .action-btn.liked { animation: heartPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes heartPop { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }

        .creator-pfp-wrap { position: relative; width: 45px; height: 45px; margin-bottom: 10px; }
        .creator-pfp { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #fff; object-fit: cover; background: #222; }
        .follow-badge {
            position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #000; width: 18px; height: 18px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900;
            border: 2px solid #000;
        }

        .bottom-info { max-width: 80%; padding-bottom: 5px; }
        .bite-author { font-size: 1rem; font-weight: 800; color: #fff; margin-bottom: 8px; text-shadow: 0 1px 5px rgba(0,0,0,0.8); display: flex; align-items: center; gap: 6px; }
        .bite-desc { font-size: 0.9rem; color: #eee; line-height: 1.4; text-shadow: 0 1px 5px rgba(0,0,0,0.8); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        /* ==========================================================================
           INFINITE SCROLL LOADER SLIDE
           ========================================================================== */
        .loader-slide {
            width: 100vw; height: calc(100vh - var(--nav-height));
            scroll-snap-align: start; scroll-snap-stop: always;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: transparent; color: #666;
        }
        .circular-loader {
            width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader-text { margin-top: 15px; font-size: 0.85rem; font-weight: 600; letter-spacing: 1px; text-align: center; padding: 0 20px; line-height: 1.4; }

        /* ==========================================================================
           SEARCH DISCOVER MODAL
           ========================================================================== */
        #discover-modal {
            position: fixed; top: 0; right: -100%; width: 100vw; height: 100vh;
            background: #000; z-index: 2000; transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column;
        }
        #discover-modal.active { right: 0; }

        .modal-header {
            padding: 15px 20px; padding-top: max(15px, env(safe-area-inset-top));
            display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); background: #000;
        }
        .back-btn { background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; display: flex; align-items: center; }
        .search-input-box {
            flex: 1; background: #1a1a1a; border: 1px solid #333; padding: 12px 16px;
            border-radius: 14px; color: #fff; font-size: 16px; outline: none; transition: 0.2s;
        }
        .search-input-box:focus { border-color: var(--accent); background: #222; }

        .grid-results {
            flex: 1; overflow-y: auto; padding: 2px;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;
            align-content: start;
        }

        .grid-item {
            aspect-ratio: 9 / 16; background: #111; position: relative; cursor: pointer; overflow: hidden;
        }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .grid-item:active img { transform: scale(1.05); }
        .grid-item .views-overlay {
            position: absolute; bottom: 5px; left: 5px; font-size: 0.7rem; font-weight: 700; color: #fff;
            display: flex; align-items: center; gap: 3px; text-shadow: 0 1px 3px #000;
        }

        .skel-grid-item { aspect-ratio: 9 / 16; background: #1a1a1a; animation: skelPulse 1.5s infinite; }
        @keyframes skelPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* PLAY/PAUSE OVERLAY INDICATOR */
        .play-indicator {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 70px; height: 70px; background: rgba(0,0,0,0.5); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: #fff;
            opacity: 0; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 30; pointer-events: none;
        }
        .play-indicator .material-icons-round { font-size: 40px; }
        .play-indicator.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }

        /* TAP TO START SCREEN */
        #start-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #fff; cursor: pointer; backdrop-filter: blur(10px); transition: opacity 0.3s;
        }
        .start-btn-pulse { width: 80px; height: 80px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px var(--accent); animation: startPulse 2s infinite; margin-bottom: 20px; color: #000; }
        @keyframes startPulse { 0% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(0, 210, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0); } }

        /* MAIN FEED SKELETON LOADER */
        #main-skeleton {
            position: absolute; inset: 0; z-index: 15; background: #000;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 15px; padding-bottom: 25px;
        }
        .skel-side { position: absolute; right: 15px; bottom: 25px; display: flex; flex-direction: column; gap: 25px; align-items: center; }
        .skel-circle { width: 45px; height: 45px; border-radius: 50%; background: #1a1a1a; animation: skelPulse 1.5s infinite; }
        .skel-bottom { max-width: 78%; }
        .skel-line-long { height: 16px; width: 60%; background: #1a1a1a; border-radius: 8px; margin-bottom: 12px; animation: skelPulse 1.5s infinite; }
        .skel-line-short { height: 14px; width: 40%; background: #1a1a1a; border-radius: 8px; margin-bottom: 10px; animation: skelPulse 1.5s infinite; }

        main-navbar { 
            display: block; position: fixed; bottom: 0; left: 0; width: 100%;
            height: var(--nav-height); background-color: var(--bg); z-index: 1000; 
        }
    </style>
</head>
<body>

<chat-loader></chat-loader>

<div id="start-screen" onclick="initExperience()">
    <div class="start-btn-pulse"><span class="material-icons-round" style="font-size:40px;">play_arrow</span></div>
    <h2 style="margin:0; font-weight:800; font-size:1.5rem;">Tap to enter Bites</h2>
    <p style="color:#aaa; font-size:0.9rem; margin-top:10px;">Turn your volume up</p>
</div>

<header>
    <div class="header-title">Bites</div>
    <div class="header-right">
        <div class="search-btn" onclick="openDiscoverModal()">
            <span class="material-icons-round">search</span>
        </div>
    </div>
</header>

<div id="player-container-a" class="yt-player-container active"><div id="yt-player-a"></div></div>
<div id="player-container-b" class="yt-player-container"><div id="yt-player-b"></div></div>

<div id="main-skeleton" style="display:flex;">
    <div class="skel-side">
        <div class="skel-circle"></div>
        <div class="skel-circle" style="width:35px; height:35px;"></div>
        <div class="skel-circle" style="width:35px; height:35px;"></div>
    </div>
    <div class="skel-bottom">
        <div class="skel-line-long"></div>
        <div class="skel-line-short"></div>
        <div class="skel-line-short" style="width: 30%;"></div>
    </div>
</div>

<div class="play-indicator" id="play-pause-icon"><span class="material-icons-round" id="pp-icon-inner">pause</span></div>

<div id="bites-viewport" onscroll="handleScroll()"></div>

<div id="discover-modal">
    <div class="modal-header">
        <button class="back-btn" onclick="closeDiscoverModal(true)"><span class="material-icons-round">west</span></button>
        <input type="text" id="search-input" class="search-input-box" placeholder="Search trending topics..." autocomplete="off">
    </div>
    <div class="grid-results" id="search-grid">
        <div style="grid-column: 1 / -1; text-align:center; padding: 50px 20px; color: #666;">
            <span class="material-icons-round" style="font-size: 50px; opacity:0.5; margin-bottom: 10px;">explore</span>
            <p style="font-weight:600; font-size:1.1rem;">Discover New Bites</p>
            <p style="font-size:0.85rem; margin-top:5px;">Search for gaming, comedy, tech, and more.</p>
        </div>
    </div>
</div>

<share-bites id="share-bites-modal"></share-bites>
<main-navbar></main-navbar>
<call-notifier></call-notifier>

<script>
    // ==========================================================================
    // SYSTEM & FIREBASE INIT
    // ==========================================================================
    const db = firebase.firestore();
    const auth = firebase.auth();
    let myUid = null;
    let myInterests = []; 

    // 🚀 DYNAMIC LANGUAGE DETECTION (No more hardcoded Tamil)
    auth.onAuthStateChanged(user => {
        if (user) { 
            myUid = user.uid; 
            db.collection("users").doc(myUid).get().then(doc => {
                if(doc.exists && doc.data().interests) {
                    const ints = doc.data().interests;
                    myInterests = Object.keys(ints).sort((a,b) => ints[b] - ints[a]).slice(0, 5);
                }
                
                // Smart Fallback if profile is new/empty
                if(!myInterests || myInterests.length === 0) {
                    const userLang = navigator.language || navigator.userLanguage; 
                    if (userLang.startsWith('ml')) myInterests = ["malayalam"];
                    else if (userLang.startsWith('te')) myInterests = ["telugu"];
                    else if (userLang.startsWith('ta')) myInterests = ["tamil"];
                    else if (userLang.startsWith('hi')) myInterests = ["hindi"];
                    else myInterests = ["trending"];
                }
            });
        } 
        else { window.location.href = 'login.html'; }
    });

    // ==========================================================================
    // THE BITES ENGINE (STATE, SHARED URLS & CACHE)
    // ==========================================================================
    let bitesQueue = [];
    let currentIndex = 0;
    let isFetching = false;
    let hasStarted = false;
    let viewedVideoIds = new Set(); 
    
    let bitesHistory = JSON.parse(localStorage.getItem('goorac_bites_history') || '[]');
    let currentVideoStartTime = 0; 

    let backupQueue = [];
    let backupIndex = 0;
    let isSearchPlaying = false;

    let playerA, playerB;
    let activePlayer = 'A'; 
    let playersReady = 0;
    
    let currentLoadedA = null;
    let currentLoadedB = null;

    let sharedVidId = null;
    const urlParams = new URLSearchParams(window.location.search);
    const rawUrlParam = urlParams.get('v') || urlParams.get('url');
    
    if (rawUrlParam) {
        if (rawUrlParam.length === 11) sharedVidId = rawUrlParam;
        else {
            const match = rawUrlParam.match(/(?:v=|youtu\.be\/|shorts\/)([\w-]{11})/);
            if (match) sharedVidId = match[1];
        }
    }

    (function initializeAppQueue() {
        const uniqueCache = [];
        const seen = new Set();

        if (sharedVidId) {
            uniqueCache.push({
                videoId: sharedVidId,
                title: "Shared Video",
                author: "Goorac",
                category: "shared",
                likes: 0,
                imgUrl: `https://img.youtube.com/vi/${sharedVidId}/hqdefault.jpg`
            });
            seen.add(sharedVidId);
            viewedVideoIds.add(sharedVidId);
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        const cached = localStorage.getItem('goorac_bites_queue');
        if (cached) {
            try { 
                const parsed = JSON.parse(cached);
                if (parsed.length > 0) {
                    parsed.forEach(b => {
                        if(b && b.videoId && !seen.has(b.videoId) && !bitesHistory.includes(b.videoId)) {
                            seen.add(b.videoId);
                            uniqueCache.push(b);
                            viewedVideoIds.add(b.videoId);
                        }
                    });
                }
            } catch(e) {}
        }
        bitesQueue = uniqueCache; 
    })();

    // ==========================================================================
    // WATCH HISTORY "BURN-ON-SIGHT" LOGIC
    // ==========================================================================
    function markAsViewed(videoId) {
        if (!videoId || isSearchPlaying) return; 
        if (!bitesHistory.includes(videoId)) {
            bitesHistory.push(videoId);
            if (bitesHistory.length > 2000) bitesHistory.shift(); 
            localStorage.setItem('goorac_bites_history', JSON.stringify(bitesHistory));
        }
    }

    function cleanUpQueueAndCache() {
        if (isSearchPlaying) return; 
        const cacheSlice = bitesQueue.slice(currentIndex + 1);
        localStorage.setItem('goorac_bites_queue', JSON.stringify(cacheSlice.slice(0, 15))); 
    }

    document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
            if (playerA && typeof playerA.pauseVideo === 'function') playerA.pauseVideo();
            if (playerB && typeof playerB.pauseVideo === 'function') playerB.pauseVideo();
            syncInterestsToFirestore(); 
        } else {
            if (hasStarted) playActivePlayer();
        }
    });

    // ==========================================================================
    // YOUTUBE IFRAME API
    // ==========================================================================
    window.onYouTubeIframeAPIReady = function() {
        const playerVars = { 'autoplay': 0, 'controls': 0, 'disablekb': 1, 'fs': 0, 'rel': 0, 'modestbranding': 1, 'playsinline': 1, 'mute': 0 };
        playerA = new YT.Player('yt-player-a', { playerVars: playerVars, events: { 'onReady': checkPlayersReady, 'onStateChange': onPlayerStateChange }});
        playerB = new YT.Player('yt-player-b', { playerVars: playerVars, events: { 'onReady': checkPlayersReady, 'onStateChange': onPlayerStateChange }});
    };

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function checkPlayersReady() {
        playersReady++;
        if (playersReady === 2) {
            if (bitesQueue.length > 0) {
                syncPlayersToScrollPosition(); 
                renderDOMSlides();
                if (bitesQueue.length < 8) fetchMoreBites();
            } else {
                fetchMoreBites();
            }
        }
    }

    window.initExperience = function() {
        document.getElementById('start-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('start-screen').style.display = 'none', 300);
        hasStarted = true;
        
        if (playersReady === 2 && bitesQueue.length > 0) {
            if(bitesQueue[currentIndex]) markAsViewed(bitesQueue[currentIndex].videoId);
            playActivePlayer();
            currentVideoStartTime = Date.now(); 
            cleanUpQueueAndCache(); 
        }
    }

    // ==========================================================================
    // DOM SLIDE RENDERER
    // ==========================================================================
    function renderDOMSlides() {
        const viewport = document.getElementById('bites-viewport');
        const skeleton = document.getElementById('main-skeleton');
        
        if(bitesQueue.length > 0 && skeleton.style.display !== 'none') skeleton.style.display = 'none';

        const existingLoader = document.getElementById('infinite-loader-slide');
        if (existingLoader) existingLoader.remove();

        while (viewport.children.length < bitesQueue.length) {
            const index = viewport.children.length;
            const bite = bitesQueue[index];
            
            const slide = document.createElement('div');
            slide.className = 'bite-slide';
            slide.dataset.index = index;
            slide.onclick = () => togglePlayPause();

            slide.innerHTML = `
                <div class="bite-ui-layer">
                    <div class="side-actions">
                        <div class="creator-pfp-wrap" onclick="event.stopPropagation()">
                            <img src="${bite.imgUrl}" class="creator-pfp">
                            <div class="follow-badge">+</div>
                        </div>
                        <div class="action-btn" id="like-btn-${index}" onclick="handleLike(event, ${index})">
                            <span class="material-icons-round" id="like-icon-${index}">favorite_border</span>
                            <span class="count">${formatNumber(bite.likes)}</span>
                        </div>
                        <div class="action-btn" onclick="shareBite(event, ${index})">
                            <span class="material-icons-round">reply</span>
                            <span class="count share-text">Share</span>
                        </div>
                    </div>
                    <div class="bottom-info" onclick="event.stopPropagation()">
                        <div class="bite-author">${bite.author} <span class="material-icons-round" style="color:var(--accent); font-size:16px;">verified</span></div>
                        <div class="bite-desc">${bite.title}</div>
                    </div>
                </div>
            `;
            viewport.appendChild(slide);
        }

        const loaderSlide = document.createElement('div');
        loaderSlide.id = 'infinite-loader-slide';
        loaderSlide.className = 'bite-slide';
        loaderSlide.style.background = "#000";
        loaderSlide.innerHTML = `
            <div class="bite-ui-layer" style="z-index: 30;">
                <div class="skel-side" style="position: absolute; right: 15px; bottom: 25px; display: flex; flex-direction: column; gap: 25px; align-items: center;">
                    <div class="skel-circle"></div>
                    <div class="skel-circle" style="width:35px; height:35px;"></div>
                    <div class="skel-circle" style="width:35px; height:35px;"></div>
                </div>
                <div class="skel-bottom" style="max-width: 78%; padding-bottom: 5px; width: 100%;">
                    <div class="skel-line-long"></div>
                    <div class="skel-line-short"></div>
                    <div class="skel-line-short" style="width: 30%;"></div>
                </div>
            </div>
            <div class="loader-text" style="position:absolute; top:50%; width:100%; text-align:center; color:#666; font-size:0.9rem;"></div>
        `;
        viewport.appendChild(loaderSlide);
    }

    // ==========================================================================
    // SCROLL-SYNC ENGINE
    // ==========================================================================
    function syncPlayersToScrollPosition() {
        const viewport = document.getElementById('bites-viewport');
        if (!viewport || playersReady < 2) return;
        
        const firstSlide = document.querySelector('.bite-slide');
        const slideHeight = firstSlide ? firstSlide.clientHeight : viewport.clientHeight;
        const scrollPosition = viewport.scrollTop;
        const actualIndex = Math.round(scrollPosition / slideHeight) || 0;

        if (actualIndex >= 0 && actualIndex < bitesQueue.length) {
            if (actualIndex !== currentIndex) {
                currentIndex = actualIndex;
                if(bitesQueue[currentIndex]) markAsViewed(bitesQueue[currentIndex].videoId);
                swapPlayers();
                if (hasStarted) currentVideoStartTime = Date.now();
            } else if (hasStarted) {
                if(bitesQueue[currentIndex]) markAsViewed(bitesQueue[currentIndex].videoId);
                playActivePlayer();
            }
        }
    }

    let lastScrollProcessTime = 0; 
    
    function handleScroll() {
        if (!hasStarted) return;
        const now = Date.now();
        const viewport = document.getElementById('bites-viewport');
        const firstSlide = document.querySelector('.bite-slide');
        const slideHeight = firstSlide ? firstSlide.clientHeight : viewport.clientHeight;
        const newIndex = Math.round(viewport.scrollTop / slideHeight);

        if (newIndex === bitesQueue.length) {
            if (playerA && typeof playerA.pauseVideo === 'function') playerA.pauseVideo();
            if (playerB && typeof playerB.pauseVideo === 'function') playerB.pauseVideo();
            if (!isFetching && !isSearchPlaying) fetchMoreBites();
            return; 
        }

        if (newIndex !== currentIndex && newIndex >= 0 && newIndex < bitesQueue.length) {
            if (now - lastScrollProcessTime < 100) return;
            lastScrollProcessTime = now;
            
            processEngagementAlgorithm(bitesQueue[currentIndex], now - currentVideoStartTime);

            currentIndex = newIndex;
            if(bitesQueue[currentIndex]) markAsViewed(bitesQueue[currentIndex].videoId); 
            
            currentVideoStartTime = Date.now(); 
            cleanUpQueueAndCache();
            swapPlayers();

            if (currentIndex >= bitesQueue.length - 5 && !isFetching && !isSearchPlaying) fetchMoreBites(); 
        }
    }

    // ==========================================================================
    // 🧠 THE BATCHED DEEP-LEARNING ALGORITHM
    // ==========================================================================
    let pendingInterestUpdates = {};
    let interestSyncTimer = null;

    function queueInterestUpdate(category, scoreChange) {
        if(!myUid || !category) return;
        const key = `interests.${category.toLowerCase()}`;
        pendingInterestUpdates[key] = (pendingInterestUpdates[key] || 0) + scoreChange;
        if(!interestSyncTimer) interestSyncTimer = setTimeout(syncInterestsToFirestore, 15000); 
    }

    function syncInterestsToFirestore() {
        if(Object.keys(pendingInterestUpdates).length === 0 || !myUid) return;
        let firestoreUpdates = {};
        for(let key in pendingInterestUpdates) firestoreUpdates[key] = firebase.firestore.FieldValue.increment(pendingInterestUpdates[key]);
        db.collection("users").doc(myUid).set(firestoreUpdates, { merge: true }).catch(e => {});
        pendingInterestUpdates = {}; 
        interestSyncTimer = null;
    }

    function extractHashtags(text) {
        if (!text) return [];
        const matches = text.match(/#[\w]+/g);
        return matches ? matches.map(t => t.toLowerCase().replace('#', '')) : [];
    }

    function processEngagementAlgorithm(bite, timeSpentMs) {
        if (!bite || isSearchPlaying) return;
        let scoreChange = 0;
        let shouldExtractTags = false;

        if (timeSpentMs < 2500) scoreChange = -3;
        else if (timeSpentMs >= 7000) { scoreChange = 5; shouldExtractTags = true; } 
        else scoreChange = 1;

        if(scoreChange !== 0) queueInterestUpdate(bite.category, scoreChange);
        if (shouldExtractTags) extractHashtags(bite.title).slice(0, 3).forEach(tag => queueInterestUpdate(tag, 3));
    }

    function trackExplicitAction(category, action, biteTitle = "") {
        if (!myUid || !category || isSearchPlaying) return;
        let scoreChange = 0;
        let tags = [];

        if (action === 'liked') { scoreChange = 15; tags = extractHashtags(biteTitle).slice(0, 3); } 
        else if (action === 'searched') scoreChange = 20;
        else if (action === 'rewatched') { scoreChange = 8; tags = extractHashtags(biteTitle).slice(0, 3); }

        if(scoreChange !== 0) queueInterestUpdate(category, scoreChange);
        tags.forEach(tag => queueInterestUpdate(tag, 5));
    }

    window.handleLike = function(event, index) {
        event.stopPropagation();
        const btn = document.getElementById(`like-btn-${index}`);
        const bite = bitesQueue[index];
        
        if (!btn.classList.contains('liked')) {
            btn.classList.add('liked');
            document.getElementById(`like-icon-${index}`).innerText = 'favorite';
            btn.querySelector('.count').innerText = formatNumber(bite.likes + 1);
            trackExplicitAction(bite.category, 'liked', bite.title);
            if(navigator.vibrate) navigator.vibrate(50);
        }
    }

    // ==========================================================================
    // DETERMINISTIC PLAYER SWAPPER
    // ==========================================================================
    function swapPlayers() {
        if (!playerA || !playerB) return;
        const currentVid = bitesQueue[currentIndex]?.videoId;
        const nextVid = bitesQueue[currentIndex + 1]?.videoId;
        const isEven = currentIndex % 2 === 0;

        if (typeof playerA.pauseVideo === 'function') playerA.pauseVideo();
        if (typeof playerB.pauseVideo === 'function') playerB.pauseVideo();

        if (isEven) {
            activePlayer = 'A';
            document.getElementById('player-container-b').classList.remove('active');
            document.getElementById('player-container-a').classList.add('active');
            
            if (currentVid) {
                if (currentLoadedA !== currentVid) {
                    hasStarted ? playerA.loadVideoById(currentVid) : playerA.cueVideoById(currentVid);
                    currentLoadedA = currentVid;
                } else if (hasStarted) playerA.playVideo();
            }
            if (nextVid && currentLoadedB !== nextVid) { playerB.cueVideoById(nextVid); currentLoadedB = nextVid; }
        } else {
            activePlayer = 'B';
            document.getElementById('player-container-a').classList.remove('active');
            document.getElementById('player-container-b').classList.add('active');
            
            if (currentVid) {
                if (currentLoadedB !== currentVid) {
                    hasStarted ? playerB.loadVideoById(currentVid) : playerB.cueVideoById(currentVid);
                    currentLoadedB = currentVid;
                } else if (hasStarted) playerB.playVideo();
            }
            if (nextVid && currentLoadedA !== nextVid) { playerA.cueVideoById(nextVid); currentLoadedA = nextVid; }
        }
    }

    function playActivePlayer() {
        const p = activePlayer === 'A' ? playerA : playerB;
        if (bitesQueue[currentIndex] && p && typeof p.playVideo === 'function') {
            const currentVid = bitesQueue[currentIndex].videoId;
            if(activePlayer === 'A' && currentLoadedA !== currentVid) { p.loadVideoById(currentVid); currentLoadedA = currentVid; } 
            else if(activePlayer === 'B' && currentLoadedB !== currentVid) { p.loadVideoById(currentVid); currentLoadedB = currentVid; }
            p.playVideo();
        }
    }

    function togglePlayPause() {
        const p = activePlayer === 'A' ? playerA : playerB;
        if (!p || typeof p.getPlayerState !== 'function') return;
        const state = p.getPlayerState();
        const icon = document.getElementById('play-pause-icon');
        const inner = document.getElementById('pp-icon-inner');

        if (state === 1) { 
            p.pauseVideo(); inner.innerText = 'pause'; icon.classList.add('show');
        } else {
            p.playVideo(); inner.innerText = 'play_arrow'; icon.classList.add('show');
            setTimeout(() => icon.classList.remove('show'), 800);
        }
    }

    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.ENDED) {
            event.target.playVideo(); 
            if(bitesQueue[currentIndex]) trackExplicitAction(bitesQueue[currentIndex].category, 'rewatched', bitesQueue[currentIndex].title);
        }
    }

    // ==========================================================================
    // 🚀 NEW: DIRECT FIRESTORE CONTENT ENGINE & CLIENT SHUFFLE
    // ==========================================================================
    function addictiveShuffle(videosArray) {
        let freshVideos = videosArray.filter(v => 
            !bitesHistory.includes(v.videoId) && 
            !viewedVideoIds.has(v.videoId) &&
            !bitesQueue.some(q => q.videoId === v.videoId)
        );

        // Fisher-Yates Shuffle
        for (let i = freshVideos.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [freshVideos[i], freshVideos[j]] = [freshVideos[j], freshVideos[i]];
        }
        return freshVideos;
    }

    async function fetchMoreBites(overrideTopic = null) {
        if (isFetching || isSearchPlaying) return;
        isFetching = true;

        const loaderText = document.querySelector('.loader-text');
        if (loaderText) loaderText.innerText = "Diving into the pools...";

        try {
            let topicsToFetch = overrideTopic ? [overrideTopic] : myInterests;
            if (!topicsToFetch || topicsToFetch.length === 0) topicsToFetch = ["trending"];
            
            let combinedVideos = [];

            // 1. Direct Communication: Read Topic Pools from Firestore bypassing Render
            const fetchPromises = topicsToFetch.map(topic => {
                const safeName = topic.toLowerCase().replace(/\s+/g, '_');
                return db.collection('bites_pools').doc(safeName).get();
            });

            const snapshots = await Promise.all(fetchPromises);

            snapshots.forEach(doc => {
                if (doc.exists && doc.data().videos) combinedVideos.push(...doc.data().videos);
            });

            // 2. Addictive Client-Side Shuffle & Filter
            const finalBatch = addictiveShuffle(combinedVideos).slice(0, 15);

            if (finalBatch.length > 0) {
                finalBatch.forEach(b => {
                    viewedVideoIds.add(b.videoId);
                    bitesQueue.push(b);
                });
                renderDOMSlides();
                syncPlayersToScrollPosition();
                cleanUpQueueAndCache();
            } else {
                // 3. EMERGENCY FALLBACK: Pools empty or exhausted, use live proxy
                await fetchSearchFallback(topicsToFetch[0]);
            }
        } catch (error) {
            console.error("Direct Firestore Read Failed:", error);
            if (loaderText) loaderText.innerText = "Connection failed. Scroll to retry.";
        } finally {
            isFetching = false;
        }
    }

    async function fetchSearchFallback(topic) {
        try {
            const res = await fetch(`https://pishaa.onrender.com/api/reels?topic=${encodeURIComponent(topic)}&search=true`);
            const data = await res.json();
            if (data.success && data.bites && data.bites.length > 0) {
                const finalBatch = addictiveShuffle(data.bites).slice(0, 15);
                finalBatch.forEach(b => { viewedVideoIds.add(b.videoId); bitesQueue.push(b); });
                renderDOMSlides();
                syncPlayersToScrollPosition();
                cleanUpQueueAndCache();
            }
        } catch (e) { console.error("Fallback failed", e); }
    }

    window.shareBite = function(event, index) {
        event.stopPropagation();
        const bite = bitesQueue[index];
        const shareModal = document.getElementById('share-bites-modal');
        const navBar = document.querySelector('main-navbar');
        
        if (shareModal && typeof shareModal.open === 'function') {
            if (navBar) navBar.style.display = 'none';
            if (!shareModal._navPatch) {
                const origClose = shareModal.close;
                shareModal.close = function(triggerBack) {
                    if (navBar) navBar.style.display = 'block';
                    origClose.apply(this, arguments);
                };
                shareModal._navPatch = true;
            }
            shareModal.open(bite);
        } else {
            const shareUrl = `${window.location.origin}${window.location.pathname}?v=${bite.videoId}`;
            if (navigator.share) navigator.share({ title: bite.title, text: `Check out this Bite!`, url: shareUrl }).catch(e => {});
            else {
                navigator.clipboard.writeText(shareUrl).then(() => {
                    const btnText = event.currentTarget.querySelector('.share-text');
                    const originalText = btnText.innerText;
                    btnText.innerText = "Copied!";
                    setTimeout(() => btnText.innerText = originalText, 2000);
                }).catch(e => {});
            }
        }
    }

    function formatNumber(num) {
        if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return num;
    }

    // ==========================================================================
    // INSTAGRAM-STYLE DISCOVER MODAL (USES RENDER PROXY)
    // ==========================================================================
    window.openDiscoverModal = function() {
        document.getElementById('discover-modal').classList.add('active');
        history.pushState({ modal: 'discover' }, "", "#discover");
        const grid = document.getElementById('search-grid');
        if(grid.children.length <= 1) executeSearch(myInterests[0] || "trending");
    }

    window.closeDiscoverModal = function(shouldGoBack) {
        document.getElementById('discover-modal').classList.remove('active');
        if(shouldGoBack && window.location.hash === "#discover") history.back();
    }

    window.onpopstate = (e) => { 
        const hash = window.location.hash;
        if (isSearchPlaying && hash === '#discover') {
            isSearchPlaying = false;
            bitesQueue = [...backupQueue];
            currentIndex = backupIndex;
            const viewport = document.getElementById('bites-viewport');
            viewport.innerHTML = '';
            renderDOMSlides();
            const firstSlide = document.querySelector('.bite-slide');
            const slideHeight = firstSlide ? firstSlide.clientHeight : viewport.clientHeight;
            viewport.scrollTop = currentIndex * slideHeight;
            currentVideoStartTime = Date.now(); 
            syncPlayersToScrollPosition(); 
            document.getElementById('discover-modal').classList.add('active');
            return;
        }
        if(document.getElementById('discover-modal').classList.contains('active') && hash !== '#discover') {
            closeDiscoverModal(false);
        }
    };

    let searchTimeout;
    document.getElementById('search-input').addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        const val = e.target.value.trim();
        searchTimeout = setTimeout(() => { if(val.length > 1) executeSearch(val); }, 600);
    });

    async function executeSearch(query) {
        const grid = document.getElementById('search-grid');
        let skelHtml = '';
        for(let i=0; i<12; i++) skelHtml += `<div class="skel-grid-item"></div>`;
        grid.innerHTML = skelHtml;

        try {
            // Live Search always asks the Render API Proxy
            const res = await fetch(`https://pishaa.onrender.com/api/reels?topic=${encodeURIComponent(query)}&search=true`);
            const data = await res.json();
            
            if (data.success && data.bites.length > 0) {
                grid.innerHTML = '';
                data.bites.forEach(bite => {
                    const el = document.createElement('div');
                    el.className = 'grid-item';
                    el.onclick = () => launchSearchResultFeed(bite, data.bites);
                    el.innerHTML = `<img src="${bite.imgUrl}"><div class="views-overlay"><span class="material-icons-round" style="font-size:14px;">play_arrow</span> ${formatNumber(bite.likes)}</div>`;
                    grid.appendChild(el);
                });
            } else grid.innerHTML = `<div style="grid-column: 1 / -1; text-align:center; padding: 50px 20px; color: #666;">No results found.</div>`;
        } catch (error) {
            grid.innerHTML = `<div style="grid-column: 1 / -1; text-align:center; padding: 50px 20px; color: #ff4444;">Connection failed.</div>`;
        }
    }

    function launchSearchResultFeed(clickedBite, allResults) {
        const searchInputBox = document.getElementById('search-input');
        if (searchInputBox && searchInputBox.value.trim()) trackExplicitAction(searchInputBox.value.trim(), 'searched');

        backupQueue = [...bitesQueue];
        backupIndex = currentIndex;
        isSearchPlaying = true;

        history.pushState({ modal: 'search-playing' }, "", "#search-playing");
        document.getElementById('discover-modal').classList.remove('active');
        
        const otherResults = allResults.filter(b => b.videoId !== clickedBite.videoId);
        bitesQueue = [clickedBite, ...otherResults];
        
        const viewport = document.getElementById('bites-viewport');
        viewport.innerHTML = '';
        currentIndex = 0;
        viewport.scrollTop = 0;
        viewedVideoIds.clear();

        renderDOMSlides();
        currentVideoStartTime = Date.now(); 
        syncPlayersToScrollPosition(); 
    }
</script>
