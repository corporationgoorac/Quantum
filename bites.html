<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Goorac | Official Shorts Feed</title>
    
    <script src="config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script src="components/navbar.js" defer></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons-Round" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --nav-clearance: 140px; /* Space for your Goorac Navbar */
            --safe-top: env(safe-area-inset-top);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            -webkit-tap-highlight-color: transparent; 
        }

        body, html {
            background-color: var(--bg); 
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        /* ==========================================================================
          THE OFFICIAL YOUTUBE PORTAL 
          ==========================================================================
        */
        #official-youtube-portal {
            position: absolute;
            top: 0; 
            left: 0;
            width: 100%;
            /* Cuts the bottom off exactly where your navbar starts */
            height: calc(100vh - var(--nav-clearance)); 
            border: none;
            z-index: 1;
            background: #000;
        }

        /* GOORAC HEADER OVERLAY */
        header {
            position: fixed; 
            top: 0; 
            width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            padding: calc(var(--safe-top) + 15px) 20px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 5000; 
            pointer-events: none; /* Lets you touch the video behind the header */
        }
        
        .header-title { 
            font-size: 1.7rem; font-weight: 900; letter-spacing: -1.2px;
            color: #fff; text-shadow: 0 4px 15px rgba(0,0,0,0.8);
            pointer-events: auto;
            font-family: -apple-system, sans-serif;
        }

        /* GOORAC NAVBAR LAYER */
        main-navbar { 
            position: fixed; 
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 6000; 
        }
        
        /* Loading Screen while YouTube connects */
        #portal-loader {
            position: absolute;
            inset: 0;
            background: #000;
            z-index: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: sans-serif;
            font-weight: 800;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<header>
    <div class="header-title">Goorac Bites</div>
</header>

<div id="portal-loader">CONNECTING TO YOUTUBE...</div>

<iframe 
    id="official-youtube-portal" 
    src="https://www.youtube.com/shorts" 
    allow="autoplay; encrypted-media; fullscreen"
    sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
    onload="document.getElementById('portal-loader').style.display='none';">
</iframe>

<main-navbar></main-navbar>

<script>
    // Keep your Firebase Auth intact as requested
    if (typeof window.initFirebaseCore === 'function') {
        window.initFirebaseCore();
    } else if (!firebase.apps.length && window.firebaseConfig) {
        firebase.initializeApp(window.firebaseConfig);
    }
    const auth = firebase.auth();

    // Ensure the user is logged into your app before showing the portal
    auth.onAuthStateChanged((user) => {
        if (!user) {
            window.location.href = "login.html";
        }
    });
</script>

</body>
</html>
