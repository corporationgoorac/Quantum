<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Goorac | Quantum Bites Feed</title>
    
    <script src="config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script src="components/navbar.js" defer></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons-Round" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           QUANTUM UI TOKENS
           ========================================================================== */
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --accent: #00d2ff;
            --danger: #ff2a55;
            --youtube-red: #ff0000;
            --border: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --nav-clearance: 140px; 
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
            outline: none;
        }

        body {
            background-color: var(--bg); 
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0; 
            overflow: hidden; 
            height: 100vh;
        }

        /* HEADER */
        header {
            position: fixed; top: 0; width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.95), transparent);
            padding: max(15px, env(safe-area-inset-top)) 20px 25px; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 1000; pointer-events: none;
        }
        
        .header-title { 
            font-size: 1.6rem; font-weight: 900; letter-spacing: -1px;
            pointer-events: auto; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        
        .search-icon-btn {
            color: #fff; font-size: 32px; cursor: pointer; pointer-events: auto;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8); 
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .search-icon-btn:active { transform: scale(0.8); color: var(--accent); }

        /* FEED CONTAINER */
        #bites-feed-container {
            height: 100vh; width: 100vw;
            overflow-y: scroll; scroll-snap-type: y mandatory;
            scrollbar-width: none; -ms-overflow-style: none;
            background: var(--bg);
            scroll-behavior: smooth;
        }
        #bites-feed-container::-webkit-scrollbar { display: none; }

        /* BITE CARD UI */
        .bite-card {
            height: 100vh; width: 100vw;
            scroll-snap-align: start; scroll-snap-stop: always;
            position: relative; display: flex; flex-direction: column;
            justify-content: flex-end; padding: 20px; 
            padding-bottom: calc(var(--nav-clearance) + env(safe-area-inset-bottom));
            background-size: cover; background-position: center;
            background-color: #050505; border-bottom: 1px solid var(--border);
        }

        /* VIDEO PLAYER STYLING */
        .video-wrapper {
            position: absolute; inset: 0; width: 100%; height: 100%;
            z-index: 0; background: transparent;
            opacity: 0; transition: opacity 0.6s ease-in-out;
        }
        .video-wrapper iframe { 
            width: 100%; height: 100%; border: none; pointer-events: auto; 
            transform: scale(1.05); 
        }
        .bite-card.active-video .video-wrapper { opacity: 1; }

        .bite-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 40%, rgba(0,0,0,0.1) 100%);
            z-index: 1; pointer-events: auto;
        }
        
        .bite-content { 
            position: relative; z-index: 2; display: flex; 
            justify-content: space-between; align-items: flex-end; width: 100%; 
            pointer-events: none; 
        }
        
        .bite-actions, .bite-info { pointer-events: auto; }
        .bite-info { flex: 1; padding-right: 15px; animation: slideUp 0.6s ease-out; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .source-row { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        
        .source-pfp { 
            width: 44px; height: 44px; border-radius: 12px; 
            background: var(--surface); object-fit: cover; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 1.3rem; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .source-pfp.youtube { border: 2px solid var(--youtube-red); color: var(--youtube-red); }
        .source-pfp.news { border: 2px solid var(--accent); color: var(--accent); }
        
        .source-name { font-weight: 800; font-size: 1.1rem; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        
        .bite-caption { 
            font-size: 1.05rem; line-height: 1.45; color: #ffffff; 
            margin-bottom: 15px; font-weight: 500; display: -webkit-box; 
            -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; 
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
        }

        .bite-tag { 
            background: rgba(255, 255, 255, 0.15); color: #fff; padding: 6px 14px; 
            border-radius: 10px; font-weight: 800; display: inline-block; 
            font-size: 0.75rem; border: 1px solid rgba(255, 255, 255, 0.3);
            text-transform: uppercase; letter-spacing: 1px; backdrop-filter: blur(5px);
        }

        /* ACTIONS SECTION */
        .bite-actions { display: flex; flex-direction: column; gap: 28px; align-items: center; padding-bottom: 5px; }
        .action-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; color: #fff; cursor: pointer; transition: 0.2s; }
        .action-btn .material-icons-round { font-size: 38px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.6)); }
        .action-btn:active { transform: scale(0.7); }
        .action-btn.liked .material-icons-round { color: var(--danger); text-shadow: 0 0 15px rgba(255,42,85,0.5); }
        .action-label { font-size: 0.75rem; font-weight: 800; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }

        /* SEARCH MODAL */
        #search-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--surface); z-index: 10001;
            transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex; flex-direction: column;
        }
        #search-modal.active { transform: translateX(0); }
        
        .search-header {
            padding: max(15px, env(safe-area-inset-top)) 20px 15px;
            display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border);
            background: rgba(10,10,10,0.95); backdrop-filter: blur(15px);
        }
        .search-input {
            flex: 1; background: #111; border: 1px solid var(--border);
            padding: 14px 18px; border-radius: 14px; color: white; outline: none; font-size: 16px;
        }
        .search-input:focus { border-color: var(--accent); }
        .search-results { flex: 1; overflow-y: auto; padding: 10px 0; background: var(--bg); }

        /* SKELETON LOADING */
        .skeleton-card { background: #080808; animation: skelPulse 1.5s infinite; }
        @keyframes skelPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.9; } }
        .loading-spinner {
            text-align: center; padding: 40px; color: var(--accent); font-weight: 800;
            text-transform: uppercase; letter-spacing: 3px; animation: skelPulse 1s infinite;
        }

        main-navbar { position: relative; z-index: 10000; }
    </style>
</head>
<body>

<header>
    <div class="header-title">Bites</div>
    <span class="material-icons-round search-icon-btn" onclick="openSearch()">search</span>
</header>

<div id="bites-feed-container">
    <div class="bite-card skeleton-card">
        <div class="bite-overlay"></div>
    </div>
</div>

<main-navbar></main-navbar>

<div id="search-modal">
    <div class="search-header">
        <span class="material-icons-round back-btn" style="color:#fff; cursor:pointer;" onclick="closeSearch()">arrow_back</span>
        <input type="text" class="search-input" id="bite-search-box" placeholder="Search YouTube Shorts..." autocomplete="off">
    </div>
    <div class="search-results" id="search-results-container">
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;opacity:0.3;padding:40px;">
            <span class="material-icons-round" style="font-size:64px;margin-bottom:20px;">explore</span>
            <p style="text-align:center;font-weight:800;letter-spacing:1px;">EXPLORE BITES</p>
            <p style="text-align:center;font-size:0.8rem; margin-top:5px;">Find new topics to tune your feed.</p>
        </div>
    </div>
</div>

<script>
    // --- 1. FIREBASE INIT ---
    if (typeof window.initFirebaseCore === 'function') {
        window.initFirebaseCore();
    } else if (!firebase.apps.length && window.firebaseConfig) {
        firebase.initializeApp(window.firebaseConfig);
    }
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    // --- 2. GLOBAL STATE & CACHE ---
    let myUid = null;
    let seenBites = JSON.parse(localStorage.getItem('goorac_seen_bites') || '[]');
    let cachedFeed = JSON.parse(localStorage.getItem('goorac_feed_cache') || '[]');
    
    let isFetching = false;
    let viewTimers = {}; 
    let globalAudioEnabled = false;
    let scrollStartTime = 0;

    const BACKEND_API_URL = "https://pishaa.onrender.com/api/feed";
    const DEFAULT_TOPICS = ["trending shorts", "funny moments", "tech reviews", "gaming highlights", "music covers"];

    // --- 3. TRUE INSTAGRAM-STYLE ALGORITHM ENGINE ---
    const QuantumIG_Engine = {
        interests: {}, // Format: { "topic": weight_score }
        
        loadProfile: async function() {
            try {
                const doc = await db.collection("users").doc(myUid).get();
                if (doc.exists && doc.data().bitesProfile) {
                    this.interests = doc.data().bitesProfile;
                }
            } catch (e) { console.error("Profile load failed", e); }
        },

        // Calculates engagement actions into points
        engage: function(topic, action) {
            if (!topic) return;
            const tag = topic.toLowerCase().trim();
            let points = 0;

            if (action === 'like') points = 15;
            else if (action === 'search') points = 25;
            else if (action === 'watch') points = 2; // +2 for watching > 5 seconds
            else if (action === 'skip') points = -1; // -1 for scrolling past instantly

            this.interests[tag] = (this.interests[tag] || 0) + points;
            
            // Prevent negative tags from breaking math
            if(this.interests[tag] < 1) this.interests[tag] = 1;

            if (myUid) {
                db.collection("users").doc(myUid).set({ 
                    bitesProfile: { [tag]: this.interests[tag] } 
                }, { merge: true });
            }
        },

        // The "Weighted Lottery" Selector
        pickNextTopic: function() {
            const entries = Object.entries(this.interests);
            
            // 15% chance to inject a completely random Discovery topic to avoid filter bubbles
            if (entries.length === 0 || Math.random() < 0.15) {
                return DEFAULT_TOPICS[Math.floor(Math.random() * DEFAULT_TOPICS.length)];
            }

            // Calculate total weight of all user interests
            const totalWeight = entries.reduce((sum, item) => sum + item[1], 0);
            let randomNum = Math.random() * totalWeight;
            
            // Weighted selection (higher points = higher chance to be picked)
            for (let i = 0; i < entries.length; i++) {
                randomNum -= entries[i][1];
                if (randomNum <= 0) return entries[i][0];
            }
            return entries[0][0]; // Fallback
        }
    };

    // --- 4. CORE INIT & FAST CACHE LOADING ---
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            myUid = user.uid;
            await QuantumIG_Engine.loadProfile();
            
            // Instant Fast-Load from LocalStorage
            if (cachedFeed.length > 0) {
                renderToDOM(cachedFeed, true); 
                // Fetch next batch in background silently
                setTimeout(() => fetchNextBatch(), 2000); 
            } else {
                fetchNextBatch();
            }
        } else {
            window.location.href = "login.html";
        }
    });

    // --- 5. DATA FETCHER ---
    async function fetchFromBackend(topic) {
        try {
            // cb (Cache-Buster) forces a brand new unique request every time
            const url = `${BACKEND_API_URL}?topic=${encodeURIComponent(topic)}&cb=${Date.now()}`;
            const response = await fetch(url);
            const data = await response.json();
            return (data.success && data.bites) ? data.bites : [];
        } catch (error) {
            return [];
        }
    }

    // --- 6. INFINITE SCROLL GENERATOR ---
    async function fetchNextBatch(forceArray = null) {
        if (isFetching) return;
        isFetching = true;
        
        let freshBites = [];

        // If the search modal injected an array directly
        if (forceArray) {
            freshBites = forceArray;
        } else {
            // Let the IG Algorithm pick the perfect next topic
            const selectedTopic = QuantumIG_Engine.pickNextTopic();
            console.log("🔮 IG Algorithm chose topic:", selectedTopic);
            freshBites = await fetchFromBackend(selectedTopic);
        }
        
        // Filter out things we've seen
        let uniqueBites = freshBites.filter(b => !seenBites.includes(b.id));
        
        // Save to Seen History
        uniqueBites.forEach(b => {
            seenBites.push(b.id);
            if(seenBites.length > 400) seenBites.shift();
        });
        localStorage.setItem('goorac_seen_bites', JSON.stringify(seenBites));

        if (uniqueBites.length > 0) {
            // If it's a forced search array, OVERWRITE the cache. Otherwise APPEND.
            if (forceArray) cachedFeed = uniqueBites;
            else cachedFeed = [...cachedFeed, ...uniqueBites].slice(-30); // Keep last 30 for fast reloads
            
            localStorage.setItem('goorac_feed_cache', JSON.stringify(cachedFeed));
            renderToDOM(uniqueBites, forceArray ? true : false);
        } else if (!forceArray) {
            // We saw all these. Try again!
            isFetching = false;
            fetchNextBatch();
            return;
        }

        isFetching = false;
    }

    // --- 7. DOM RENDERING ---
    function renderToDOM(bites, clearExisting = false) {
        const container = document.getElementById('bites-feed-container');
        if (clearExisting || container.querySelector('.skeleton-card')) {
            container.innerHTML = '';
        }

        bites.forEach((bite, index) => {
            const card = document.createElement('div');
            card.className = 'bite-card';
            card.style.backgroundImage = `url('${bite.imgUrl}')`;
            card.dataset.id = bite.id;
            card.dataset.category = bite.category;
            
            const isVideo = bite.type === 'video' && bite.videoId;
            let initial = isVideo ? 'Y' : 'N';
            let sourceClass = isVideo ? 'youtube' : 'news';
            
            let videoLayer = isVideo ? `
                <div class="video-wrapper">
                    <iframe data-src="https://www.youtube.com/embed/${bite.videoId}?autoplay=1&mute=1&loop=1&playlist=${bite.videoId}&controls=0&modestbranding=1&playsinline=1&enablejsapi=1" allow="autoplay; encrypted-media; fullscreen; picture-in-picture"></iframe>
                </div>
            ` : '';

            card.innerHTML = `
                ${videoLayer}
                <div class="bite-overlay" onclick="enableAudio(this)"></div>
                <div class="bite-content">
                    <div class="bite-info">
                        <div class="source-row">
                            <div class="source-pfp ${sourceClass}">${initial}</div>
                            <div class="source-details">
                                <span class="source-name">${bite.source || 'Quantum Feed'}</span>
                            </div>
                        </div>
                        <div class="bite-caption">${bite.title}</div>
                        <div class="bite-tag">#${bite.category.replace(/\s+/g, '')}</div>
                    </div>
                    <div class="bite-actions">
                        <div class="action-btn" onclick="handleLike(this, '${bite.category}')">
                            <span class="material-icons-round">favorite_border</span>
                            <span class="action-label">${formatLikes(bite.likes)}</span>
                        </div>
                        <div class="action-btn" onclick="window.open('${bite.link}', '_blank')">
                            <span class="material-icons-round">open_in_new</span>
                            <span class="action-label">Expand</span>
                        </div>
                    </div>
                </div>
            `;
            
            container.appendChild(card);
            
            videoPreloader.observe(card);
            mlWatcher.observe(card);

            if (index === bites.length - 2) {
                scrollTrigger.disconnect(); 
                scrollTrigger.observe(card);
            }
        });
    }

    function formatLikes(num) {
        if (!num) return '100';
        return num > 1000 ? (num/1000).toFixed(1) + 'k' : num;
    }

    // --- 8. HIGH PERFORMANCE OBSERVERS & ENGAGEMENT TRACKING ---
    const videoPreloader = new IntersectionObserver((entries) => {
        entries.forEach(e => {
            if (e.isIntersecting) {
                const iframe = e.target.querySelector('iframe');
                if (iframe && !iframe.src) iframe.src = iframe.dataset.src;
            }
        });
    }, { rootMargin: "800px 0px" }); 

    const mlWatcher = new IntersectionObserver((entries) => {
        entries.forEach(e => {
            const id = e.target.dataset.id;
            const cat = e.target.dataset.category;
            const iframe = e.target.querySelector('iframe');

            if (e.isIntersecting) {
                scrollStartTime = Date.now(); // Start tracking watch time
                
                if (iframe && !iframe.src) iframe.src = iframe.dataset.src; 
                e.target.classList.add('active-video');

                setTimeout(() => {
                    if (iframe && iframe.contentWindow) {
                        iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":[]}', '*');
                        if (globalAudioEnabled) iframe.contentWindow.postMessage('{"event":"command","func":"unMute","args":[]}', '*');
                        else iframe.contentWindow.postMessage('{"event":"command","func":"mute","args":[]}', '*');
                    }
                }, 300);

                // If user stays for 4 seconds, count it as a "Watch"
                viewTimers[id] = setTimeout(() => {
                    QuantumIG_Engine.engage(cat, 'watch'); 
                }, 4000); 

            } else {
                e.target.classList.remove('active-video');
                
                // If they scrolled past in less than 1.5 seconds, punish the algorithm! (IG style skip tracking)
                const timeSpent = Date.now() - scrollStartTime;
                if (timeSpent > 0 && timeSpent < 1500) {
                    QuantumIG_Engine.engage(cat, 'skip');
                }

                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":[]}', '*');
                }
                clearTimeout(viewTimers[id]);
            }
        });
    }, { threshold: 0.8 }); 

    const scrollTrigger = new IntersectionObserver((entries) => {
        entries.forEach(e => {
            if (e.isIntersecting) fetchNextBatch(); 
        });
    }, { rootMargin: "0px 0px 400px 0px" });

    // --- 9. INTERFACE & AUDIO CONTROLS ---
    function handleLike(btnEl, category) {
        const icon = btnEl.querySelector('.material-icons-round');
        if (btnEl.classList.contains('liked')) {
            btnEl.classList.remove('liked');
            icon.innerText = 'favorite_border';
        } else {
            btnEl.classList.add('liked');
            icon.innerText = 'favorite';
            QuantumIG_Engine.engage(category, 'like'); // Massive boost to this topic
            if (navigator.vibrate) navigator.vibrate([30, 40]);
        }
    }

    function enableAudio(overlay) {
        globalAudioEnabled = !globalAudioEnabled; 
        const iframe = overlay.parentElement.querySelector('iframe');
        
        if (iframe && iframe.contentWindow) {
            if (globalAudioEnabled) {
                iframe.contentWindow.postMessage('{"event":"command","func":"unMute","args":[]}', '*');
                iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":[]}', '*');
            } else {
                iframe.contentWindow.postMessage('{"event":"command","func":"mute","args":[]}', '*');
            }
        }
    }

    // --- 10. MOBILE BACK BUTTON & SEARCH MODAL INJECTION ---
    function openSearch() {
        document.getElementById('search-modal').classList.add('active');
        document.getElementById('bite-search-box').focus();
        // Push state for mobile hardware back button
        history.pushState({modal: 'search'}, 'Search', '#search');
    }

    function closeSearch() { 
        if (history.state && history.state.modal === 'search') history.back(); 
        else document.getElementById('search-modal').classList.remove('active');
    }

    // Listen for Mobile Hardware Back Button
    window.addEventListener('popstate', (e) => {
        document.getElementById('search-modal').classList.remove('active');
    });

    document.getElementById('bite-search-box').addEventListener('keypress', async function (e) {
        if (e.key === 'Enter') {
            const query = this.value.trim();
            if (query.length > 0) {
                QuantumIG_Engine.engage(query, 'search'); 
                
                const container = document.getElementById('search-results-container');
                container.innerHTML = `<div class="loading-spinner">Locating Bites...</div>`;
                
                // Fetch the array
                const resultsArray = await fetchFromBackend(query);
                container.innerHTML = '';
                
                if (resultsArray.length === 0) {
                    container.innerHTML = `<p style="text-align:center; padding:40px; color:grey;">No shorts found for "${query}"</p>`;
                    return;
                }

                resultsArray.forEach(res => {
                    const card = document.createElement('div');
                    card.style.cssText = "display:flex; padding:15px 20px; border-bottom:1px solid #1a1a1a; gap:15px; align-items:center; cursor:pointer;";
                    
                    // THE NEW FIX: Inject entire array and replace cache!
                    card.onclick = () => {
                        closeSearch();
                        
                        // Move clicked item to the top of the array
                        const clickedIndex = resultsArray.indexOf(res);
                        resultsArray.splice(clickedIndex, 1);
                        resultsArray.unshift(res);
                        
                        // Pass the array directly into fetchNextBatch to override the algorithm and wipe the screen
                        fetchNextBatch(resultsArray);
                        
                        // Force scroll to top
                        setTimeout(()=> document.getElementById('bites-feed-container').scrollTo(0,0), 50);
                    };
                    
                    card.innerHTML = `
                        <img src="${res.imgUrl}" style="width:65px; height:65px; border-radius:12px; object-fit:cover; background:#111;">
                        <div style="flex:1;">
                            <div style="font-size:0.95rem; font-weight:700; color:#fff; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">${res.title}</div>
                            <div style="font-size:0.75rem; color:var(--accent); margin-top:4px; font-weight:600;">${res.source}</div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }
        }
    });
</script>

</body>
</html>
