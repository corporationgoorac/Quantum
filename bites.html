<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Goorac | Quantum Bites Engine</title>
    
    <script src="config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script src="components/navbar.js" defer></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons-Round" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           1. QUANTUM DESIGN SYSTEM & TOKENS
           ========================================================================== */
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --surface-elevated: #151515;
            --accent: #00d2ff;
            --danger: #ff2a55;
            --border: rgba(255,255,255,0.08);
            --text-main: #ffffff;
            --text-dim: #888888;
            --nav-clearance: 140px; 
            --spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --expo: cubic-bezier(0.19, 1, 0.22, 1);
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        /* HARDWARE RESET */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; outline: none; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; height: 100vh; width: 100vw; position: fixed; overscroll-behavior-y: none; }

        /* ==========================================================================
           2. GLOBAL UI COMPONENTS
           ========================================================================== */
        header {
            position: fixed; top: 0; width: 100%; height: calc(var(--safe-top) + 60px);
            background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0) 100%);
            padding: var(--safe-top) 20px 0; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 5000; pointer-events: none;
        }
        
        .header-title { font-size: 1.8rem; font-weight: 900; letter-spacing: -1.2px; pointer-events: auto; color: #fff; text-shadow: 0 4px 15px rgba(0,0,0,0.9); font-style: italic; }
        .search-icon-btn { color: #fff; font-size: 32px; cursor: pointer; pointer-events: auto; text-shadow: 0 4px 15px rgba(0,0,0,0.9); transition: transform 0.2s var(--spring); background: rgba(0,0,0,0.3); border-radius: 50%; padding: 8px; backdrop-filter: blur(5px); }
        .search-icon-btn:active { transform: scale(0.85); background: var(--surface-elevated); color: var(--accent); }

        /* SYSTEM TOAST (For Volume / Save alerts) */
        #system-toast {
            position: fixed; top: calc(var(--safe-top) + 80px); left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(20,20,20,0.9); backdrop-filter: blur(15px); border: 1px solid var(--border);
            color: #fff; padding: 12px 24px; border-radius: 30px; font-weight: 800; font-size: 0.85rem; letter-spacing: 1px;
            z-index: 9999; opacity: 0; pointer-events: none; transition: all 0.4s var(--expo);
            display: flex; align-items: center; gap: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        #system-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ==========================================================================
           3. VIRTUAL DOM & FEED CONTAINER
           ========================================================================== */
        #bites-feed-container {
            height: 100vh; width: 100vw;
            overflow-y: scroll; scroll-snap-type: y mandatory;
            scrollbar-width: none; background: var(--bg);
            will-change: transform, scroll-position;
            -webkit-overflow-scrolling: touch;
        }
        #bites-feed-container::-webkit-scrollbar { display: none; }

        /* ==========================================================================
           4. BITE CARD ARCHITECTURE
           ========================================================================== */
        .bite-card {
            height: 100vh; width: 100vw;
            scroll-snap-align: start; scroll-snap-stop: always;
            position: relative; display: flex; flex-direction: column;
            justify-content: flex-end; padding: 15px;
            padding-bottom: calc(var(--nav-clearance) + var(--safe-bottom) + 5px);
            background-size: cover; background-position: center; background-color: #050505;
            border-bottom: 1px solid var(--border);
            overflow: hidden;
        }

        /* LAYER 0: VIDEO PLAYER */
        .video-wrapper {
            position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; background: #000;
            opacity: 0; transition: opacity 0.5s ease-in;
        }
        .video-wrapper iframe { width: 100%; height: 100%; border: none; pointer-events: auto; transform: scale(1.15); }
        .bite-card.active-video .video-wrapper { opacity: 1; }

        /* LAYER 1: TOUCH OVERLAY & DOUBLE TAP ANIMATION */
        .bite-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 25%, rgba(0,0,0,0) 60%);
            z-index: 1; pointer-events: auto;
        }
        
        /* The giant heart that pops on double tap */
        .double-tap-heart {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            color: var(--danger); font-size: 120px; z-index: 100; opacity: 0; pointer-events: none;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.6));
        }
        .double-tap-heart.animate { animation: heartBurst 0.8s var(--spring) forwards; }
        @keyframes heartBurst { 
            0% { transform: translate(-50%, -50%) scale(0) rotate(-15deg); opacity: 0; } 
            20% { transform: translate(-50%, -50%) scale(1.2) rotate(0deg); opacity: 1; } 
            80% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; } 
            100% { transform: translate(-50%, -50%) scale(0) rotate(15deg); opacity: 0; } 
        }

        /* LAYER 2: INFORMATION ARCHITECTURE */
        .bite-content { position: relative; z-index: 2; display: flex; justify-content: space-between; align-items: flex-end; width: 100%; pointer-events: none; }
        
        .bite-info { flex: 1; padding-right: 20px; animation: slideUpFade 0.6s var(--expo); }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .source-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .source-pfp { 
            width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, #333, #000); 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 1.1rem; border: 1.5px solid rgba(255,255,255,0.3);
            color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        .source-name { font-weight: 800; font-size: 1rem; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,1); letter-spacing: 0.2px; }
        
        .bite-caption { 
            font-size: 0.95rem; line-height: 1.4; color: #fdfdfd; 
            margin-bottom: 10px; font-weight: 400; cursor: pointer; pointer-events: auto;
            text-shadow: 0 1px 8px rgba(0,0,0,1);
            display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; 
            overflow: hidden; text-overflow: ellipsis; transition: all 0.3s ease;
        }
        .bite-caption.expanded {
            display: block; -webkit-line-clamp: unset;
            background: rgba(0,0,0,0.7); border-radius: 12px; padding: 12px;
            backdrop-filter: blur(15px); border: 1px solid var(--border);
        }

        .bite-tag-row { display: flex; flex-wrap: wrap; gap: 6px; pointer-events: auto; }
        .bite-tag { 
            background: rgba(255, 255, 255, 0.1); color: #fff; padding: 5px 12px; 
            border-radius: 8px; font-weight: 800; font-size: 0.7rem; 
            border: 1px solid rgba(255, 255, 255, 0.15); text-transform: lowercase; backdrop-filter: blur(10px);
        }

        /* LAYER 3: SIDEBAR ACTIONS */
        .bite-actions { display: flex; flex-direction: column; gap: 25px; align-items: center; margin-bottom: 10px; pointer-events: auto; }
        .action-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; color: #fff; cursor: pointer; }
        .action-btn .material-icons-round { font-size: 40px; filter: drop-shadow(0 4px 15px rgba(0,0,0,0.9)); transition: transform 0.2s var(--spring); }
        .action-btn:active .material-icons-round { transform: scale(0.7); }
        .action-btn.liked .material-icons-round { color: var(--danger); animation: pop 0.4s var(--spring); }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }
        .action-label { font-size: 0.75rem; font-weight: 900; text-shadow: 0 2px 6px rgba(0,0,0,1); }

        /* ==========================================================================
           5. SYSTEM STATES & ERROR HANDLING
           ========================================================================== */
        .skeleton-card { background: linear-gradient(110deg, #050505 8%, #151515 18%, #050505 33%); background-size: 200% 100%; animation: shimmer 1.5s infinite linear; display: flex; align-items: center; justify-content: center; }
        @keyframes shimmer { to { background-position-x: -200%; } }
        
        .loading-pulse { width: 50px; height: 50px; border-radius: 50%; border: 3px solid transparent; border-top-color: var(--accent); animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-state { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 40px; }
        .error-icon { font-size: 60px; color: var(--text-dim); }
        .retry-btn { background: var(--text-main); color: var(--bg); padding: 12px 30px; border-radius: 25px; font-weight: 900; font-size: 1rem; cursor: pointer; border: none; }

        /* ==========================================================================
           6. SEARCH MODAL
           ========================================================================== */
        #search-modal {
            position: fixed; inset: 0; background: var(--surface); z-index: 10001;
            transform: translateX(100%); transition: transform 0.4s var(--expo);
            display: flex; flex-direction: column;
        }
        #search-modal.active { transform: translateX(0); }
        
        .search-header {
            padding: calc(var(--safe-top) + 15px) 20px 15px;
            display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border);
            background: rgba(10,10,10,0.98);
        }
        .search-input {
            flex: 1; background: #151515; border: 1px solid #222;
            padding: 16px 20px; border-radius: 16px; color: white; outline: none; font-size: 16px; font-weight: 500;
        }
        .search-input:focus { border-color: var(--accent); }
        .search-results { flex: 1; overflow-y: auto; padding: 10px 0; background: var(--bg); }

        main-navbar { position: relative; z-index: 10000; }
    </style>
</head>
<body>

<header>
    <div class="header-title">Goorac Bites</div>
    <span class="material-icons-round search-icon-btn" onclick="UIController.openSearch()">search</span>
</header>

<div id="system-toast">
    <span class="material-icons-round toast-icon">info</span>
    <span class="toast-text">System Ready</span>
</div>

<div id="bites-feed-container">
    <div class="bite-card skeleton-card" id="initial-loader">
        <div class="loading-pulse"></div>
    </div>
</div>

<main-navbar></main-navbar>

<div id="search-modal">
    <div class="search-header">
        <span class="material-icons-round" style="color:#fff; cursor:pointer; font-size:36px;" onclick="UIController.closeSearch()">chevron_left</span>
        <input type="text" class="search-input" id="quantum-search-box" placeholder="Search the algorithm..." autocomplete="off">
    </div>
    <div class="search-results" id="search-results-list">
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;opacity:0.2;">
            <span class="material-icons-round" style="font-size:80px;margin-bottom:20px;">manage_search</span>
            <p style="text-align:center;font-weight:900;letter-spacing:2px;">AWAITING QUERY</p>
        </div>
    </div>
</div>

<script>
    // ==========================================================================
    // MODULE 1: SYSTEM BOOT & FIREBASE INITIALIZATION
    // ==========================================================================
    if (typeof window.initFirebaseCore === 'function') window.initFirebaseCore();
    else if (!firebase.apps.length && window.firebaseConfig) firebase.initializeApp(window.firebaseConfig);
    const auth = firebase.auth();
    
    const CONFIG = {
        BACKEND: "https://pishaa.onrender.com/api/feed",
        SYNC_API: "https://pishaa.onrender.com/api/neural-sync",
        DEFAULT_QUERY: "trending shorts"
    };

    const State = {
        uid: null,
        seenIds: new Set(JSON.parse(localStorage.getItem('gq_master_seen') || '[]')),
        feedCache: JSON.parse(localStorage.getItem('gq_master_cache') || '[]'),
        isFetching: false,
        audioActive: false,
        timers: {},
        scrollRef: 0,
        retryCount: 0 // Prevents the infinite skeleton trap
    };

    // ==========================================================================
    // MODULE 2: UI & HARDWARE CONTROLLER
    // ==========================================================================
    const UIController = {
        toastTimeout: null,
        
        showToast: function(msg, icon = 'info') {
            const toast = document.getElementById('system-toast');
            toast.querySelector('.toast-text').innerText = msg;
            toast.querySelector('.toast-icon').innerText = icon;
            toast.classList.add('show');
            if(navigator.vibrate) navigator.vibrate(15);
            
            clearTimeout(this.toastTimeout);
            this.toastTimeout = setTimeout(() => toast.classList.remove('show'), 2500);
        },

        showFeedError: function(message) {
            const container = document.getElementById('bites-feed-container');
            container.innerHTML = `
                <div class="bite-card skeleton-card">
                    <div class="error-state">
                        <span class="material-icons-round error-icon">wifi_off</span>
                        <h3 style="font-weight:800; color:#fff;">Connection Lost</h3>
                        <p style="color:var(--text-dim); font-size:0.9rem;">${message}</p>
                        <button class="retry-btn" onclick="DataManager.hydrate(null, true)">Tap to Reconnect</button>
                    </div>
                </div>
            `;
            State.isFetching = false;
        },

        triggerDoubleTapHeart: function(overlayEl) {
            const card = overlayEl.closest('.bite-card');
            const heart = card.querySelector('.double-tap-heart');
            const likeBtn = card.querySelector('.action-btn[onclick*="like"]');
            
            // Re-trigger animation
            heart.classList.remove('animate');
            void heart.offsetWidth; // DOM Reflow hack
            heart.classList.add('animate');
            
            if(navigator.vibrate) navigator.vibrate([30, 50, 30]);

            // Force like button active
            if (!likeBtn.classList.contains('liked')) {
                InteractionEngine.like(likeBtn, true);
            }
        },

        openSearch: () => {
            document.getElementById('search-modal').classList.add('active');
            document.getElementById('quantum-search-box').focus();
            history.pushState({modal: 'search'}, '', '#search');
        },
        
        closeSearch: () => {
            if (history.state && history.state.modal === 'search') history.back();
            else document.getElementById('search-modal').classList.remove('active');
        }
    };

    // ==========================================================================
    // MODULE 3: THE NEURAL ENGINE (Algorithm DNA & Sync)
    // ==========================================================================
    const NeuralEngine = {
        weights: JSON.parse(localStorage.getItem('gq_local_weights') || '{}'),

        signal: function(tagsStr, action) {
            if (!tagsStr) return;
            const tags = tagsStr.split(',').map(t => t.toLowerCase().replace(/#/g, '').trim()).filter(t => t);
            if (tags.length === 0) return;

            let points = (action === 'like') ? 50 : (action === 'search') ? 80 : (action === 'deep_view') ? 20 : -10;

            // Instant Local Cache Update
            tags.forEach(t => {
                if (!this.weights[t]) this.weights[t] = { score: 10, ts: Date.now() };
                this.weights[t].score += points;
                this.weights[t].ts = Date.now(); 
                if (this.weights[t].score < 1) this.weights[t].score = 1;
            });
            localStorage.setItem('gq_local_weights', JSON.stringify(this.weights));

            // Background Server Sync (Non-blocking)
            if (State.uid && points > 0) {
                fetch(CONFIG.SYNC_API, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ uid: State.uid, tags: tags, points: points })
                }).catch(err => {/* Ignore offline sync drops */}); 
            }
        },

        getLocalFallbackQuery: function() {
            const data = Object.entries(this.weights);
            if (data.length === 0) return CONFIG.DEFAULT_QUERY;
            
            let candidates = data.map(([tag, val]) => {
                const ageHrs = (Date.now() - val.ts) / 3600000;
                return { tag, weight: val.score * Math.pow(0.85, ageHrs) }; // Math decay
            }).sort((a, b) => b.weight - a.weight);

            return candidates.slice(0, 2).map(c => c.tag).join(',');
        }
    };

    // ==========================================================================
    // MODULE 4: DATA MANAGER (Network & The Skeleton Bug Fix)
    // ==========================================================================
    const DataManager = {
        sync: async function(query, isStrictSearch = false) {
            try {
                const url = `${CONFIG.BACKEND}?topics=${encodeURIComponent(query)}&mode=${isStrictSearch ? 'strict' : 'algo'}&uid=${State.uid || ''}&cb=${Date.now()}`;
                const res = await fetch(url, { timeout: 8000 }); // 8 second timeout rule
                if (!res.ok) throw new Error("Server rejected request");
                const json = await res.json();
                return (json.success && json.bites) ? json.bites : [];
            } catch (err) { 
                console.error("Sync Failure:", err);
                return []; 
            }
        },

        hydrate: async function(forcedData = null, resetRetries = false) {
            if (State.isFetching) return;
            State.isFetching = true;

            if (resetRetries) {
                State.retryCount = 0;
                document.getElementById('bites-feed-container').innerHTML = `<div class="bite-card skeleton-card"><div class="loading-pulse"></div></div>`;
            }

            // Check if device is physically offline
            if (!navigator.onLine) {
                UIController.showFeedError("Your phone is not connected to the internet.");
                return;
            }

            let incoming = [];
            if (forcedData) {
                incoming = forcedData;
            } else {
                const localQuery = NeuralEngine.getLocalFallbackQuery();
                incoming = await this.sync(localQuery, false);
            }

            // Cross-reference with seen blocklist
            const unique = incoming.filter(b => !State.seenIds.has(b.id));

            if (unique.length > 0) {
                State.retryCount = 0; // Reset health
                if (forcedData) State.feedCache = unique;
                else State.feedCache = [...State.feedCache, ...unique].slice(-30);

                localStorage.setItem('gq_master_cache', JSON.stringify(State.feedCache));
                RenderEngine.draw(unique, !!forcedData);
                State.isFetching = false;
            } else if (!forcedData) {
                // THE INFINITE SKELETON FIX: Stop trying if it fails repeatedly
                State.retryCount++;
                if (State.retryCount >= 3) {
                    UIController.showFeedError("The Neural Algorithm needs a moment. Server might be booting.");
                } else {
                    State.isFetching = false;
                    setTimeout(() => this.hydrate(), 1000 * State.retryCount); // Exponential backoff
                }
            } else {
                State.isFetching = false;
            }
        }
    };

    // ==========================================================================
    // MODULE 5: THE RENDER ENGINE (Virtual DOM Construction)
    // ==========================================================================
    const RenderEngine = {
        container: document.getElementById('bites-feed-container'),

        draw: function(batch, wipeFirst = false) {
            // Remove skeleton loader if it exists
            const loader = document.getElementById('initial-loader');
            if (loader) loader.remove();
            
            if (wipeFirst || this.container.querySelector('.error-state')) this.container.innerHTML = '';

            batch.forEach((bite, i) => {
                const card = document.createElement('div');
                card.className = 'bite-card';
                card.style.backgroundImage = `url('${bite.imgUrl}')`;
                card.dataset.id = bite.id;
                
                const creator = bite.author || "Creator";
                const initial = creator.charAt(0).toUpperCase();

                const tagsArr = (bite.title.match(/#[\w\u0590-\u05ff]+/g) || []).map(t => t.toLowerCase());
                card.dataset.tags = [bite.category, ...tagsArr].join(',');
                const tagHtml = tagsArr.slice(0, 3).map(t => `<span class="bite-tag">${t}</span>`).join('');

                const playerHtml = `
                    <div class="video-wrapper">
                        <iframe data-src="https://www.youtube.com/embed/${bite.videoId}?autoplay=1&mute=1&loop=1&playlist=${bite.videoId}&controls=0&modestbranding=1&playsinline=1&enablejsapi=1&vq=small" allow="autoplay; encrypted-media; fullscreen;"></iframe>
                    </div>
                `;

                card.innerHTML = `
                    ${playerHtml}
                    <div class="bite-overlay"></div>
                    <span class="material-icons-round double-tap-heart">favorite</span>
                    
                    <div class="bite-content">
                        <div class="bite-info">
                            <div class="source-row">
                                <div class="source-pfp">${initial}</div>
                                <span class="source-name">${creator}</span>
                            </div>
                            <div class="bite-caption" onclick="InteractionEngine.expandCaption(this)">${bite.title}</div>
                            <div class="bite-tag-row">${tagHtml}</div>
                        </div>
                        
                        <div class="bite-actions">
                            <div class="action-btn" onclick="InteractionEngine.like(this)">
                                <span class="material-icons-round">favorite_border</span>
                                <span class="action-label">${this.format(bite.likes)}</span>
                            </div>
                            <div class="action-btn" onclick="InteractionEngine.share('${bite.link}', '${bite.title}')">
                                <span class="material-icons-round">send</span>
                                <span class="action-label">Share</span>
                            </div>
                        </div>
                    </div>
                `;
                
                this.container.appendChild(card);
                
                // Attach advanced double tap listener
                InteractionEngine.attachDoubleTap(card.querySelector('.bite-overlay'));

                ObserverSystem.preload.observe(card);
                ObserverSystem.neural.observe(card);

                // Pre-fetch next batch before reaching the bottom
                if (i === batch.length - 4) ObserverSystem.scroll.observe(card);
            });
        },
        format: n => n > 1000 ? (n/1000).toFixed(1) + 'k' : n
    };

    // ==========================================================================
    // MODULE 6: USER INTERACTION ENGINE
    // ==========================================================================
    const InteractionEngine = {
        attachDoubleTap: function(overlayEl) {
            let lastTap = 0;
            overlayEl.addEventListener('touchstart', (e) => {
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTap;
                
                if (tapLength < 300 && tapLength > 0) {
                    // Double Tap Detected
                    UIController.triggerDoubleTapHeart(overlayEl);
                    e.preventDefault();
                } else {
                    // Single Tap Detected (Toggle Audio)
                    // We use a slight delay so it doesn't trigger if they are double tapping
                    setTimeout(() => {
                        if (new Date().getTime() - lastTap >= 300) {
                            this.toggleAudio(overlayEl);
                        }
                    }, 350);
                }
                lastTap = currentTime;
            });
        },

        toggleAudio: function(overlay) {
            State.audioActive = !State.audioActive; 
            const frame = overlay.parentElement.querySelector('iframe');
            if (frame && frame.contentWindow) {
                frame.contentWindow.postMessage(`{"event":"command","func":"${State.audioActive?'unMute':'mute'}","args":[]}`, '*');
                UIController.showToast(State.audioActive ? 'Audio On' : 'Muted', State.audioActive ? 'volume_up' : 'volume_off');
            }
        },

        expandCaption: el => el.classList.toggle('expanded'),

        like: function(btn, forced = false) {
            const card = btn.closest('.bite-card');
            const tagsStr = card.dataset.tags;
            
            if (forced || btn.classList.toggle('liked')) {
                btn.classList.add('liked');
                btn.querySelector('.material-icons-round').innerText = 'favorite';
                NeuralEngine.signal(tagsStr, 'like');
                if (!forced && navigator.vibrate) navigator.vibrate([40, 60]);
            } else {
                btn.querySelector('.material-icons-round').innerText = 'favorite_border';
            }
        },

        share: async function(url, title) {
            try {
                if (navigator.share) {
                    await navigator.share({ title: 'Goorac Bites', text: title, url: url });
                } else {
                    navigator.clipboard.writeText(url);
                    UIController.showToast('Link Copied!', 'content_copy');
                }
            } catch (err) { console.log("Share cancelled"); }
        }
    };

    // ==========================================================================
    // MODULE 7: OBSERVER SYSTEM (Hardware Playback & Memory)
    // ==========================================================================
    const ObserverSystem = {
        preload: new IntersectionObserver((entries) => {
            entries.forEach(e => {
                if (e.isIntersecting) {
                    const frame = e.target.querySelector('iframe');
                    if (frame && !frame.src) frame.src = frame.dataset.src;
                }
            });
        }, { rootMargin: "1200px 0px" }), // Loads video slightly before it appears

        neural: new IntersectionObserver((entries) => {
            entries.forEach(e => {
                const id = e.target.dataset.id;
                const tagsStr = e.target.dataset.tags;
                const frame = e.target.querySelector('iframe');

                if (e.isIntersecting) {
                    State.scrollRef = Date.now();
                    
                    // Permanent ID Blocklist updates
                    if (!State.seenIds.has(id)) {
                        State.seenIds.add(id);
                        if (State.seenIds.size > 2000) State.seenIds = new Set(Array.from(State.seenIds).slice(-2000));
                        localStorage.setItem('gq_master_seen', JSON.stringify(Array.from(State.seenIds)));
                    }
                    
                    if (frame && !frame.src) frame.src = frame.dataset.src;
                    e.target.classList.add('active-video');
                    
                    // Hardware Playback
                    if (frame && frame.contentWindow) {
                        frame.contentWindow.postMessage('{"event":"command","func":"playVideo","args":[]}', '*');
                        if (State.audioActive) frame.contentWindow.postMessage('{"event":"command","func":"unMute","args":[]}', '*');
                    }

                    // Deep View Tracker (15 seconds)
                    State.timers[id] = setTimeout(() => NeuralEngine.signal(tagsStr, 'deep_view'), 15000); 

                } else {
                    e.target.classList.remove('active-video');
                    const duration = Date.now() - State.scrollRef;
                    
                    // Negative Algorithm Mapping (If they skip under 2 seconds)
                    if (duration > 0 && duration < 2000) NeuralEngine.signal(tagsStr, 'skip');

                    if (frame && frame.contentWindow) {
                        frame.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":[]}', '*');
                    }
                    clearTimeout(State.timers[id]);
                }
            });
        }, { threshold: 0.7 }),

        scroll: new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) DataManager.hydrate();
        }, { rootMargin: "400px" })
    };

    // ==========================================================================
    // MODULE 8: STRICT MATCH SEARCH LOGIC
    // ==========================================================================
    window.addEventListener('popstate', () => document.getElementById('search-modal').classList.remove('active'));

    document.getElementById('quantum-search-box').addEventListener('keypress', async function (e) {
        if (e.key === 'Enter') {
            const query = this.value.trim(); 
            if (!query) return;
            
            NeuralEngine.signal(query, 'search'); 
            const container = document.getElementById('search-results-list');
            container.innerHTML = `<div style="text-align:center; padding: 60px;"><div class="loading-pulse" style="margin:0 auto; border-top-color:var(--accent);"></div></div>`;
            
            const results = await DataManager.sync(query, true); 
            container.innerHTML = '';
            
            if (results.length === 0) return container.innerHTML = `<p style="text-align:center; padding:50px; color:var(--text-dim); font-weight:800; letter-spacing:1px;">NO EXACT MATCHES FOUND</p>`;

            results.forEach(res => {
                const row = document.createElement('div');
                row.style.cssText = "display:flex; padding:18px; border-bottom:1px solid var(--border); gap:16px; align-items:center; cursor:pointer;";
                row.onclick = () => {
                    UIController.closeSearch();
                    const injection = [...results];
                    injection.splice(injection.indexOf(res), 1);
                    injection.unshift(res);
                    DataManager.hydrate(injection, true);
                    setTimeout(() => document.getElementById('bites-feed-container').scrollTo(0,0), 100);
                };
                row.innerHTML = `
                    <img src="${res.imgUrl}" style="width:70px;height:70px;border-radius:12px;object-fit:cover; border: 1px solid #222;">
                    <div style="flex:1; overflow:hidden;">
                        <div style="font-size:0.95rem;font-weight:800;color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${res.title}</div>
                        <div style="font-size:0.75rem;color:var(--accent);margin-top:6px; font-weight: 700;">${res.author||"Creator"}</div>
                    </div>
                `;
                container.appendChild(row);
            });
        }
    });

    // ==========================================================================
    // MODULE 9: SYSTEM IGNITION
    // ==========================================================================
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            State.uid = user.uid;
            
            // Re-hydrate logic based on Cache vs Network status
            if (State.feedCache.length > 0) {
                RenderEngine.draw(State.feedCache, true); 
                UIController.showToast('Cache Loaded', 'bolt');
                setTimeout(() => DataManager.hydrate(), 2500); 
            } else {
                DataManager.hydrate();
            }
        } else {
            window.location.href = "login.html"; // Protect route
        }
    });

    // Auto-resume feed if connection drops and returns
    window.addEventListener('online', () => {
        if(document.querySelector('.error-state')) DataManager.hydrate(null, true);
        UIController.showToast('Connection Restored', 'wifi');
    });
</script>

</body>
