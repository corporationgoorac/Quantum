            --accent: #00d2ff;
            --border: rgba(255, 255, 255, 0.1);

            touch-action: none;

        }

           ========================================================================== */

            scrollbar-width: none; -webkit-overflow-scrolling: touch;
            z-index: 10; padding-bottom: var(--nav-height);

            position: relative; touch-action: pan-y; 
            background: transparent;

            position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
            z-index: 5; transition: opacity 0.3s ease-out; pointer-events: none; background: #050505;

            50% { transform: translate(-50%, -70%) scale(1) rotate(0deg); opacity: 1; } 
            100% { transform: translate(-50%, -150%) scale(1.2); opacity: 0; }

        .search-input-box {

</head>

                    let organizations = doc.organizations().out('array');
                    let people = doc.people().out('array');
                    let topics = doc.topics().out('array');
                    
                    const externalEntities = [...places, ...organizations, ...people, ...topics].map(e => e.toLowerCase().trim());
                    externalEntities.forEach(entity => {
                        if(entity.length > 3 && !this.stopWords.has(entity)) {
                            extractedTopics.add(entity); 
                        }
                    });
                }
            } catch(e) {}

            const cleanText = textContext.toLowerCase().replace(/[^\w\s\u0B80-\u0BFF]/g, ' '); 
            const words = cleanText.split(/\s+/);

            for (let i = 0; i < words.length; i++) {
                const word = words[i];
                if (this.stopWords.has(word) || word.length < 3) continue;

                if (i < words.length - 1) {
                    const bigram = `${word} ${words[i+1]}`;
                    if (this.lexicon[bigram]) {
                        totalSentiment += this.lexicon[bigram].score;
                        extractedTopics.add(this.lexicon[bigram].topic);
                        validWordCount++;
                        i++; 
                        continue;
                    }
                }

                if (this.lexicon[word]) {
                    totalSentiment += this.lexicon[word].score;
                    extractedTopics.add(this.lexicon[word].topic);
                    if (this.lexicon[this.lexicon[word].topic]) {
                         extractedTopics.add(this.lexicon[this.lexicon[word].topic].topic);
                    }
                    validWordCount++;
                } else if (word.length > 4) {
                    extractedTopics.add(word);
                }
            }

            const hashMatches = textContext.toLowerCase().match(/#[\p{L}\p{N}_]+/gu);
            if (hashMatches) {
                hashMatches.forEach(t => extractedTopics.add(t.replace('#', '').trim()));
            }

            const normalizedSentiment = validWordCount > 0 ? (totalSentiment / validWordCount) : 0;
            return {
                sentiment: normalizedSentiment,
                topics: Array.from(extractedTopics).slice(0, 10) 
            };
        }
    }

                    let decayedInts = doc.data().interests;
                    const lastUpdate = doc.data().lastInterestSyncTS || Date.now();
                    const daysOld = Math.floor((Date.now() - lastUpdate) / (1000 * 60 * 60 * 24));
                    if (daysOld > 0) {
                        for (let k in decayedInts) decayedInts[k] = Math.max(0, decayedInts[k] * Math.pow(0.85, daysOld)); 
                        db.collection("users").doc(myUid).set({ interests: decayedInts, lastInterestSyncTS: Date.now() }, { merge: true }).catch(()=>{});
                    }

                    const ints = doc.data().interests;
                    Object.assign(ints, decayedInts); 
                    myInterests = Object.keys(ints).sort((a,b) => ints[b] - ints[a]).slice(0, 6);

                return {

                };

        const uniqueCache = [];

        if (sharedVidId) {

            seen.add(sharedVidId);
            viewedVideoIds.add(sharedVidId);
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        const cached = localStorage.getItem('goorac_bites_queue');
        if (cached) {
            try { 
                const parsed = JSON.parse(cached);
                if (parsed.length > 0) {
                    parsed.forEach(b => {
                        if(b && b.videoId && !seen.has(b.videoId) && !bitesHistory.includes(b.videoId)) {
                            seen.add(b.videoId);
                            uniqueCache.push(b);
                            viewedVideoIds.add(b.videoId);
                        }
                    });
                }
            } catch(e) {}
        }
        
        bitesQueue = uniqueCache; 

        if (playersReady === 2) {
            syncPlayersToScrollPosition(); 
            renderDOMSlides();
            if (bitesQueue.length < 8) fetchMoreBites();

    // ==========================================================================

    let pressTimer;

    window.handlePointerDown = function(event) {
        if(event.target.closest('.side-actions') || event.target.closest('.bottom-info') || document.getElementById('unmute-overlay').classList.contains('active')) return;
        
        isLongPress = false;
        pressTimer = setTimeout(() => {
            isLongPress = true;
            const p = activePlayer === 'A' ? playerA : playerB;
            if (p && typeof p.pauseVideo === 'function') p.pauseVideo();
            
            const currentSlide = document.querySelector(`.bite-slide[data-index="${currentIndex}"]`);
            if(currentSlide) currentSlide.querySelector('.bite-ui-layer').style.opacity = '0';
        }, 250); 
    };

    window.handlePointerUp = function(event, index) {
        if(event.target.closest('.side-actions') || event.target.closest('.bottom-info') || document.getElementById('unmute-overlay').classList.contains('active')) return;
        
        clearTimeout(pressTimer);
        
        const currentSlide = document.querySelector(`.bite-slide[data-index="${currentIndex}"]`);
        if(currentSlide) currentSlide.querySelector('.bite-ui-layer').style.opacity = '1';

        const now = Date.now();
        if (!isLongPress && now - lastTapTime < 300) {
            triggerDoubleTapAnimation(event.clientX, event.clientY, currentSlide);
            handleLike(new Event('click'), index);
            lastTapTime = 0; 
            return;
        }
        lastTapTime = now;

        if (isLongPress) {
            playActivePlayer(); 
        } else {
            setTimeout(() => {
                if (Date.now() - lastTapTime > 250) toggleMute();
            }, 300);
        }
        isLongPress = false;
    };

    window.handlePointerLeave = function(event) {
        clearTimeout(pressTimer);
        const currentSlide = document.querySelector(`.bite-slide[data-index="${currentIndex}"]`);
        if(currentSlide) currentSlide.querySelector('.bite-ui-layer').style.opacity = '1';

    // ==========================================================================
    // SCROLL-SYNC ENGINE (🔥 GPU ACCELERATED TRANSFORMS 🔥)
    // ==========================================================================
    function syncPlayersToScrollPosition() {
        const viewport = document.getElementById('bites-viewport');
        if (!viewport || playersReady < 2) return;
        
        const slideHeight = viewport.clientHeight;
        const scrollPosition = viewport.scrollTop;
        const actualIndex = Math.round(scrollPosition / slideHeight) || 0;

        if (actualIndex >= 0 && actualIndex < bitesQueue.length) {
            if (actualIndex !== currentIndex) {
                currentIndex = actualIndex;
                if(bitesQueue[currentIndex]) markAsViewed(bitesQueue[currentIndex].videoId);
                swapPlayers();
                if (hasStarted) currentVideoStartTime = Date.now();
            } else {
                if (hasStarted) {
                    if(bitesQueue[currentIndex]) markAsViewed(bitesQueue[currentIndex].videoId);
                    playActivePlayer();
                }
            }
        }
    }

    let lastScrollProcessTime = 0; 
    let lastScrollDir = 'down';
    let scrollStopTimer = null;

    function handleScroll() {
        if (!hasStarted) return;

        const now = Date.now();
        const viewport = document.getElementById('bites-viewport');
        const slideHeight = viewport.clientHeight;
        const scrollPosition = viewport.scrollTop;

        // 🔥 DYNAMIC PLAYER GPU LEAPFROG TO SWIPE WITH SLIDES 🔥
        const inactiveId = activePlayer === 'A' ? 'player-container-b' : 'player-container-a';
        const inactiveEl = document.getElementById(inactiveId);
        const inactivePlayerObj = activePlayer === 'A' ? playerB : playerA;
        
        if (scrollPosition < currentIndex * slideHeight - 10) {
            if (lastScrollDir !== 'up') {
                lastScrollDir = 'up';
                inactiveEl.style.transform = `translateY(${(currentIndex - 1) * slideHeight}px)`;
                const prevVid = bitesQueue[currentIndex - 1]?.videoId;
                if (prevVid) {
                    inactivePlayerObj.cueVideoById(prevVid);
                    if(activePlayer === 'A') currentLoadedB = prevVid; else currentLoadedA = prevVid;
                }
            }
        } else if (scrollPosition > currentIndex * slideHeight + 10) {
            if (lastScrollDir !== 'down') {
                lastScrollDir = 'down';
                inactiveEl.style.transform = `translateY(${(currentIndex + 1) * slideHeight}px)`;
                const nextVid = bitesQueue[currentIndex + 1]?.videoId;
                if (nextVid) {
                    inactivePlayerObj.cueVideoById(nextVid);
                    if(activePlayer === 'A') currentLoadedB = nextVid; else currentLoadedA = nextVid;
                }
            }
        }
        
        const newIndex = Math.round(scrollPosition / slideHeight);

        if (newIndex === bitesQueue.length) {
            if (playerA && typeof playerA.pauseVideo === 'function') playerA.pauseVideo();
            if (playerB && typeof playerB.pauseVideo === 'function') playerB.pauseVideo();
            stopProgressBar();
            
            if (!isFetching && !isSearchPlaying) {
                const loaderText = document.querySelector('.loader-text');
                if (loaderText) loaderText.innerText = "Finding more bites...";
                fetchMoreBites();
            }
            return; 
        }

        if (newIndex !== currentIndex && newIndex >= 0 && newIndex < bitesQueue.length) {
            if (now - lastScrollProcessTime < 100) return;
            lastScrollProcessTime = now;
            
            const timeSpentMs = now - currentVideoStartTime;
            const previousBite = bitesQueue[currentIndex];
            
            // Push heavy NLP math to background worker
            setTimeout(() => { processEngagementAlgorithm(previousBite, timeSpentMs); }, 50);

            currentIndex = newIndex;
            if(bitesQueue[currentIndex]) markAsViewed(bitesQueue[currentIndex].videoId); 
            
            currentVideoStartTime = Date.now(); 
            cleanUpQueueAndCache();
            swapPlayers();

            if (currentIndex >= bitesQueue.length - 5 && !isFetching) {
                if (!isSearchPlaying) fetchMoreBites(); 
            }
        }

        clearTimeout(scrollStopTimer);
        scrollStopTimer = setTimeout(() => {
            const finalIndex = Math.round(viewport.scrollTop / slideHeight);
            if (finalIndex === currentIndex && hasStarted && !isLongPress) {
                playActivePlayer();
            }
        }, 150);
    }

    // ==========================================================================
    // 🧠 THE BATCHED DEEP-LEARNING ALGORITHM 
    // ==========================================================================
    let pendingInterestUpdates = {};
    let interestSyncTimer = null;

    function queueInterestUpdate(category, scoreChange) {
        if(!myUid || !category) return;
        const key = `interests.${category.toLowerCase()}`;
        
        if (pendingInterestUpdates[key]) pendingInterestUpdates[key] += scoreChange;
        else pendingInterestUpdates[key] = scoreChange;

        if(!interestSyncTimer) {
            interestSyncTimer = setTimeout(syncInterestsToFirestore, 15000); 
        }
    }

    function syncInterestsToFirestore() {
        if(Object.keys(pendingInterestUpdates).length === 0 || !myUid) return;
        
        let firestoreUpdates = {};
        for(let key in pendingInterestUpdates) {
            firestoreUpdates[key] = firebase.firestore.FieldValue.increment(pendingInterestUpdates[key]);
        }

        firestoreUpdates['lastInterestSyncTS'] = Date.now();
        
        db.collection("users").doc(myUid).set(firestoreUpdates, { merge: true }).catch(e => {});
        
        pendingInterestUpdates = {}; 
        interestSyncTimer = null;
    }

    function processEngagementAlgorithm(bite, timeSpentMs) {
        if (!bite || isSearchPlaying) return;

        let scoreChange = 0;
        let shouldExtractTags = false;

        if (timeSpentMs < 2500) {
            scoreChange = -3;
        } else if (timeSpentMs >= 7000) { 
            scoreChange = 5; 
            shouldExtractTags = true; 
        } else {
            scoreChange = 1;
        }

        const nlpResult = AdvancedNeuralAnalyzer.analyze(bite.title + " " + bite.author + " " + (bite.description || ""));
        
        if (shouldExtractTags && nlpResult.sentiment > 1) scoreChange += 2;
        if (timeSpentMs < 2500 && nlpResult.sentiment < -1) scoreChange -= 2;

        if(scoreChange !== 0) queueInterestUpdate(bite.category, scoreChange);

        if (shouldExtractTags) {
            nlpResult.topics.slice(0, 4).forEach(tag => queueInterestUpdate(tag, 3));
        }
    }

    function trackExplicitAction(category, action, biteTitle = "", biteAuthor = "") {
        if (!myUid || !category || isSearchPlaying) return;
        
        setTimeout(() => {
            const nlpResult = AdvancedNeuralAnalyzer.analyze(biteTitle + " " + biteAuthor);
            let scoreChange = 0;
            let tags = nlpResult.topics;

            if (action === 'liked') { scoreChange = 15; tags = tags.slice(0, 4); } 
            else if (action === 'searched') { scoreChange = 20; }
            else if (action === 'rewatched') { scoreChange = 8; tags = tags.slice(0, 4); }
            else if (action === 'shared') { scoreChange = 25; tags = tags.slice(0, 6); }

            if(scoreChange !== 0) queueInterestUpdate(category, scoreChange);
            tags.forEach(tag => queueInterestUpdate(tag, 5));
        }, 50); // Background it to prevent UI lag
    }

    // ==========================================================================
    // DETERMINISTIC PLAYER SWAPPER & SEAMLESS COVER LOGIC
    // ==========================================================================
    function swapPlayers() {
        if (!playerA || !playerB) return;
        
        const currentVid = bitesQueue[currentIndex]?.videoId;
        const nextVid = bitesQueue[currentIndex + 1]?.videoId;
        const isEven = currentIndex % 2 === 0;

        if (typeof playerA.pauseVideo === 'function') playerA.pauseVideo();
        if (typeof playerB.pauseVideo === 'function') playerB.pauseVideo();

        stopProgressBar(); 

        const allCovers = document.querySelectorAll('.video-cover');
        allCovers.forEach(c => {
            if (c.id !== `cover-${currentIndex}`) c.style.opacity = '1'; 
        });

        const viewport = document.getElementById('bites-viewport');
        const h = viewport ? viewport.clientHeight : 0;

        if (isEven) {
            activePlayer = 'A';
            document.getElementById('player-container-b').classList.remove('active');
            document.getElementById('player-container-a').classList.add('active');
            
            document.getElementById('player-container-a').style.transform = `translateY(${currentIndex * h}px)`;
            
            if (currentVid) {
                if (currentLoadedA !== currentVid) {
                    hasStarted ? playerA.loadVideoById(currentVid) : playerA.cueVideoById(currentVid);
                    currentLoadedA = currentVid;
                } else if (hasStarted && !isLongPress) playerA.playVideo();
            }
            if (nextVid && currentLoadedB !== nextVid) {
                document.getElementById('player-container-b').style.transform = `translateY(${((currentIndex + 1) * h)}px)`;
                playerB.cueVideoById(nextVid);
                currentLoadedB = nextVid;
            }
        } else {
            activePlayer = 'B';
            document.getElementById('player-container-a').classList.remove('active');
            document.getElementById('player-container-b').classList.add('active');
            
            document.getElementById('player-container-b').style.transform = `translateY(${currentIndex * h}px)`;
            
            if (currentVid) {
                if (currentLoadedB !== currentVid) {
                    hasStarted ? playerB.loadVideoById(currentVid) : playerB.cueVideoById(currentVid);
                    currentLoadedB = currentVid;
                } else if (hasStarted && !isLongPress) playerB.playVideo();
            }
            if (nextVid && currentLoadedA !== nextVid) {
                document.getElementById('player-container-a').style.transform = `translateY(${((currentIndex + 1) * h)}px)`;
                playerA.cueVideoById(nextVid);
                currentLoadedA = nextVid;
            }
        }
    }

    function playActivePlayer() {
        const p = activePlayer === 'A' ? playerA : playerB;
        if (bitesQueue[currentIndex] && p && typeof p.playVideo === 'function') {
            const currentVid = bitesQueue[currentIndex].videoId;
            if(activePlayer === 'A' && currentLoadedA !== currentVid) {
                p.loadVideoById(currentVid);
                currentLoadedA = currentVid;
            } else if(activePlayer === 'B' && currentLoadedB !== currentVid) {
                p.loadVideoById(currentVid);
                currentLoadedB = currentVid;
            }
            
            if (globalMuted && typeof p.mute === 'function') p.mute();
            else if (!globalMuted && typeof p.unMute === 'function') p.unMute();
            
            p.playVideo();

            setTimeout(() => {
                if (typeof p.getPlayerState === 'function' && p.getPlayerState() !== 1 && !isLongPress) {
                    p.playVideo();
                }
            }, 300);
        }
    }

    // 🚀 HIDE COVER SEAMLESSLY AND FORCE LOOP
    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.PLAYING) {
            const cover = document.getElementById(`cover-${currentIndex}`);
            if (cover) cover.style.opacity = '0'; 
            startProgressBar(event.target);
        } else if (event.data !== YT.PlayerState.PLAYING) {
            stopProgressBar();
        }

        // 🚀 FLAWLESS HARD VIDEO LOOPING ENFORCEMENT
        if (event.data === YT.PlayerState.ENDED) {
            event.target.seekTo(0);  
            event.target.playVideo(); 
            if(bitesQueue[currentIndex]) {
                trackExplicitAction(bitesQueue[currentIndex].category, 'rewatched', bitesQueue[currentIndex].title, bitesQueue[currentIndex].author);
            }
        }
    }

    // ==========================================================================
    // BULLETPROOF LINEAR FETCHING ENGINE 
    // ==========================================================================
    async function fetchMoreBites(overrideTopic = null) {
        if (isFetching) return;
        isFetching = true;

        const loaderText = document.querySelector('.loader-text');
        if (bitesQueue.length === 0) {
            document.getElementById('main-skeleton').style.display = 'flex';
        } else if (loaderText) {
            loaderText.innerText = "Scanning network for new bites...";
        }

        let queryTopic = overrideTopic || (myInterests.length > 0 ? myInterests.join(',') : "tamil");
        let success = false;
        let attempts = 0;

        while (!success && attempts < 3) {
            attempts++;
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);

                let fetchUrl = `https://pish-uigm.onrender.com/api/reels?topic=${encodeURIComponent(queryTopic)}`;
                if (attempts > 1) {
                    const bustWords = ["viral", "hits", "trending", "wow"];
                    fetchUrl += `+${bustWords[Math.floor(Math.random() * bustWords.length)]}`;
                }

                const res = await fetch(fetchUrl, { signal: controller.signal });
                clearTimeout(timeoutId);

                const data = await res.json();
                
                if (data.success && data.bites && data.bites.length > 0) {
                    const uniqueNewBites = [];
                    data.bites.forEach(b => {
                        if (viewedVideoIds.has(b.videoId) || bitesHistory.includes(b.videoId) || bitesQueue.some(q => q.videoId === b.videoId)) return;
                        viewedVideoIds.add(b.videoId);
                        uniqueNewBites.push(b);
                    });

                    if (uniqueNewBites.length > 0) {
                        let staggerDelay = 0;
                        uniqueNewBites.forEach((b, idx) => {
                            setTimeout(() => {
                                bitesQueue.push(b);
                                renderDOMSlides();
                                if (idx === 0) {
                                    syncPlayersToScrollPosition(); 
                                    if (!hasStarted) {
                                        startFeed();
                                    } else if (!isLongPress) {
                                        playActivePlayer(); 
                                    }
                                }
                                if (idx === uniqueNewBites.length - 1) {
                                    cleanUpQueueAndCache(); 
                                }
                            }, staggerDelay);
                            staggerDelay += 150; 
                        });
                        success = true;
                    }
                }
            } catch (error) {}
        }

        if (!success && loaderText) loaderText.innerText = "Network slow or no new videos. Scroll to retry.";
        isFetching = false; 
    }

    // 🚀 DYNAMIC SHARING ENGINE 
    window.shareBite = function(event, index) {
        event.stopPropagation();
        const bite = bitesQueue[index];

        trackExplicitAction(bite.category || "trending", 'shared', bite.title, bite.author);

        const shareModal = document.getElementById('share-bites-modal');
        const navBar = document.querySelector('main-navbar');
        
        if (shareModal && typeof shareModal.open === 'function') {
            if (navBar) navBar.style.display = 'none';
            
            const p = activePlayer === 'A' ? playerA : playerB;
            if (p && typeof p.pauseVideo === 'function') p.pauseVideo();
            
            if (!shareModal._navPatch) {
                const origClose = shareModal.close;
                shareModal.close = function(triggerBack) {
                    if (navBar) navBar.style.display = 'block';
                    if (!isSearchPlaying && hasStarted) {
                        const activeP = activePlayer === 'A' ? playerA : playerB;
                        if (activeP && typeof activeP.playVideo === 'function') activeP.playVideo();
                    }
                    origClose.apply(this, arguments);
                };
                shareModal._navPatch = true;
            }
            shareModal.open(bite);
        } else {
            const shareUrl = `${window.location.origin}${window.location.pathname}?v=${bite.videoId}`;
            if (navigator.share) {
                navigator.share({ title: bite.title, text: `Check out this Bite on Goorac!`, url: shareUrl }).catch(e => {});
            } else {
                navigator.clipboard.writeText(shareUrl).then(() => {
                    const btnText = event.currentTarget.querySelector('.share-text');
                    const originalText = btnText.innerText;
                    btnText.innerText = "Copied!";
                    setTimeout(() => btnText.innerText = originalText, 2000);
                }).catch(e => {});
            }
        }
    }

    function formatNumber(num) {
        if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return num;
    }

    // ==========================================================================
    // 🔥 FIX: FLAWLESS INSTAGRAM-STYLE DISCOVER MODAL
    // ==========================================================================
    window.openDiscoverModal = function() {
        document.getElementById('discover-modal').classList.add('active');
        history.pushState({ modal: 'discover' }, "", "#discover");
        
        const grid = document.getElementById('search-grid');
        if(grid.children.length <= 1) executeSearch("tamil");
        
        const p = activePlayer === 'A' ? playerA : playerB;
        if (p && typeof p.pauseVideo === 'function') p.pauseVideo();
    }

    window.closeDiscoverModal = function(shouldGoBack) {
        document.getElementById('discover-modal').classList.remove('active');
        if(shouldGoBack && window.location.hash === "#discover") history.back();
        
        if (!isSearchPlaying && hasStarted) {
            const p = activePlayer === 'A' ? playerA : playerB;
            if (p && typeof p.playVideo === 'function') p.playVideo();
        }
    }

    window.onpopstate = (e) => { 
        const hash = window.location.hash;

        if (isSearchPlaying && hash === '#discover') {
            isSearchPlaying = false;
            
            bitesQueue = [...backupQueue];
            currentIndex = backupIndex;
            
            const viewport = document.getElementById('bites-viewport');
            const playerA_el = document.getElementById('player-container-a');
            const playerB_el = document.getElementById('player-container-b');
            
            // 🔥 FIX: DO NOT REMOVE IFRAMES. JUST CLEAR THE SLIDES!
            document.querySelectorAll('.bite-slide').forEach(el => el.remove());
            const loader = document.getElementById('infinite-loader-slide');
            if (loader) loader.remove();
            
            playerA_el.style.transform = 'translateY(0px)';
            playerB_el.style.transform = 'translateY(0px)';
            
            renderDOMSlides();
            
            const slideHeight = viewport.clientHeight;
            viewport.scrollTop = currentIndex * slideHeight;
            currentVideoStartTime = Date.now(); 
            
            syncPlayersToScrollPosition(); 
            document.getElementById('discover-modal').classList.add('active');
            
            const p = activePlayer === 'A' ? playerA : playerB;
            if (p && typeof p.pauseVideo === 'function') p.pauseVideo();
            
            return;
        }

        if(document.getElementById('discover-modal').classList.contains('active') && hash !== '#discover') {
            closeDiscoverModal(false);
        }
    };

    let searchTimeout;
    document.getElementById('search-input').addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        const val = e.target.value.trim();
        searchTimeout = setTimeout(() => {
            if(val.length > 1) executeSearch(val);
        }, 600);
    });

    async function executeSearch(query) {
        const grid = document.getElementById('search-grid');
        
        let skelHtml = '';
        // NEW: Added inline styles to guarantee skeleton rendering
        for(let i=0; i<18; i++) { 
            skelHtml += `<div class="skel-grid-item skel-shimmer" style="width:100%; min-height:150px; aspect-ratio:9/16; background:#1a1a1a; border-radius:4px;"></div>`; 
        }
        grid.innerHTML = skelHtml;

        try {
            // 🔥 FIX: Cache Buster Timestamp for fresh search results
            const res = await fetch(`https://pish-uigm.onrender.com/api/reels?topic=${encodeURIComponent(query)}&search=true&t=${Date.now()}`);
            const data = await res.json();
            
            if (data.success && data.bites.length > 0) {
                grid.innerHTML = '';
                data.bites.forEach(bite => {
                    const el = document.createElement('div');
                    el.className = 'grid-item';
                    el.onclick = () => launchSearchResultFeed(bite, data.bites);
                    el.innerHTML = `
                        <img src="${bite.imgUrl}">
                        <div class="views-overlay"><span class="material-icons-round" style="font-size:14px;">play_arrow</span> ${formatNumber(bite.likes)}</div>
                    `;
                    grid.appendChild(el);
                });
            } else {
                grid.innerHTML = `<div style="grid-column: 1 / -1; text-align:center; padding: 50px 20px; color: #666;">No results found.</div>`;
            }
        } catch (error) {
            grid.innerHTML = `<div style="grid-column: 1 / -1; text-align:center; padding: 50px 20px; color: #ff4444;">Connection failed.</div>`;
        }
    }

    function launchSearchResultFeed(clickedBite, allResults) {
        const searchInputBox = document.getElementById('search-input');
        if (searchInputBox && searchInputBox.value.trim()) {
            trackExplicitAction(searchInputBox.value.trim(), 'searched');
        }

        backupQueue = [...bitesQueue];
        backupIndex = currentIndex;
        isSearchPlaying = true;

        history.pushState({ modal: 'search-playing' }, "", "#search-playing");
        document.getElementById('discover-modal').classList.remove('active');
        
        const otherResults = allResults.filter(b => b.videoId !== clickedBite.videoId);
        bitesQueue = [clickedBite, ...otherResults];
        
        const viewport = document.getElementById('bites-viewport');
        const playerA_el = document.getElementById('player-container-a');
        const playerB_el = document.getElementById('player-container-b');
        
        // 🔥 FIX: SAFELY RESET UI WITHOUT DESTROYING IFRAMES
        document.querySelectorAll('.bite-slide').forEach(el => el.remove());
        const loader = document.getElementById('infinite-loader-slide');
        if (loader) loader.remove();
        
        playerA_el.style.transform = 'translateY(0px)';
        playerB_el.style.transform = 'translateY(0px)';
        
        currentIndex = 0;
        viewport.scrollTop = 0;
        viewedVideoIds.clear();

        renderDOMSlides();
        currentVideoStartTime = Date.now(); 
        
        syncPlayersToScrollPosition(); 
    }

</script>
