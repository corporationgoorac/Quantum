<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Goorac | Bites</title>
    
    <script src="config.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script type="module" src="components/presence.js"></script>
    <script src="components/navbar.js" defer></script>
    
    <script src="https://www.youtube.com/iframe_api"></script>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <style>
        /* ==========================================================================
           GLOBAL RESET & THEME
           ========================================================================== */
        * { box-sizing: border-box !important; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #000;
            --accent: #00d2ff;
            --border: rgba(255, 255, 255, 0.1);
            --text-dim: #888;
            --danger: #ff4444;
            --glass: rgba(0, 0, 0, 0.4);
            --text-main: #ffffff;
            --nav-height: calc(65px + env(safe-area-inset-bottom)); /* Dynamic Nav Height */
        }

        body {
            background: var(--bg); color: white; margin: 0;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden; /* STRICT LOCK FOR REELS FEED */
            width: 100vw; height: 100vh;
        }

        /* ==========================================================================
           HEADER (TRANSPARENT FLOATING)
           ========================================================================== */
        header {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 15px 20px; display: flex; justify-content: space-between;
            align-items: center; z-index: 1000;
            padding-top: max(15px, env(safe-area-inset-top));
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            pointer-events: none; /* Let clicks pass through except on icons */
        }
        .header-title { font-weight: 800; font-size: 1.4rem; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.5); pointer-events: auto; }
        .header-right { pointer-events: auto; }
        
        .search-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            color: #fff; cursor: pointer; border: 1px solid rgba(255,255,255,0.2);
            transition: 0.2s;
        }
        .search-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }

        /* ==========================================================================
           THE VIRTUAL SWIPER ENGINE (CSS SNAP)
           ========================================================================== */
        #bites-viewport {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            overflow-y: scroll; scroll-snap-type: y mandatory;
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
            z-index: 10; padding-bottom: var(--nav-height);
            scroll-behavior: smooth; /* Advanced smooth scrolling capability */
        }
        #bites-viewport::-webkit-scrollbar { display: none; }

        .bite-slide {
            width: 100vw; height: calc(100vh - var(--nav-height));
            scroll-snap-align: start; scroll-snap-stop: always;
            position: relative;
        }

        /* THE HARDWARE PLAYERS (FIXED BEHIND SCROLL) */
        .yt-player-container {
            position: fixed; top: 0; left: 0; width: 100vw; 
            height: calc(100vh - var(--nav-height));
            z-index: 1; opacity: 0; pointer-events: none; background: #000;
            transform: scale(1.05); /* Slight scale to hide YouTube borders */
            transition: opacity 0.35s ease-in-out; /* Enhanced smooth crossfade between players */
        }
        .yt-player-container.active { opacity: 1; z-index: 2; }
        .yt-iframe { width: 100%; height: 100%; pointer-events: none; }

        /* ==========================================================================
           BITES UI OVERLAY (Tiktok Style) - PERFECTLY ALIGNED
           ========================================================================== */
        .bite-ui-layer {
            position: absolute; inset: 0; z-index: 20;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 15px; 
            /* Gradient fades out higher up to keep text legible */
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 45%);
            padding-bottom: 25px; /* Breathing room strictly relative to the slide's bottom */
        }

        .side-actions {
            position: absolute; right: 15px; 
            bottom: 25px; /* Aligned with bottom text */
            display: flex; flex-direction: column; gap: 25px; align-items: center;
        }

        .action-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; color: #fff; cursor: pointer; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); transition: 0.2s;}
        .action-btn:active { transform: scale(0.85); }
        .action-btn .material-icons-round { font-size: 34px; }
        .action-btn span.count { font-size: 0.75rem; font-weight: 700; }
        
        .action-btn.liked .material-icons-round { color: var(--danger); }
        .action-btn.liked { animation: heartPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes heartPop { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }

        .creator-pfp-wrap { position: relative; width: 45px; height: 45px; margin-bottom: 10px; }
        .creator-pfp { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #fff; object-fit: cover; background: #222; }
        .follow-badge {
            position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #000; width: 18px; height: 18px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900;
            border: 2px solid #000;
        }

        .bottom-info { max-width: 78%; padding-bottom: 5px; }
        .bite-author { font-size: 1rem; font-weight: 800; color: #fff; margin-bottom: 8px; text-shadow: 0 1px 5px rgba(0,0,0,0.8); display: flex; align-items: center; gap: 6px; }
        .bite-desc { font-size: 0.9rem; color: #eee; line-height: 1.4; text-shadow: 0 1px 5px rgba(0,0,0,0.8); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        /* ==========================================================================
           INFINITE SCROLL LOADER SLIDE
           ========================================================================== */
        .loader-slide {
            width: 100vw; height: calc(100vh - var(--nav-height));
            scroll-snap-align: start; scroll-snap-stop: always;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: transparent; color: #666;
        }
        .circular-loader {
            width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader-text { margin-top: 15px; font-size: 0.85rem; font-weight: 600; letter-spacing: 1px; }

        /* ==========================================================================
           SEARCH DISCOVER MODAL (Instagram Style)
           ========================================================================== */
        #discover-modal {
            position: fixed; top: 0; right: -100%; width: 100vw; height: 100vh;
            background: #000; z-index: 2000; transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column;
        }
        #discover-modal.active { right: 0; }

        .modal-header {
            padding: 15px 20px; padding-top: max(15px, env(safe-area-inset-top));
            display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); background: #000;
        }
        .back-btn { background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; display: flex; align-items: center; }
        .search-input-box {
            flex: 1; background: #1a1a1a; border: 1px solid #333; padding: 12px 16px;
            border-radius: 14px; color: #fff; font-size: 16px; outline: none; transition: 0.2s;
        }
        .search-input-box:focus { border-color: var(--accent); background: #222; }

        .grid-results {
            flex: 1; overflow-y: auto; padding: 2px;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;
            align-content: start;
        }

        .grid-item {
            aspect-ratio: 9 / 16; background: #111; position: relative; cursor: pointer; overflow: hidden;
        }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .grid-item:active img { transform: scale(1.05); }
        .grid-item .views-overlay {
            position: absolute; bottom: 5px; left: 5px; font-size: 0.7rem; font-weight: 700; color: #fff;
            display: flex; align-items: center; gap: 3px; text-shadow: 0 1px 3px #000;
        }

        .skel-grid-item { aspect-ratio: 9 / 16; background: #1a1a1a; animation: skelPulse 1.5s infinite; }
        @keyframes skelPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* PLAY/PAUSE OVERLAY INDICATOR */
        .play-indicator {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 70px; height: 70px; background: rgba(0,0,0,0.5); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: #fff;
            opacity: 0; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 30; pointer-events: none;
        }
        .play-indicator .material-icons-round { font-size: 40px; }
        .play-indicator.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }

        /* TAP TO START SCREEN */
        #start-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #fff; cursor: pointer; backdrop-filter: blur(10px); transition: opacity 0.3s;
        }
        .start-btn-pulse { width: 80px; height: 80px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px var(--accent); animation: startPulse 2s infinite; margin-bottom: 20px; color: #000; }
        @keyframes startPulse { 0% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(0, 210, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0); } }

        /* MAIN FEED SKELETON LOADER */
        #main-skeleton {
            position: absolute; inset: 0; z-index: 15; background: #000;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 15px; padding-bottom: 25px;
        }
        .skel-side { position: absolute; right: 15px; bottom: 25px; display: flex; flex-direction: column; gap: 25px; align-items: center; }
        .skel-circle { width: 45px; height: 45px; border-radius: 50%; background: #1a1a1a; animation: skelPulse 1.5s infinite; }
        .skel-bottom { max-width: 78%; }
        .skel-line-long { height: 16px; width: 60%; background: #1a1a1a; border-radius: 8px; margin-bottom: 12px; animation: skelPulse 1.5s infinite; }
        .skel-line-short { height: 14px; width: 40%; background: #1a1a1a; border-radius: 8px; margin-bottom: 10px; animation: skelPulse 1.5s infinite; }

        /* 🚀 MAIN NAVBAR */
        main-navbar { 
            display: block; position: fixed; bottom: 0; left: 0; width: 100%;
            height: var(--nav-height); background-color: var(--bg); z-index: 1000; 
        }
    </style>
</head>
<body>

<div id="start-screen" onclick="initExperience()">
    <div class="start-btn-pulse"><span class="material-icons-round" style="font-size:40px;">play_arrow</span></div>
    <h2 style="margin:0; font-weight:800; font-size:1.5rem;">Tap to enter Bites</h2>
    <p style="color:#aaa; font-size:0.9rem; margin-top:10px;">Turn your volume up</p>
</div>

<header>
    <div class="header-title">Bites</div>
    <div class="header-right">
        <div class="search-btn" onclick="openDiscoverModal()">
            <span class="material-icons-round">search</span>
        </div>
    </div>
</header>

<div id="player-container-a" class="yt-player-container active"><div id="yt-player-a" class="yt-iframe"></div></div>
<div id="player-container-b" class="yt-player-container"><div id="yt-player-b" class="yt-iframe"></div></div>

<div id="main-skeleton" style="display:none;">
    <div class="skel-side">
        <div class="skel-circle"></div>
        <div class="skel-circle" style="width:35px; height:35px;"></div>
        <div class="skel-circle" style="width:35px; height:35px;"></div>
        <div class="skel-circle" style="width:35px; height:35px;"></div>
    </div>
    <div class="skel-bottom">
        <div class="skel-line-long"></div>
        <div class="skel-line-short"></div>
        <div class="skel-line-short" style="width: 30%;"></div>
    </div>
</div>

<div class="play-indicator" id="play-pause-icon"><span class="material-icons-round" id="pp-icon-inner">pause</span></div>

<div id="bites-viewport" onscroll="handleScroll()">
    </div>

<div id="discover-modal">
    <div class="modal-header">
        <button class="back-btn" onclick="closeDiscoverModal(true)"><span class="material-icons-round">west</span></button>
        <input type="text" id="search-input" class="search-input-box" placeholder="Search trending topics..." autocomplete="off">
    </div>
    <div class="grid-results" id="search-grid">
        <div style="grid-column: 1 / -1; text-align:center; padding: 50px 20px; color: #666;">
            <span class="material-icons-round" style="font-size: 50px; opacity:0.5; margin-bottom: 10px;">explore</span>
            <p style="font-weight:600; font-size:1.1rem;">Discover New Bites</p>
            <p style="font-size:0.85rem; margin-top:5px;">Search for gaming, comedy, tech, and more.</p>
        </div>
    </div>
</div>

<main-navbar></main-navbar>

<script>
    // ==========================================================================
    // SYSTEM & FIREBASE INIT
    // ==========================================================================
    if (typeof window.initFirebaseCore === 'function') window.initFirebaseCore();
    else if (!firebase.apps.length && window.firebaseConfig) firebase.initializeApp(window.firebaseConfig);

    const db = firebase.firestore();
    const auth = firebase.auth();
    let myUid = null;
    let myInterests = ["tamil"]; // Default array if completely fresh user

    auth.onAuthStateChanged(user => {
        if (user) { 
            myUid = user.uid; 
            // 🚀 SMART ALGORITHM INIT: Fetch top 5 interests from DB
            db.collection("users").doc(myUid).get().then(doc => {
                if(doc.exists && doc.data().interests) {
                    const ints = doc.data().interests;
                    // Sort descending by score, grab the top 5 topic names
                    myInterests = Object.keys(ints).sort((a,b) => ints[b] - ints[a]).slice(0, 5);
                    if(myInterests.length === 0) myInterests = ["tamil"]; // Failsafe
                }
            });
        } 
        else { window.location.href = 'login.html'; }
    });

    // ==========================================================================
    // THE BITES ENGINE (STATE & CACHE)
    // ==========================================================================
    let bitesQueue = [];
    let currentIndex = 0;
    let isFetching = false;
    let fetchTimeoutFallback = null; // Failsafe for stuck loading
    let hasStarted = false;
    let viewedVideoIds = new Set(); 
    
    // 🚀 TELEMETRY & ENGAGEMENT TRACKING
    let bitesHistory = JSON.parse(localStorage.getItem('goorac_bites_history') || '[]');
    let currentVideoStartTime = 0; // Tracks exactly when the user landed on the slide

    // Backup State for Temporary Search Mode
    let backupQueue = [];
    let backupIndex = 0;
    let isSearchPlaying = false;

    // The Dual Players
    let playerA, playerB;
    let activePlayer = 'A'; // 'A' or 'B'
    let playersReady = 0;
    
    // 🚀 ADVANCED FIX: Explicitly track loaded states to prevent duplicate playback bugs
    let currentLoadedA = null;
    let currentLoadedB = null;

    // Load from Cache immediately
    (function loadCache() {
        const cached = localStorage.getItem('goorac_bites_queue');
        if (cached) {
            try { 
                const parsed = JSON.parse(cached);
                if (parsed.length > 0) bitesQueue = parsed; 
            } catch(e) {}
        }
    })();

    // ==========================================================================
    // YOUTUBE IFRAME API SETUP
    // ==========================================================================
    function onYouTubeIframeAPIReady() {
        const playerVars = { 'autoplay': 0, 'controls': 0, 'disablekb': 1, 'fs': 0, 'rel': 0, 'modestbranding': 1, 'playsinline': 1, 'mute': 0 };
        
        playerA = new YT.Player('yt-player-a', {
            playerVars: playerVars,
            events: { 'onReady': () => checkPlayersReady(), 'onStateChange': onPlayerStateChange }
        });
        
        playerB = new YT.Player('yt-player-b', {
            playerVars: playerVars,
            events: { 'onReady': () => checkPlayersReady(), 'onStateChange': onPlayerStateChange }
        });
    }

    function checkPlayersReady() {
        playersReady++;
        if (playersReady === 2 && bitesQueue.length > 0) {
            playerA.cueVideoById(bitesQueue[0].videoId);
            currentLoadedA = bitesQueue[0].videoId; // Sync tracker
            if(bitesQueue.length > 1) {
                playerB.cueVideoById(bitesQueue[1].videoId);
                currentLoadedB = bitesQueue[1].videoId; // Sync tracker
            }
            renderDOMSlides();
        } else if (playersReady === 2 && bitesQueue.length === 0) {
            fetchMoreBites("tamil");
        }
    }

    window.initExperience = function() {
        document.getElementById('start-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('start-screen').style.display = 'none', 300);
        hasStarted = true;
        
        if (playersReady === 2 && bitesQueue.length > 0) {
            playActivePlayer();
            currentVideoStartTime = Date.now(); // Start exact telemetry timer
        }
    }

    // ==========================================================================
    // DOM SLIDE RENDERER & INFINITE SCROLL LOADER
    // ==========================================================================
    function renderDOMSlides() {
        const viewport = document.getElementById('bites-viewport');
        const skeleton = document.getElementById('main-skeleton');
        
        if(bitesQueue.length > 0 && skeleton.style.display !== 'none') {
            skeleton.style.display = 'none';
        }

        // Remove the loader slide if it exists so we can append real slides
        const existingLoader = document.getElementById('infinite-loader-slide');
        if (existingLoader) existingLoader.remove();

        // Append missing slides
        while (viewport.children.length < bitesQueue.length) {
            const index = viewport.children.length;
            const bite = bitesQueue[index];
            
            const slide = document.createElement('div');
            slide.className = 'bite-slide';
            slide.dataset.index = index;
            slide.onclick = () => togglePlayPause();

            // Note: .bite-category badge removed per instructions
            slide.innerHTML = `
                <div class="bite-ui-layer">
                    <div class="side-actions">
                        <div class="creator-pfp-wrap" onclick="event.stopPropagation()">
                            <img src="${bite.imgUrl}" class="creator-pfp">
                            <div class="follow-badge">+</div>
                        </div>
                        <div class="action-btn" id="like-btn-${index}" onclick="handleLike(event, ${index})">
                            <span class="material-icons-round">favorite</span>
                            <span class="count">${formatNumber(bite.likes)}</span>
                        </div>
                        <div class="action-btn" onclick="event.stopPropagation()">
                            <span class="material-icons-round">chat_bubble</span>
                            <span class="count">${formatNumber(Math.floor(bite.likes * 0.1))}</span>
                        </div>
                        <div class="action-btn" onclick="shareBite(event, ${index})">
                            <span class="material-icons-round">reply</span>
                            <span class="count">Share</span>
                        </div>
                    </div>
                    <div class="bottom-info" onclick="event.stopPropagation()">
                        <div class="bite-author">${bite.author} <span class="material-icons-round" style="color:var(--accent); font-size:16px;">verified</span></div>
                        <div class="bite-desc">${bite.title}</div>
                    </div>
                </div>
            `;
            viewport.appendChild(slide);
        }

        // Re-append the loader slide to the very bottom
        const loaderSlide = document.createElement('div');
        loaderSlide.id = 'infinite-loader-slide';
        loaderSlide.className = 'loader-slide';
        loaderSlide.innerHTML = `
            <div class="circular-loader"></div>
            <div class="loader-text">Finding more bites...</div>
        `;
        viewport.appendChild(loaderSlide);
    }

    // ==========================================================================
    // SCROLL ENGINE & ALGORITHMIC TELEMETRY
    // ==========================================================================
    let lastScrollProcessTime = 0; // Throttle state
    
    function handleScroll() {
        if (!hasStarted) return;

        const now = Date.now();
        const viewport = document.getElementById('bites-viewport');
        const slideHeight = viewport.clientHeight;
        const scrollPosition = viewport.scrollTop;
        
        const newIndex = Math.round(scrollPosition / slideHeight);

        // Valid scroll event (and not scrolling onto the loading spinner slide)
        if (newIndex !== currentIndex && newIndex >= 0 && newIndex < bitesQueue.length) {
            
            // 🚀 Advanced Throttle to completely kill duplicate firing triggers on erratic scrolls
            if (now - lastScrollProcessTime < 100) return;
            lastScrollProcessTime = now;
            
            // 🚀 1. CALCULATE EXACT TIME SPENT FOR ALGORITHM
            const timeSpentMs = now - currentVideoStartTime;
            const previousBite = bitesQueue[currentIndex];
            
            // Fire telemetry processing
            processEngagementAlgorithm(previousBite, timeSpentMs);
            
            // Store in permanent history memory
            markAsViewed(previousBite.videoId);

            // 🚀 2. UPDATE STATE
            currentIndex = newIndex;
            currentVideoStartTime = Date.now(); // Reset timer for new video
            
            // 3. Clean cache & Swap Players
            cleanUpQueueAndCache();
            swapPlayers();

            // 4. Infinite Fetch Trigger (Fetch when 3 videos away from end)
            if (currentIndex >= bitesQueue.length - 3 && !isFetching) {
                if (!isSearchPlaying) {
                    fetchMoreBites(); 
                }
            }
        }
    }

    // ==========================================================================
    // 🧠 THE DEEP-LEARNING ALGORITHM ENGINE
    // ==========================================================================

    // Extracts #hashtags from text to build the user's specific interest profile
    function extractHashtags(text) {
        if (!text) return [];
        const matches = text.match(/#[\w]+/g);
        return matches ? matches.map(t => t.toLowerCase().replace('#', '')) : [];
    }

    // Processes the watch time and fires updates to Firebase
    function processEngagementAlgorithm(bite, timeSpentMs) {
        if (!bite || isSearchPlaying) return;

        let scoreChange = 0;
        let shouldExtractTags = false;

        if (timeSpentMs < 2500) {
            // PENALTY: User skipped immediately. Subtract points from this category.
            scoreChange = -3;
        } else if (timeSpentMs >= 7000) {
            // REWARD: User watched for > 7 seconds. Boost score and map their specific hashtags.
            scoreChange = 5;
            shouldExtractTags = true;
        } else {
            // NEUTRAL: Watched normally, slight bump.
            scoreChange = 1;
        }

        // Build the Firebase update payload dynamically
        let updates = { [`interests.${bite.category.toLowerCase()}`]: firebase.firestore.FieldValue.increment(scoreChange) };

        if (shouldExtractTags) {
            const tags = extractHashtags(bite.title);
            // Cap at 3 tags per video so database doesn't bloat
            tags.slice(0, 3).forEach(tag => {
                updates[`interests.${tag}`] = firebase.firestore.FieldValue.increment(3); // +3 for tags
            });
        }

        // Fire safely
        if(myUid && scoreChange !== 0) {
            db.collection("users").doc(myUid).set(updates, { merge: true }).catch(e => {});
        }
    }

    // Track explicit actions (Like / Search)
    function trackExplicitAction(category, action, biteTitle = "") {
        if (!myUid || !category || isSearchPlaying) return;
        
        let scoreChange = 0;
        let tags = [];

        if (action === 'liked') {
            scoreChange = 15;
            tags = extractHashtags(biteTitle).slice(0, 3);
        } else if (action === 'searched') {
            scoreChange = 20;
        } else if (action === 'rewatched') {
            scoreChange = 8;
            tags = extractHashtags(biteTitle).slice(0, 3);
        }

        let updates = { [`interests.${category.toLowerCase()}`]: firebase.firestore.FieldValue.increment(scoreChange) };
        tags.forEach(tag => {
            updates[`interests.${tag}`] = firebase.firestore.FieldValue.increment(5); // Explicit tag boost
        });

        db.collection("users").doc(myUid).set(updates, { merge: true }).catch(e => {});
    }

    window.handleLike = function(event, index) {
        event.stopPropagation();
        const btn = document.getElementById(`like-btn-${index}`);
        const bite = bitesQueue[index];
        
        if (!btn.classList.contains('liked')) {
            btn.classList.add('liked');
            let cSpan = btn.querySelector('.count');
            cSpan.innerText = formatNumber(bite.likes + 1);
            
            // Explicit algorithm boost
            trackExplicitAction(bite.category, 'liked', bite.title);
            
            if(navigator.vibrate) navigator.vibrate(50);
        }
    }

    function markAsViewed(videoId) {
        if (!videoId || isSearchPlaying) return; 
        if (!bitesHistory.includes(videoId)) {
            bitesHistory.push(videoId);
            if (bitesHistory.length > 200) bitesHistory.shift(); // Keep RAM clean, max 200 memory
            localStorage.setItem('goorac_bites_history', JSON.stringify(bitesHistory));
        }
    }

    // ==========================================================================
    // HARDWARE PLAYER SWAPPING & LOOPING
    // ==========================================================================
    function swapPlayers() {
        const pA = document.getElementById('player-container-a');
        const pB = document.getElementById('player-container-b');

        // Advanced Fix: Pre-validate state before loading to eliminate same-video bugs
        const currentVid = bitesQueue[currentIndex]?.videoId;
        const nextVid = bitesQueue[currentIndex + 1]?.videoId;

        playerA.pauseVideo();
        playerB.pauseVideo();

        if (activePlayer === 'A') {
            activePlayer = 'B';
            pA.classList.remove('active');
            pB.classList.add('active');
            
            if (currentVid) {
                if(currentLoadedB !== currentVid) {
                    playerB.loadVideoById(currentVid);
                    currentLoadedB = currentVid;
                }
                playerB.playVideo();
            }
            if (nextVid && currentLoadedA !== nextVid && nextVid !== currentVid) {
                playerA.cueVideoById(nextVid);
                currentLoadedA = nextVid;
            }
        } else {
            activePlayer = 'A';
            pB.classList.remove('active');
            pA.classList.add('active');
            
            if (currentVid) {
                if(currentLoadedA !== currentVid) {
                    playerA.loadVideoById(currentVid);
                    currentLoadedA = currentVid;
                }
                playerA.playVideo();
            }
            if (nextVid && currentLoadedB !== nextVid && nextVid !== currentVid) {
                playerB.cueVideoById(nextVid);
                currentLoadedB = nextVid;
            }
        }
    }

    function playActivePlayer() {
        const p = activePlayer === 'A' ? playerA : playerB;
        if (bitesQueue[currentIndex]) {
            const currentVid = bitesQueue[currentIndex].videoId;
            if(activePlayer === 'A' && currentLoadedA !== currentVid) {
                p.loadVideoById(currentVid);
                currentLoadedA = currentVid;
            } else if(activePlayer === 'B' && currentLoadedB !== currentVid) {
                p.loadVideoById(currentVid);
                currentLoadedB = currentVid;
            }
            p.playVideo();
        }
    }

    function togglePlayPause() {
        const p = activePlayer === 'A' ? playerA : playerB;
        const state = p.getPlayerState();
        const icon = document.getElementById('play-pause-icon');
        const inner = document.getElementById('pp-icon-inner');

        if (state === 1) { // Playing
            p.pauseVideo();
            inner.innerText = 'pause';
            icon.classList.add('show');
        } else {
            p.playVideo();
            inner.innerText = 'play_arrow';
            icon.classList.add('show');
            setTimeout(() => icon.classList.remove('show'), 800);
        }
    }

    // 🚀 REWATCH ALGORITHM TRIGGER
    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.ENDED) {
            event.target.playVideo(); // Auto-loop
            
            // If it naturally ends and restarts, they watched the whole thing! Reward it.
            if(bitesQueue[currentIndex]) {
                trackExplicitAction(bitesQueue[currentIndex].category, 'rewatched', bitesQueue[currentIndex].title);
            }
        }
    }

    // ==========================================================================
    // NETWORK FETCHING & STUCK-PREVENTION
    // ==========================================================================
    async function fetchMoreBites(overrideTopic = null) {
        if (isFetching) return;
        isFetching = true;

        if(bitesQueue.length === 0) {
            document.getElementById('main-skeleton').style.display = 'flex';
        }

        // Failsafe: If Render hangs for 10 seconds, unlock the fetcher so they can try again by scrolling
        clearTimeout(fetchTimeoutFallback);
        fetchTimeoutFallback = setTimeout(() => { isFetching = false; }, 10000);

        let queryTopic = overrideTopic;
        if (!queryTopic || queryTopic === "tamil") {
            queryTopic = myInterests.length > 0 ? myInterests.join(',') : "tamil";
        }

        try {
            const res = await fetch(`https://pishaa.onrender.com/api/reels?topic=${encodeURIComponent(queryTopic)}`);
            const data = await res.json();
            
            if (data.success && data.bites.length > 0) {
                // Filter out current session AND historical 200
                const newBites = data.bites.filter(b => !viewedVideoIds.has(b.videoId) && !bitesHistory.includes(b.videoId));
                
                newBites.forEach(b => {
                    viewedVideoIds.add(b.videoId);
                    bitesQueue.push(b);
                });

                renderDOMSlides();
                
                if (currentIndex === 0 && !hasStarted && playersReady === 2) {
                    playerA.cueVideoById(bitesQueue[0].videoId);
                    currentLoadedA = bitesQueue[0].videoId;
                    if(bitesQueue.length > 1) {
                        playerB.cueVideoById(bitesQueue[1].videoId);
                        currentLoadedB = bitesQueue[1].videoId;
                    }
                }
            }
        } catch (error) {
            console.error("Failed to fetch bites", error);
        }
        
        clearTimeout(fetchTimeoutFallback);
        isFetching = false;
    }

    function cleanUpQueueAndCache() {
        if (isSearchPlaying) return; 
        const cacheSlice = bitesQueue.slice(currentIndex);
        localStorage.setItem('goorac_bites_queue', JSON.stringify(cacheSlice.slice(0, 10))); 
    }

    window.shareBite = function(event, index) {
        event.stopPropagation();
        const bite = bitesQueue[index];
        if (navigator.share) {
            navigator.share({
                title: bite.title,
                text: `Check out this Bite on Goorac!`,
                url: `https://youtube.com/watch?v=${bite.videoId}`
            }).catch(e => {});
        }
    }

    function formatNumber(num) {
        if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return num;
    }

    // ==========================================================================
    // INSTAGRAM-STYLE DISCOVER MODAL
    // ==========================================================================
    window.openDiscoverModal = function() {
        document.getElementById('discover-modal').classList.add('active');
        history.pushState({ modal: 'discover' }, "", "#discover");
        
        const grid = document.getElementById('search-grid');
        if(grid.children.length <= 1) executeSearch("tamil");
    }

    window.closeDiscoverModal = function(shouldGoBack) {
        document.getElementById('discover-modal').classList.remove('active');
        if(shouldGoBack && window.location.hash === "#discover") history.back();
    }

    window.onpopstate = (e) => { 
        const hash = window.location.hash;

        // Restore feed gracefully when exiting search mode
        if (isSearchPlaying && hash === '#discover') {
            isSearchPlaying = false;
            
            bitesQueue = [...backupQueue];
            currentIndex = backupIndex;
            
            const viewport = document.getElementById('bites-viewport');
            viewport.innerHTML = '';
            renderDOMSlides();
            
            viewport.scrollTop = currentIndex * viewport.clientHeight;
            currentVideoStartTime = Date.now(); // Restart telemetry timer
            
            // Protected restoring logic
            const currentVid = bitesQueue[currentIndex]?.videoId;
            const nextVid = bitesQueue[currentIndex+1]?.videoId;

            if (activePlayer === 'A') {
                if (currentVid && currentLoadedA !== currentVid) {
                    playerA.loadVideoById(currentVid);
                    currentLoadedA = currentVid;
                }
                playerA.playVideo();
                if(nextVid && currentLoadedB !== nextVid && nextVid !== currentVid) {
                    playerB.cueVideoById(nextVid);
                    currentLoadedB = nextVid;
                }
            } else {
                if (currentVid && currentLoadedB !== currentVid) {
                    playerB.loadVideoById(currentVid);
                    currentLoadedB = currentVid;
                }
                playerB.playVideo();
                if(nextVid && currentLoadedA !== nextVid && nextVid !== currentVid) {
                    playerA.cueVideoById(nextVid);
                    currentLoadedA = nextVid;
                }
            }
            
            document.getElementById('discover-modal').classList.add('active');
            return;
        }

        if(document.getElementById('discover-modal').classList.contains('active') && hash !== '#discover') {
            closeDiscoverModal(false);
        }
    };

    let searchTimeout;
    document.getElementById('search-input').addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        const val = e.target.value.trim();
        searchTimeout = setTimeout(() => {
            if(val.length > 1) executeSearch(val);
        }, 600);
    });

    async function executeSearch(query) {
        const grid = document.getElementById('search-grid');
        
        let skelHtml = '';
        for(let i=0; i<12; i++) { skelHtml += `<div class="skel-grid-item"></div>`; }
        grid.innerHTML = skelHtml;

        try {
            const res = await fetch(`https://pishaa.onrender.com/api/reels?topic=${encodeURIComponent(query)}&search=true`);
            const data = await res.json();
            
            if (data.success && data.bites.length > 0) {
                grid.innerHTML = '';
                data.bites.forEach(bite => {
                    const el = document.createElement('div');
                    el.className = 'grid-item';
                    el.onclick = () => launchSearchResultFeed(bite, data.bites);
                    el.innerHTML = `
                        <img src="${bite.imgUrl}">
                        <div class="views-overlay"><span class="material-icons-round" style="font-size:14px;">play_arrow</span> ${formatNumber(bite.likes)}</div>
                    `;
                    grid.appendChild(el);
                });
            } else {
                grid.innerHTML = `<div style="grid-column: 1 / -1; text-align:center; padding: 50px 20px; color: #666;">No results found.</div>`;
            }
        } catch (error) {
            grid.innerHTML = `<div style="grid-column: 1 / -1; text-align:center; padding: 50px 20px; color: #ff4444;">Connection failed.</div>`;
        }
    }

    // Launch Temporary Search Feed
    function launchSearchResultFeed(clickedBite, allResults) {
        
        const searchInputBox = document.getElementById('search-input');
        if (searchInputBox && searchInputBox.value.trim()) {
            trackExplicitAction(searchInputBox.value.trim(), 'searched');
        }

        backupQueue = [...bitesQueue];
        backupIndex = currentIndex;
        isSearchPlaying = true;

        history.pushState({ modal: 'search-playing' }, "", "#search-playing");
        document.getElementById('discover-modal').classList.remove('active');
        
        const otherResults = allResults.filter(b => b.videoId !== clickedBite.videoId);
        bitesQueue = [clickedBite, ...otherResults];
        
        const viewport = document.getElementById('bites-viewport');
        viewport.innerHTML = '';
        currentIndex = 0;
        viewport.scrollTop = 0;
        viewedVideoIds.clear();

        renderDOMSlides();
        currentVideoStartTime = Date.now(); // Restart telemetry for search feed
        
        const currentVid = bitesQueue[0]?.videoId;
        const nextVid = bitesQueue[1]?.videoId;

        if (activePlayer === 'A') {
            if (currentVid && currentLoadedA !== currentVid) {
                playerA.loadVideoById(currentVid);
                currentLoadedA = currentVid;
            }
            playerA.playVideo();
            if(nextVid && currentLoadedB !== nextVid && nextVid !== currentVid) {
                playerB.cueVideoById(nextVid);
                currentLoadedB = nextVid;
            }
        } else {
            if (currentVid && currentLoadedB !== currentVid) {
                playerB.loadVideoById(currentVid);
                currentLoadedB = currentVid;
            }
            playerB.playVideo();
            if(nextVid && currentLoadedA !== nextVid && nextVid !== currentVid) {
                playerA.cueVideoById(nextVid);
                currentLoadedA = nextVid;
            }
        }
    }

</script>
