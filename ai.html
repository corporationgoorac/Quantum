    <style>
        /* =========================================
           1. CORE VARIABLES & THEME DEFINITIONS
           ========================================= */
        :root { 
            --bg: #000000;
            --bg-gradient: radial-gradient(circle at 50% 30%, #111111 0%, #000000 70%);
            --mobileToolbarBg: rgba(20, 20, 20, 0.75);
            --header-bg: rgba(10, 10, 10, 0.90);
            --header-blur: blur(25px);
            --accent: #FF6D00; 
            --accent-dark: #E65100;
            --accent-dim: rgba(255, 109, 0, 0.2);
            --glass-border: rgba(255, 255, 255, 0.08);
            --border: #1c1c1c; 
            --border-light: rgba(255,255,255,0.1);
            --sent-bg: linear-gradient(135deg, #FF7B00 0%, #E65100 100%);
            --sent-text: #ffffff;
            --sent-shadow: 0 4px 15px rgba(230, 81, 0, 0.35);
            --received-bg: #2A2A2A; 
            --received-text: #F0F0F0;
            --received-shadow: 0 4px 12px rgba(0,0,0,0.5);
            --text: #ffffff; 
            --text-secondary: #a1a1a1;
            --text-muted: #666666;
            --shimmer: linear-gradient(90deg, #1a1a1a 0%, #2a2a2a 50%, #1a1a1a 100%);
            --ease-elastic: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --ease-smooth: cubic-bezier(0.33, 1, 0.68, 1);
            --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-spring: cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* =========================================
           2. RESET & BASE STYLES
           ========================================= */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; -webkit-touch-callout: none; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        
        html, body {
            height: 100vh !important; 
            width: 100vw !important;
            overflow: hidden !important; 
            background-color: var(--bg);
            background-image: var(--bg-gradient); 
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            position: fixed !important; 
            left: 0 !important; 
            top: 0 !important;
            overscroll-behavior: none;
            margin: 0; padding: 0; touch-action: none;
        }

        body { -webkit-user-select: none; user-select: none; color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 16px; }
        div, span, p, img, svg { -webkit-user-select: none; user-select: none; }
        input, textarea { -webkit-user-select: text !important; user-select: text !important; outline: none; font-family: inherit; }

        /* =========================================
           3. ANIMATION KEYFRAMES
           ========================================= */
        @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
        @keyframes flashMessage { 0% { background-color: rgba(255, 152, 0, 0.6) !important; transform: scale(1.02); box-shadow: 0 0 20px rgba(255, 152, 0, 0.5) !important; } 100% { background-color: transparent; transform: scale(1); box-shadow: none; } }
        .flash-active { animation: flashMessage 1.5s ease-out !important; }
        @keyframes fadeStatus { 0% { opacity: 0; transform: translateY(3px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-3px); } 20%, 40%, 60%, 80% { transform: translateX(3px); } }
        @keyframes imgFadeIn { from { opacity: 0; transform: scale(0.99); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideUp { from { opacity: 1; transform: translateY(0); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        @keyframes popOut { 0% { transform: scale(0); opacity: 0; } 50% { transform: scale(1.5); opacity: 1; } 70% { transform: scale(0.9); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes floatUp { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 10% { transform: translateY(-20px) scale(1.2); opacity: 1; } 50% { transform: translateY(-80px) scale(1.1); opacity: 1; } 100% { transform: translateY(-160px) scale(0.9); opacity: 0; } }

        .shake-anim { animation: shake 0.4s ease-in-out; border-color: #ff453a !important; }
        .loading-shimmer { background: var(--shimmer); background-size: 800px 100%; animation: shimmer 2s linear infinite; }
        .instant-load .loading-shimmer { animation: none; background: transparent; }
        .instant-load .chat-media-img { animation: none; }
        .instant-load #chat-flow { opacity: 1 !important; transition: none !important; }

        .app-container { display: flex; flex-direction: column; height: 100vh; height: 100dvh; width: 100%; position: fixed !important; top: 0 !important; left: 0 !important; overflow: hidden; }

        header { position: absolute !important; top: 0 !important; left: 0 !important; right: 0 !important; padding: 0 10px; padding-top: calc(env(safe-area-inset-top) + 6px); height: calc(60px + env(safe-area-inset-top)); background: var(--header-bg); border-bottom: 1px solid var(--border-light); display: flex; align-items: center; gap: 2px; z-index: 2000; backdrop-filter: var(--header-blur); -webkit-backdrop-filter: var(--header-blur); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .back-btn { font-size: 24px; color: var(--accent); cursor: pointer; display: flex; align-items: center; justify-content: center; height: 44px; width: 44px; border-radius: 50%; transition: background 0.2s; margin-right: 0px; }
        .back-btn:active { background: rgba(255,255,255,0.1); }
        .back-btn span { font-size: 32px; font-weight: 500; }
        .h-profile-group { display: flex; align-items: center; gap: 10px; cursor: default; flex: 1; overflow: hidden; padding: 4px; border-radius: 12px; transition: background 0.2s; min-width: 0; margin-right: 4px; }
        .pfp-container { position: relative; width: 38px; height: 38px; flex-shrink: 0; }
        .h-pfp { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.15); transition: opacity 0.3s ease; }
        .h-info { display: flex; flex-direction: column; justify-content: center; gap: 1px; min-width: 0; flex: 1; }
        .h-name { font-weight: 700; font-size: 1.05rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.2px; flex: 1; }
        .h-name-wrapper { display: flex; align-items: center; gap: 4px; width: fit-content; max-width: 100%; }
        .v-badge { width: 16px; height: 16px; display: block; flex-shrink: 0; position: relative; top: -1.7px; }
        .h-username-sub { font-size: 0.8rem; color: #10b981; font-weight: 600; transition: opacity 0.3s ease; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .header-actions { display: flex; align-items: center; gap: 4px; margin-left: auto; padding-right: 2px; flex-shrink: 0; }
        .header-icon { width: 36px; height: 36px; cursor: pointer; color: #ffffff; opacity: 0.9; transition: transform 0.2s, opacity 0.2s; display: flex; align-items: center; justify-content: center; border-radius: 50%; }

        #chat-flow { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0; display: flex; flex-direction: column; -webkit-overflow-scrolling: touch; background: transparent; overscroll-behavior-y: contain; position: relative; touch-action: pan-y !important; overflow-anchor: auto; padding-top: calc(75px + env(safe-area-inset-top)); padding-bottom: 20px; -ms-overflow-style: none; scrollbar-width: none; opacity: 1; }
        #chat-flow::-webkit-scrollbar { display: none; }
        #messages-container { display: flex; flex-direction: column; padding: 0 12px; width: 100%; padding-bottom: 10px; will-change: transform; contain: content; touch-action: pan-y; }

        .typing-row { display: none; align-items: flex-end; margin-bottom: 12px; padding-left: 12px; width: 100%; }
        .typing-avatar { width: 28px; height: 28px; border-radius: 50%; margin-right: 8px; object-fit: cover; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); }
        .typing-bubble { background: var(--received-bg); padding: 12px 16px; border-radius: 18px; border-bottom-left-radius: 4px; display: flex; gap: 4px; align-items: center; width: fit-content; height: 38px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); }
        .typing-dot { width: 6px; height: 6px; background: #888; border-radius: 50%; animation: typingWave 1.4s ease-in-out infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingWave { 0%, 100% { transform: translateY(0); opacity: 0.4; } 50% { transform: translateY(-4px); opacity: 1; } }
        #scroll-trigger { position: absolute; top: 0; left: 0; width: 100%; height: 10px; pointer-events: none; visibility: hidden; z-index: -1; }
        .date-divider { text-align: center; margin: 24px 0 16px 0; font-size: 0.7rem; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; align-self: center; width: fit-content; position: sticky; top: 10px; z-index: 5; background: rgba(20, 20, 20, 0.7); padding: 4px 12px; border-radius: 12px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .time-divider { text-align: center; margin: 20px 0 12px 0; font-size: 0.65rem; color: #777; font-weight: 500; align-self: center; width: 100%; }

        .msg-row { display: flex; width: 100%; margin-bottom: 2px; position: relative; flex-direction: column; overflow: visible; transform: translateZ(0); }
        .msg-row.group-bottom, .msg-row.single { margin-bottom: 18px; }
        .msg-row.sent { align-items: flex-end; padding-right: 0px; }
        .msg-row.received { align-items: flex-start; }
        .received-inner-row { display: flex; align-items: flex-end; gap: 8px; max-width: 100%; position: relative; }
        .msg-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; flex-shrink: 0; margin-bottom: 4px; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); opacity: 0; }
        .msg-avatar.visible { opacity: 1; }
        .msg-bubble-box { position: relative; max-width: 75vw; display: flex; flex-direction: column; transition: transform 0.2s, padding-bottom 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .sent .msg-bubble-box { align-items: flex-end; }
        .received .msg-bubble-box { align-items: flex-start; }
        .bubble { padding: 12px 18px; border-radius: 22px; font-size: 1.05rem; line-height: 1.45; position: relative; word-wrap: break-word; z-index: 2; transition: box-shadow 0.2s ease, filter 0.2s ease; letter-spacing: 0.3px; }
        .bubble.jumbo-emoji { background: transparent !important; border: none !important; box-shadow: none !important; font-size: 2.2rem !important; padding: 0 !important; text-align: center; }
        .bubble:active { filter: brightness(1.1); }
        .sent .bubble { background: var(--sent-bg); color: var(--sent-text); text-align: left; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: var(--sent-shadow); }
        .sent .bubble.single { border-radius: 22px; border-bottom-right-radius: 4px; }
        .sent .bubble.group-top { border-radius: 22px; border-bottom-right-radius: 4px; margin-bottom: 1px; }
        .sent .bubble.group-mid { border-radius: 22px; border-top-right-radius: 4px; border-bottom-right-radius: 4px; margin-bottom: 1px; }
        .sent .bubble.group-bottom { border-radius: 22px; border-top-right-radius: 4px; border-bottom-right-radius: 22px; }
        .received .bubble { background: var(--received-bg); color: var(--received-text); text-align: left; border: 1px solid var(--glass-border); box-shadow: var(--received-shadow); }
        .received .bubble.single { border-radius: 22px; border-bottom-left-radius: 4px; }
        .received .bubble.group-top { border-radius: 22px; border-bottom-left-radius: 4px; margin-bottom: 1px; }
        .received .bubble.group-mid { border-radius: 22px; border-top-left-radius: 4px; border-bottom-left-radius: 4px; margin-bottom: 1px; }
        .received .bubble.group-bottom { border-radius: 22px; border-top-left-radius: 4px; border-bottom-left-radius: 22px; }
        .msg-timestamp-footer { font-size: 0.65rem; color: var(--text-secondary); font-weight: 500; opacity: 0; position: absolute; bottom: 4px; width: 100%; transition: opacity 0.2s ease-in-out; pointer-events: none; }
        .show-timestamps .msg-bubble-box { padding-bottom: 18px !important; }
        .show-timestamps .msg-timestamp-footer { opacity: 1; }
        .received .msg-timestamp-footer { text-align: left; left: 4px; }
        .sent .msg-timestamp-footer { text-align: right; right: 4px; }
        .reaction-badge { position: absolute; bottom: -8px; background: #2a2a2a; border: 2px solid #000; border-radius: 12px; padding: 2px 6px; font-size: 0.8rem; z-index: 20; display: none; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.3); min-width: 24px; text-align: center; }
        .reaction-badge.pop-in { animation: popOut 0.4s var(--ease-spring); }
        .sent .reaction-badge { right: 0; background: #333; color: white; border-color: #000; }
        .received .reaction-badge { left: 0; }
        .seen-status { font-size: 0.65rem; color: var(--text-secondary); margin-top: 2px; margin-right: 2px; text-align: right; font-weight: 500; height: 14px; width: 100%; opacity: 0; animation: fadeStatus 0.4s forwards; position: relative; z-index: 1; }
        
        #scroll-down-btn { position: fixed; bottom: 85px; right: 20px; width: 44px; height: 44px; background: rgba(30, 30, 30, 0.8); border-radius: 50%; display: none; align-items: center; justify-content: center; color: var(--accent); box-shadow: 0 4px 20px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); z-index: 900; cursor: pointer; font-size: 1.2rem; transition: all 0.3s var(--ease-elastic); backdrop-filter: blur(10px); }
        #heart-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 100px; pointer-events: none; z-index: 3000; text-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .floating-emoji { position: fixed; font-size: 40px; pointer-events: none; z-index: 3001; animation: floatUp 1.2s var(--ease-spring) forwards; will-change: transform, opacity; }
        #effect-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 4000; }

        .input-area-container { background: transparent; border-top: 1px solid transparent; padding-bottom: env(safe-area-inset-bottom, 10px); flex-shrink: 0; width: 100%; z-index: 1000; position: relative; margin-top: auto; touch-action: pan-y !important; }
        .input-area { margin: 12px 24px; padding: 4px 8px; display: flex; align-items: flex-end; gap: 8px; background: var(--mobileToolbarBg, rgba(30, 30, 30, 0.75)); border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.15); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); box-shadow: 0 -2px 15px rgba(255, 109, 0, 0.15), 0 8px 25px rgba(0,0,0,0.4); transform: scale(0.96); transform-origin: bottom center; transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1); touch-action: none !important; position: relative; }
        .input-area:focus-within, .input-area.force-expand { margin: 8px 12px; transform: scale(1); border-radius: 26px; background: var(--mobileToolbarBg, rgba(25, 25, 25, 0.95)); border-color: var(--accent); box-shadow: 0 -2px 20px rgba(255, 109, 0, 0.3), 0 8px 25px rgba(255, 109, 0, 0.25); }
        .input-box { flex: 1; background: transparent !important; border-radius: 0; padding: 0; border: none !important; display: flex; align-items: center; min-height: 40px; box-shadow: none !important; }
        .msg-input { width: 100%; background: transparent; border: none; color: white; padding: 8px 4px; font-size: 15px; resize: none; max-height: 140px; overflow-y: auto; line-height: 1.4; touch-action: pan-y; overscroll-behavior-y: contain; }
        .plus-btn { background: rgba(255, 255, 255, 0.08); border-radius: 50%; font-size: 24px; color: var(--accent); cursor: pointer; height: 38px; width: 38px; display: flex; align-items: center; justify-content: center; align-self: flex-end; margin-bottom: 3px; transition: transform 0.2s var(--ease-elastic), background 0.2s; }
        .plus-btn:active { transform: rotate(90deg); background: rgba(255,255,255,0.2); }
        .send-btn { background: var(--accent); border: none; border-radius: 50%; min-width: 38px; width: 38px; height: 38px; display: none; align-items: center; justify-content: center; color: #fff; font-weight: 700; padding: 0; pointer-events: none; transition: all 0.3s var(--ease-spring); align-self: flex-end; margin-bottom: 3px; box-shadow: 0 4px 15px rgba(255, 109, 0, 0); }
        .send-btn.active { cursor: pointer; pointer-events: auto; box-shadow: 0 4px 15px var(--accent); transform: scale(1.05); display: flex !important; }
        .send-btn span { font-size: 20px; margin-left: 3px; }
        
        #emoji-tray { display: none; background: var(--bg); border-top: 1px solid var(--border); height: 320px; padding: 0; width: 100%; flex-shrink: 0; overflow-y: auto; touch-action: auto !important; z-index: 100; }
        emoji-picker { touch-action: pan-y !important; }
        .emoji-toggle-btn { background: transparent; border-radius: 50%; font-size: 24px; color: var(--accent); cursor: pointer; height: 38px; width: 38px; display: flex; align-items: center; justify-content: center; align-self: flex-end; margin-bottom: 3px; transition: transform 0.2s, background 0.2s; opacity: 0.85; }
        .emoji-toggle-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.1); }
        .emoji-toggle-btn span { font-size: 26px; }
        #attachment-menu { display: none; position: absolute; bottom: 75px; left: 16px; background: rgba(30, 30, 30, 0.95); backdrop-filter: blur(15px); border-radius: 18px; padding: 8px; z-index: 1001; box-shadow: 0 10px 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); animation: slideUpFade 0.25s var(--ease-elastic); flex-direction: column; gap: 4px; width: 180px; }

        .attach-opt svg { width: 24px; height: 24px; fill: #eee; }

        .chat-media-img { display: block; width: 100%; max-width: 280px; max-height: 380px; object-fit: cover; border-radius: 18px; animation: imgFadeIn 0.3s ease-out; background: #111; }

        .sent .msg-media-wrapper.group-bottom .chat-media-img { border-top-right-radius: 4px; border-bottom-right-radius: 18px; }

        /* --- NEW ADDITIONS: GREEN DOT & MESSAGE MODAL --- */
        .header-online-dot { position: absolute; bottom: 0px; right: -2px; width: 12px; height: 12px; background: #00ff41; border-radius: 50%; border: 2px solid #1a1a1a; box-shadow: 0 0 8px #00ff41; z-index: 2; }

        /* --- NEW ADDITIONS: TTS WORD HIGHLIGHT OVERLAY --- */
        #tts-overlay-text {
            position: fixed;
            top: 15%; left: 5%; width: 90%; height: 35%;
            display: none; align-content: flex-start; justify-content: center; flex-wrap: wrap; gap: 8px;
            z-index: 100001; pointer-events: none; overflow: hidden;
        }

            font-size: 2rem; font-weight: 800; color: rgba(255, 255, 255, 0.2);
            transition: color 0.15s ease, transform 0.15s var(--ease-spring);
            font-family: 'Playfair Display', serif; text-align: center;
        }
        .tts-word.spoken {
            color: var(--accent); transform: scale(1.15); text-shadow: 0 0 20px var(--accent);
        }
    </style>
</head>
<body>

<div class="app-container" id="main-app">
    <header id="chat-header">
        <div class="back-btn" onclick="smartBack()">

                <div class="h-name-wrapper">
                    <div class="h-name" id="h-display-name">Quantum AI</div>
                    <img id="v-badge" class="v-badge" style="display: block;" src="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%231DA1F2' d='M22.5 12.5c0-1.58-.875-2.95-2.148-3.6.154-.435.238-.905.238-1.4 0-2.21-1.71-3.998-3.818-3.998-.47 0-.92.084-1.336.25C14.818 2.415 13.51 1.5 12 1.5s-2.816.917-3.437 2.25c-.415-.165-.866-.25-1.336-.25-2.11 0-3.818 1.79-3.818 4 0 .495.083.965.238 1.4-1.272.65-2.147 2.02-2.147 3.6 0 1.457.746 2.74 1.863 3.494C2.988 16.68 2.66 17.59 2.66 18.5c0 2.11 1.81 3.818 3.962 3.818.84 0 1.624-.306 2.23-.83-.015.108-.02.217-.02.327 0 1.34 1.438 2.43 3.21 2.43s3.213-1.09 3.213-2.43c0-.11-.005-.218-.02-.327.605.524 1.39.83 2.23.83 2.15 0 3.96-1.71 3.96-3.82 0-.91-.328-1.82-.704-2.505 1.117-.754 1.864-2.037 1.864-3.494z'/%3E%3Cpath fill='%23000000' d='M10.135 16.253l-3.32-3.46c-.39-.407-.377-1.054.03-1.444.406-.39 1.053-.377 1.443.03l2.03 2.114 4.86-6.52c.337-.453.977-.545 1.43-.208.453.337.545.977.208 1.43l-5.6 7.51c-.2.27-.516.425-.852.418-.337-.007-.647-.18-.83-.47z'/%3E%3C/svg%3E">
                </div>

    <div id="chat-flow">
        <div id="scroll-trigger"></div>
        <div id="messages-container"></div>
        
        <div class="typing-row" id="typing-row">
             <img src="images/ai.png" class="typing-avatar" id="typing-pfp">
             <div class="typing-bubble" id="typing-bubble-content">
                <div class="typing-dot"></div>

                <div class="typing-dot"></div>

    <div class="input-area-container">
        
        <div id="attachment-menu">
            <div class="attach-opt" onclick="openCameraPicker()">
                <span class="material-icons-round">photo_camera</span>

        <div class="input-area">
            <div class="plus-btn" onclick="toggleAttachmentMenu()">+</div>
            
            <div id="emoji-toggle-left" class="emoji-toggle-btn" style="display:none;" onclick="toggleEmojiKeyboard()">
                <span class="material-icons-round">emoji_emotions</span>
            </div>

            <div class="input-box" id="msg-input-box">
                <textarea id="m-input" class="msg-input" placeholder="Message Quantum..." rows="1"></textarea>
            </div>
            
            <div id="emoji-toggle-right" class="emoji-toggle-btn" onclick="toggleEmojiKeyboard()">
                <span class="material-icons-round">emoji_emotions</span>

                <span class="material-icons-round">send</span>
            </button>

<div id="msg-options-menu">
    <div style="width: 40px; height: 4px; background: #333; border-radius: 4px; margin: 0 auto 20px auto;"></div>
    <div class="msg-action-list">
        <button class="btn-msg-action read-btn-big" onclick="readAloudSelected()">
            <span class="material-icons-round">volume_up</span> Read Aloud
        </button>
        <button class="btn-msg-action copy-btn-big" onclick="copySelectedText()">
            <span class="material-icons-round">content_copy</span> Copy Text
        </button>
        <button class="btn-msg-action cancel-btn-msg" onclick="closeMsgMenu(true)">Cancel</button>
    </div>

<script>
    // =========================================
    //  AI CHAT STATE & BACKGROUND SYNC
    // =========================================
    const myUid = "local_user";
    const targetUid = "quantum_ai";
    const RENDER_BACKEND_URL = "https://gooracproxy.onrender.com/api/chat";
    
    let messagesMap = new Map();
    let isTyping = false;

    // DOM References
    const mInput = document.getElementById('m-input');
    const inputBox = document.getElementById('msg-input-box');
    const chatFlow = document.getElementById('chat-flow');
    let container = document.getElementById('messages-container');
    const typingRow = document.getElementById('typing-row');
    const emojiTray = document.getElementById('emoji-tray');
    const sendBtnUI = document.getElementById('send-btn');
    const attachmentMenu = document.getElementById('attachment-menu');

    const popSound = new Audio("data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU"); 

    // --- BACKGROUND CACHE LOGIC ---
    (function initBackground() {
        const bgUrl = 'images/chat/bg.png';
        const fallbackGradient = 'var(--bg-gradient)';
        const cachedBg = localStorage.getItem('chat_bg_image');

        function applyBg(source) { document.body.style.backgroundImage = `url('${source}'), ${fallbackGradient}`; }
        if (cachedBg) applyBg(cachedBg); else document.body.style.backgroundImage = fallbackGradient;

        fetch(bgUrl).then(r => r.blob()).then(blob => {
            const reader = new FileReader();
            reader.onloadend = function() {
                if (cachedBg !== reader.result) {
                    localStorage.setItem('chat_bg_image', reader.result);
                    applyBg(reader.result);
                }
            }
            reader.readAsDataURL(blob);
        }).catch(() => {});
    })();

    // --- VIEWPORT LOCK LOGIC (Prevents keyboard push glitch) ---
    function lockViewportAndHeader() {
        const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        const app = document.getElementById('main-app');
        if(app) app.style.height = vh + 'px';
        document.body.style.height = '100vh'; 
        window.scrollTo(0, 0); document.documentElement.scrollTop = 0; document.body.scrollTop = 0;
        document.body.style.top = '0px'; 
        window.scrollToBottom();
    }
    if (window.visualViewport) { window.visualViewport.addEventListener('resize', lockViewportAndHeader); window.visualViewport.addEventListener('scroll', lockViewportAndHeader); }
    window.addEventListener('resize', lockViewportAndHeader);
    window.addEventListener('scroll', lockViewportAndHeader, { passive: true });

    // --- LOAD MESSAGES FROM LOCAL STORAGE ---
    (function loadMemory() {
        const cached = localStorage.getItem('quantum_ai_msgs');
        if (cached) {
            try {
                const parsed = JSON.parse(cached);
                parsed.forEach(m => {
                    m.timestamp = new Date(m.timestampIso);
                    messagesMap.set(m.id, m);
                });
                renderAll();
                setTimeout(() => window.scrollToBottom(), 100);
            } catch(e) {}
        } else {
            setTimeout(() => { addLocalMessage("Hello! I am Quantum AI, your verified AI assistant. How can I help you today?", targetUid); }, 500);
        }
    })();

    function saveMessagesToCache() {
        const msgsToSave = Array.from(messagesMap.values()).map(m => {
            return { ...m, timestampIso: m.timestamp.toISOString() };
        });
        localStorage.setItem('quantum_ai_msgs', JSON.stringify(msgsToSave));
    }

    // --- AI COMMUNICATION LOGIC ---
    function getFormattedHistory() {
        const sorted = Array.from(messagesMap.values()).sort((a, b) => a.timestamp - b.timestamp);
        const recent = sorted.slice(-15); // Grab last 15 messages for context
        return recent.map(msg => ({
            role: msg.sender === myUid ? "user" : "model",
            parts: [{ text: msg.text || (msg.imageUrl ? "[User attached an image]" : "") }]
        })).filter(msg => msg.parts[0].text !== "");
    }

    async function sendMsg() {
        const text = mInput.value.trim();
        if (!text) { inputBox.classList.add('shake-anim'); setTimeout(() => inputBox.classList.remove('shake-anim'), 400); return; }

        popSound.play().catch(e => {});
        vibrate(50); 
        
        mInput.value = "";
        mInput.style.height = 'auto'; 
        sendBtnUI.classList.remove('active'); 
        document.querySelector('.plus-btn').style.display = 'flex';
        document.getElementById('emoji-toggle-left').style.display = 'none';
        document.getElementById('emoji-toggle-right').style.display = 'flex';
        emojiTray.style.display = 'none';
        attachmentMenu.style.display = 'none';
        mInput.focus(); 

        // 1. Compile History
        const history = getFormattedHistory();

        // 2. Add local message
        addLocalMessage(text, myUid);
        window.scrollToBottom(true);
        setAITypingStatus(true);

        // 3. Send to API
        try {
            const response = await fetch(RENDER_BACKEND_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text, history: history })
            });
            const data = await response.json();
            setAITypingStatus(false);
            if (data.reply) addLocalMessage(data.reply, targetUid);
            else addLocalMessage("I encountered an error connecting to my core module.", targetUid);
        } catch (error) {
            setAITypingStatus(false);
            addLocalMessage("Connection to Quantum core lost.", targetUid);
        }
    }

    // --- IMAGE HANDLING LOGIC ---
    const imagePickerComponent = document.getElementById('img-picker');
    if (imagePickerComponent) {
        imagePickerComponent.addEventListener('image-uploaded', async (e) => {
            if (e.detail.url) {
                // Render image locally
                addLocalMessage("", myUid, null, e.detail.url);
                window.scrollToBottom(true);
                setAITypingStatus(true);
                
                // Get History
                const history = getFormattedHistory();

                // Convert Image to Base64 to send to backend
                try {
                    const response = await fetch(e.detail.url);
                    const blob = await response.blob();
                    const reader = new FileReader();
                    reader.readAsDataURL(blob); 
                    reader.onloadend = async function() {
                        const base64data = reader.result;
                        
                        try {
                            const apiRes = await fetch(RENDER_BACKEND_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ 
                                    message: "I uploaded an image for you to analyze.", 
                                    history: history,
                                    imageBase64: base64data // Send base64 to backend
                                })
                            });
                            const data = await apiRes.json();
                            setAITypingStatus(false);
                            if(data.reply) addLocalMessage(data.reply, targetUid);
                            else addLocalMessage("I had trouble viewing that image.", targetUid);
                        } catch(apiErr) {
                            setAITypingStatus(false);
                            addLocalMessage("Connection lost.", targetUid);
                        }
                    }
                } catch(err) {
                    setAITypingStatus(false);
                    addLocalMessage("I couldn't process that image file.", targetUid);
                }
            }
        });
    }

    function addLocalMessage(text, sender, replyText = null, imageUrl = null) {
        const id = 'msg_' + Date.now() + Math.floor(Math.random() * 1000);
        const msgData = {
            id: id, text: text, sender: sender, timestamp: new Date(),
            imageUrl: imageUrl
        };
        messagesMap.set(id, msgData);
        saveMessagesToCache(); // Sync to LocalStorage
        
        if (sender === targetUid) { vibrate([50, 50, 50]); popSound.play().catch(()=>{}); }
        renderAll(); window.scrollToBottom(true);
    }

    function setAITypingStatus(isTypingNow) {
        isTyping = isTypingNow;
        if (isTyping) { typingRow.style.display = 'flex'; window.scrollToBottom(true); } 
        else { typingRow.style.display = 'none'; }
    }

    mInput.addEventListener('keydown', function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } });
    sendBtnUI.addEventListener('mousedown', (e) => { e.preventDefault(); sendMsg(); });
    sendBtnUI.addEventListener('touchstart', (e) => { e.preventDefault(); sendMsg(); });

    // --- UI TOGGLES ---
    window.isEmojiTrayOpen = false;
    window.toggleEmojiKeyboard = function() {
        const inputArea = document.querySelector('.input-area');
        if (window.isEmojiTrayOpen) {
            window.isEmojiTrayOpen = false;
            document.getElementById('emoji-toggle-right').innerHTML = '<span class="material-icons-round">emoji_emotions</span>';
            document.getElementById('emoji-toggle-left').innerHTML = '<span class="material-icons-round">emoji_emotions</span>';
            inputArea.classList.add('force-expand');
            mInput.focus(); 
            setTimeout(() => { emojiTray.style.display = 'none'; window.scrollToBottom(); }, 150); 
        } else {
            const wasFocused = document.activeElement === mInput;
            window.isEmojiTrayOpen = true;
            document.getElementById('emoji-toggle-right').innerHTML = '<span class="material-icons-round">keyboard</span>';
            document.getElementById('emoji-toggle-left').innerHTML = '<span class="material-icons-round">keyboard</span>';
            inputArea.classList.add('force-expand');
            emojiTray.style.display = 'block';
            if (wasFocused) mInput.blur(); 
            window.scrollToBottom();
        }
    };

    function toggleAttachmentMenu() {
        if (attachmentMenu.style.display === 'flex') { attachmentMenu.style.display = 'none'; } 
        else { emojiTray.style.display = 'none'; attachmentMenu.style.display = 'flex'; }
    }
    function openCameraPicker() { attachmentMenu.style.display = 'none'; if (document.getElementById('img-picker')) document.getElementById('img-picker').openPicker(); }

    mInput.addEventListener('input', function() {
        this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px';
        if(this.value === '') this.style.height = 'auto';
        if(this.value.trim().length > 0) {
            sendBtnUI.classList.add('active');
            document.querySelector('.plus-btn').style.display = 'none';
            document.getElementById('emoji-toggle-left').style.display = 'flex';
            document.getElementById('emoji-toggle-right').style.display = 'none';
        } else {
            sendBtnUI.classList.remove('active');
            document.querySelector('.plus-btn').style.display = 'flex';
            document.getElementById('emoji-toggle-left').style.display = 'none';
            document.getElementById('emoji-toggle-right').style.display = 'flex';
        }
        if(chatFlow.scrollHeight - chatFlow.scrollTop - chatFlow.clientHeight < 120) window.scrollToBottom();
    });

    mInput.addEventListener("focus", () => { 
        document.querySelector('.input-area').classList.add('force-expand'); 
        if(window.isEmojiTrayOpen) toggleEmojiKeyboard(); 
        if(attachmentMenu.style.display === 'flex') attachmentMenu.style.display = 'none';
        lockViewportAndHeader(); setTimeout(lockViewportAndHeader, 100); 
    });
    
    mInput.addEventListener("blur", () => {
        if (!window.isEmojiTrayOpen) document.querySelector('.input-area').classList.remove('force-expand'); 
        setTimeout(lockViewportAndHeader, 100);
    });

    const mainPicker = document.getElementById('main-picker');
    if(mainPicker) { mainPicker.addEventListener('emoji-click', event => { mInput.value += event.detail.emoji || event.detail.unicode; mInput.dispatchEvent(new Event('input')); }); }

    // --- NEW ADDITION: LONG PRESS, DOUBLE TAP, AND TTS LOGIC ---
    let msgPressTimer;
    let selectedMsgText = "";
    let lastTapTime = 0;
    let lastTapId = null;

    window.startMsgLongPress = function(e, textElementId) {
        const el = document.getElementById(textElementId);
        if(!el) return;
        const text = el.innerText || el.textContent;
        if(!text || text.trim() === "") return;
        
        selectedMsgText = text;
        msgPressTimer = setTimeout(() => {
            if(navigator.vibrate) navigator.vibrate(40);
            openMsgMenu();
        }, 500); 
    };
    
    window.cancelMsgLongPress = function() { clearTimeout(msgPressTimer); };
    window.endMsgLongPress = function() { clearTimeout(msgPressTimer); };

    window.handleMsgDoubleTap = function(e, textElementId, side) {
        const currentTime = new Date().getTime();
        const tapLen = currentTime - lastTapTime;
        
        if (tapLen < 300 && tapLen > 0 && lastTapId === textElementId) {
            const el = document.getElementById(textElementId);
            if(!el) return;
            const text = el.innerText || el.textContent;
            
            if (side === 'sent') {
                mInput.value = text;
                mInput.dispatchEvent(new Event('input'));
                mInput.focus();
            } else {
                selectedMsgText = text;
                openMsgMenu();
                setTimeout(() => readAloudSelected(), 250); // Auto-play listen mode
            }
            lastTapTime = 0; 
        } else {
            lastTapTime = currentTime;
            lastTapId = textElementId;
        }
    };

    window.openMsgMenu = function() {
        history.pushState({ msgMenuOpen: true }, "", "#msgoptions");
        document.getElementById('msg-options-menu').classList.add('active');
        document.getElementById('msg-overlay').style.display = 'block';
    };

    window.closeMsgMenu = function(goBack) {
        document.getElementById('msg-options-menu').classList.remove('active');
        document.getElementById('msg-overlay').style.display = 'none';
        document.getElementById('tts-overlay-text').classList.remove('active'); // Hide TTS blur layer overlay
        if(goBack && window.location.hash === "#msgoptions") history.back();
        if('speechSynthesis' in window) window.speechSynthesis.cancel(); 
    };

    window.addEventListener('popstate', (e) => { 
        if(document.getElementById('msg-options-menu').classList.contains('active')) {
            closeMsgMenu(false); 
        }
    });

    window.copySelectedText = async function() {
        try {
            await navigator.clipboard.writeText(selectedMsgText);
            const btn = document.querySelector('.copy-btn-big');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = `<span class="material-icons-round">check</span> Copied!`;
            setTimeout(() => { 
                btn.innerHTML = originalHtml; 
                closeMsgMenu(true); 
            }, 1000);
        } catch (err) { alert('Failed to copy text.'); }
    };

    window.readAloudSelected = function() {
        if (!('speechSynthesis' in window)) return alert("Text-to-speech not supported on this device.");
        window.speechSynthesis.cancel(); 
        
        const ttsContainer = document.getElementById('tts-overlay-text');
        ttsContainer.innerHTML = '';
        ttsContainer.classList.add('active');

        // Render words on blur layer to highlight sequentially
        const words = selectedMsgText.match(/\S+/g) || [];
        let charOffset = 0;
        const wordData = [];

        words.forEach((word, index) => {
            const span = document.createElement('span');
            span.className = 'tts-word';
            span.id = 'tts-word-' + index;
            span.innerText = word;
            ttsContainer.appendChild(span);
            
            const actualStart = selectedMsgText.indexOf(word, charOffset);
            wordData.push({ start: actualStart, end: actualStart + word.length, element: span });
            charOffset = actualStart + word.length;
        });

        const utterance = new SpeechSynthesisUtterance(selectedMsgText);
        
        // Find Professional Google Voice 
        const voices = window.speechSynthesis.getVoices();
        let bestVoice = voices.find(v => v.name.includes('Google') && v.lang.includes('en'));
        if(!bestVoice) bestVoice = voices.find(v => v.name.includes('Google'));
        if(!bestVoice) bestVoice = voices.find(v => v.name.includes('Premium') || v.name.includes('Natural'));
        if(!bestVoice) bestVoice = voices.find(v => v.lang.startsWith('en-'));
        if(bestVoice) utterance.voice = bestVoice;
        
        utterance.rate = 0.95; // Optimal professional pace
        
        // Synced highlight animation
        utterance.onboundary = (event) => {
            if (event.name === 'word') {
                const charIndex = event.charIndex;
                wordData.forEach(w => w.element.classList.remove('spoken'));
                const currentWord = wordData.find(w => charIndex >= w.start && charIndex <= w.end);
                if (currentWord) {
                    currentWord.element.classList.add('spoken');
                    currentWord.element.scrollIntoView({ behavior: "smooth", block: "center" });
                }
            }
        };

        utterance.onend = () => { ttsContainer.classList.remove('active'); };
        window.speechSynthesis.speak(utterance);
    };

    if('speechSynthesis' in window) {
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

    // --- VIRTUAL DOM RENDER ---
    function renderAll() {
        let tempContainer = document.createElement('div');
        let originalContainer = container;
        container = tempContainer;

        const sorted = Array.from(messagesMap.entries()).sort((a, b) => a[1].timestamp.getTime() - b[1].timestamp.getTime());

        let lastDateLabel = ""; let lastMsgTime = 0;
        sorted.forEach(([id, data], index) => {
            const msgDate = data.timestamp; const msgTime = msgDate.getTime();
            const dateLabel = getDateDivider(msgDate);
            if (dateLabel !== lastDateLabel) {
                const div = document.createElement('div'); div.className = "date-divider"; div.innerText = dateLabel;
                container.appendChild(div); lastDateLabel = dateLabel; lastMsgTime = msgTime;
            } else if (lastMsgTime > 0 && (msgTime - lastMsgTime) > 3600000) {
                const tDiv = document.createElement('div'); tDiv.className = "time-divider"; tDiv.innerText = formatTime12(msgDate);
                container.appendChild(tDiv);
            }
            lastMsgTime = msgTime;
            const prevMsg = index > 0 ? sorted[index - 1][1] : null;
            const nextMsg = index + 1 < sorted.length ? sorted[index + 1][1] : null;
            const isFirstInGroup = !prevMsg || prevMsg.sender !== data.sender || (msgDate - prevMsg.timestamp) > 300000;
            const isLastInGroup = !nextMsg || nextMsg.sender !== data.sender || (nextMsg.timestamp - msgDate) > 300000;
            renderMessage(data, id, isFirstInGroup, isLastInGroup);
        });

        container = originalContainer;
        if (container.children.length === 0) { while (tempContainer.firstChild) container.appendChild(tempContainer.firstChild); } 
        else {
            let newChildren = Array.from(tempContainer.children); let oldChildren = Array.from(container.children);
            for (let i = 0; i < newChildren.length; i++) {
                if (!oldChildren[i]) container.appendChild(newChildren[i]);
                else if (oldChildren[i].innerHTML !== newChildren[i].innerHTML) { container.replaceChild(newChildren[i], oldChildren[i]); }
            }
            while (container.children.length > newChildren.length) container.removeChild(container.lastChild);
        }
    }

    function renderMessage(m, id, isFirstInGroup, isLastInGroup) {
        const side = m.sender === myUid ? 'sent' : 'received';
        const date = m.timestamp;
        const rowDiv = document.createElement('div'); rowDiv.id = id;
        
        let rowClass = `msg-row ${side}`;
        if(isLastInGroup) rowClass += ' group-bottom';
        if(isFirstInGroup && isLastInGroup) rowClass += ' single';
        rowDiv.className = rowClass;
        
        // NEW ADDITION: Long press AND double tap listeners attached to the message row
        rowDiv.setAttribute("ontouchstart", `startMsgLongPress(event, 'text-${id}')`);
        rowDiv.setAttribute("ontouchend", "endMsgLongPress()");
        rowDiv.setAttribute("ontouchmove", "cancelMsgLongPress()");
        rowDiv.setAttribute("onmousedown", `startMsgLongPress(event, 'text-${id}')`);
        rowDiv.setAttribute("onmouseup", "endMsgLongPress()");
        rowDiv.setAttribute("onmouseleave", "cancelMsgLongPress()");
        rowDiv.setAttribute("onclick", `handleMsgDoubleTap(event, 'text-${id}', '${side}')`);

        let groupClass = (isFirstInGroup && isLastInGroup) ? 'single' : isFirstInGroup ? 'group-top' : isLastInGroup ? 'group-bottom' : 'group-mid';
        let mediaHtml = ''; let bubbleClass = `bubble ${groupClass}`; let bubbleStyle = '';

        if (m.imageUrl) {
            mediaHtml = `<div class="msg-media-wrapper ${groupClass}"><img src="${m.imageUrl}" class="chat-media-img"></div>`;
            bubbleClass += ' has-media'; if(!m.text) bubbleStyle = "display:none;";
        } 

        const safeText = m.text ? m.text.replace(/(https?:\/\/[^\s]+)/g, `<a onclick="event.stopPropagation(); window.open('$1', '_blank')">$1</a>`) : "";
        let contentHTML = `${mediaHtml}<div class="${bubbleClass}" id="bubble-${id}" style="${bubbleStyle}"><span id="text-${id}">${safeText}</span></div><div class="msg-timestamp-footer">${formatTime12(date)}</div>`;

        if (side === 'received') {
            const pfpClass = isLastInGroup ? 'msg-avatar visible' : 'msg-avatar';
            rowDiv.innerHTML = `<div class="received-inner-row"><img src="images/ai.png" class="${pfpClass}"><div class="msg-bubble-box">${contentHTML}</div></div>`;
        } else { rowDiv.innerHTML = `<div class="msg-bubble-box">${contentHTML}</div>`; }
        container.appendChild(rowDiv);
    }

    // Helpers
    function formatTime12(date) { let hours = date.getHours(); let minutes = date.getMinutes(); let ampm = hours >= 12 ? 'PM' : 'AM'; hours = hours % 12; hours = hours ? hours : 12; minutes = minutes < 10 ? '0'+minutes : minutes; return `${hours}:${minutes} ${ampm}`; }
    function getDateDivider(date) { const today = new Date(); const yesterday = new Date(); yesterday.setDate(today.getDate() - 1); if (date.toDateString() === today.toDateString()) return "Today"; if (date.toDateString() === yesterday.toDateString()) return "Yesterday"; return date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }); }
    function vibrate(pattern = 50) { if (navigator.vibrate) navigator.vibrate(pattern); }
    window.scrollToBottom = function(smooth = false) { chatFlow.scrollTo({ top: chatFlow.scrollHeight, behavior: smooth ? 'smooth' : 'auto' }); }
    function smartBack() { history.back(); }
</script>
