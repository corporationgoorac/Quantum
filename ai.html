<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0A0A0A">
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>Goorac | Quantum AI</title>

    <script src="config.js"></script>
    <script src="components/chatTheme.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Bangers&family=Dancing+Script:wght@700&family=Fredoka:wght@600&family=Orbitron:wght@700&family=Playfair+Display:ital,wght@1,700&family=Righteous&display=swap" rel="stylesheet">

    <script type="module" src="components/presence.js"></script>

    <style>
        /* =========================================
           1. CORE VARIABLES & THEME DEFINITIONS
           ========================================= */
        :root { 
            --bg: #000000;
            --bg-gradient: radial-gradient(circle at 50% 30%, #111111 0%, #000000 70%);
            --mobileToolbarBg: rgba(20, 20, 20, 0.75);
            --header-bg: rgba(10, 10, 10, 0.90);
            --header-blur: blur(25px);
            --accent: #FF6D00; 
            --accent-dark: #E65100;
            --accent-dim: rgba(255, 109, 0, 0.2);
            --glass-border: rgba(255, 255, 255, 0.08);
            --border: #1c1c1c; 
            --border-light: rgba(255,255,255,0.1);
            --sent-bg: linear-gradient(135deg, #FF7B00 0%, #E65100 100%);
            --sent-text: #ffffff;
            --sent-shadow: 0 4px 15px rgba(230, 81, 0, 0.35);
            --received-bg: #2A2A2A; 
            --received-text: #F0F0F0;
            --received-shadow: 0 4px 12px rgba(0,0,0,0.5);
            --text: #ffffff; 
            --text-secondary: #a1a1a1;
            --text-muted: #666666;
            --shimmer: linear-gradient(90deg, #1a1a1a 0%, #2a2a2a 50%, #1a1a1a 100%);
            --ease-elastic: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --ease-smooth: cubic-bezier(0.33, 1, 0.68, 1);
            --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-spring: cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* =========================================
           2. RESET & BASE STYLES
           ========================================= */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; 
            padding: 0; 
            -webkit-touch-callout: none; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        html, body {
            height: 100vh !important; 
            width: 100vw !important;
            overflow: hidden !important; 
            background-color: var(--bg);
            background-image: var(--bg-gradient); 
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            position: fixed !important; 
            left: 0 !important; 
            top: 0 !important;
            overscroll-behavior: none;
            margin: 0;
            padding: 0;
            touch-action: none;
        }

        body { 
            -webkit-user-select: none; 
            user-select: none; 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            font-size: 16px;
        }

        div, span, p, img, svg { -webkit-user-select: none; user-select: none; }
        
        input, textarea { 
            -webkit-user-select: text !important; 
            user-select: text !important; 
            outline: none; 
            font-family: inherit;
        }

        /* =========================================
           3. ANIMATION KEYFRAMES
           ========================================= */
        @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
        @keyframes flashMessage { 0% { background-color: rgba(255, 152, 0, 0.6) !important; transform: scale(1.02); box-shadow: 0 0 20px rgba(255, 152, 0, 0.5) !important; } 100% { background-color: transparent; transform: scale(1); box-shadow: none; } }
        .flash-active { animation: flashMessage 1.5s ease-out !important; }
        @keyframes fadeStatus { 0% { opacity: 0; transform: translateY(3px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-3px); } 20%, 40%, 60%, 80% { transform: translateX(3px); } }
        @keyframes pulseGreen { 0% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.7); } 70% { box-shadow: 0 0 0 5px rgba(0, 230, 118, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0); } }
        @keyframes imgFadeIn { from { opacity: 0; transform: scale(0.99); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideUp { from { opacity: 1; transform: translateY(0); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        @keyframes popOut { 0% { transform: scale(0); opacity: 0; } 50% { transform: scale(1.5); opacity: 1; } 70% { transform: scale(0.9); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes badgeUpdate { 0% { transform: scale(1); } 40% { transform: scale(1.35); background: #444; } 70% { transform: scale(0.95); } 100% { transform: scale(1); background: #2a2a2a; } }
        @keyframes floatUp { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 10% { transform: translateY(-20px) scale(1.2); opacity: 1; } 50% { transform: translateY(-80px) scale(1.1); opacity: 1; } 100% { transform: translateY(-160px) scale(0.9); opacity: 0; } }

        .shake-anim { animation: shake 0.4s ease-in-out; border-color: #ff453a !important; }
        .loading-shimmer { background: var(--shimmer); background-size: 800px 100%; animation: shimmer 2s linear infinite; }
        .instant-load .loading-shimmer { animation: none; background: transparent; }
        .instant-load .chat-media-img { animation: none; }
        .instant-load #chat-flow { opacity: 1 !important; transition: none !important; }

        /* =========================================
           4. LAYOUT STRUCTURE
           ========================================= */
        .app-container { display: flex; flex-direction: column; height: 100vh; height: 100dvh; width: 100%; position: fixed !important; top: 0 !important; left: 0 !important; overflow: hidden; }

        /* =========================================
           5. HEADER STYLES (Optimized for Mobile)
           ========================================= */
        header { position: absolute !important; top: 0 !important; left: 0 !important; right: 0 !important; padding: 0 10px; padding-top: calc(env(safe-area-inset-top) + 6px); height: calc(60px + env(safe-area-inset-top)); background: var(--header-bg); border-bottom: 1px solid var(--border-light); display: flex; align-items: center; gap: 2px; z-index: 2000; backdrop-filter: var(--header-blur); -webkit-backdrop-filter: var(--header-blur); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .back-btn { font-size: 24px; color: var(--accent); cursor: pointer; display: flex; align-items: center; justify-content: center; height: 44px; width: 44px; border-radius: 50%; transition: background 0.2s; margin-right: 0px; }
        .back-btn:active { background: rgba(255,255,255,0.1); }
        .back-btn span { font-size: 32px; font-weight: 500; }
        .h-profile-group { display: flex; align-items: center; gap: 10px; cursor: default; flex: 1; overflow: hidden; padding: 4px; border-radius: 12px; transition: background 0.2s; min-width: 0; margin-right: 4px; }
        .pfp-container { position: relative; width: 38px; height: 38px; flex-shrink: 0; }
        .h-pfp { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.15); transition: opacity 0.3s ease; }
        .online-dot { position: absolute; bottom: 0px; right: 0px; width: 12px; height: 12px; background: #32D74B; border-radius: 50%; border: 2px solid #000; display: block; box-shadow: 0 0 10px rgba(50, 215, 75, 0.5); animation: pulseGreen 3s infinite; }
        .h-info { display: flex; flex-direction: column; justify-content: center; gap: 1px; min-width: 0; flex: 1; }
        .h-name { font-weight: 700; font-size: 1.05rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.2px; flex: 1; }
        .h-name-wrapper { display: flex; align-items: center; gap: 4px; width: fit-content; max-width: 100%; }
        .v-badge { width: 16px; height: 16px; display: block; flex-shrink: 0; position: relative; top: -1.7px; }
        .h-username-sub { font-size: 0.8rem; color: var(--text-secondary); font-weight: 500; transition: opacity 0.3s ease, color 0.3s ease; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .header-actions { display: flex; align-items: center; gap: 4px; margin-left: auto; padding-right: 2px; flex-shrink: 0; }
        .header-icon { width: 36px; height: 36px; cursor: pointer; color: #ffffff; opacity: 0.9; transition: transform 0.2s, opacity 0.2s; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .header-icon:active { opacity: 0.6; transform: scale(0.92); background: rgba(255,255,255,0.1); }
        .header-icon span { font-size: 24px; } 

        /* =========================================
           6. CHAT AREA (SCROLLABLE)
           ========================================= */
        #chat-flow { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0; display: flex; flex-direction: column; -webkit-overflow-scrolling: touch; background: transparent; overscroll-behavior-y: contain; position: relative; touch-action: pan-y !important; overflow-anchor: auto; padding-top: calc(75px + env(safe-area-inset-top)); padding-bottom: 20px; -ms-overflow-style: none; scrollbar-width: none; opacity: 0; transition: opacity 0.1s ease-in; }
        #chat-flow::-webkit-scrollbar { display: none; }
        #messages-container { display: flex; flex-direction: column; padding: 0 12px; width: 100%; padding-bottom: 10px; will-change: transform; contain: content; touch-action: pan-y; }

        /* =========================================
           7. TYPING INDICATOR
           ========================================= */
        .typing-row { display: none; align-items: flex-end; margin-bottom: 12px; padding-left: 12px; width: 100%; }
        .typing-avatar { width: 28px; height: 28px; border-radius: 50%; margin-right: 8px; object-fit: cover; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); }
        .typing-bubble { background: var(--received-bg); padding: 12px 16px; border-radius: 18px; border-bottom-left-radius: 4px; display: flex; gap: 4px; align-items: center; width: fit-content; height: 38px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); }
        .typing-dot { width: 6px; height: 6px; background: #888; border-radius: 50%; animation: typingWave 1.4s ease-in-out infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingWave { 0%, 100% { transform: translateY(0); opacity: 0.4; } 50% { transform: translateY(-4px); opacity: 1; } }
        #scroll-trigger { position: absolute; top: 0; left: 0; width: 100%; height: 10px; pointer-events: none; visibility: hidden; z-index: -1; }
        .date-divider { text-align: center; margin: 24px 0 16px 0; font-size: 0.7rem; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; align-self: center; width: fit-content; position: sticky; top: 10px; z-index: 5; background: rgba(20, 20, 20, 0.7); padding: 4px 12px; border-radius: 12px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .time-divider { text-align: center; margin: 20px 0 12px 0; font-size: 0.65rem; color: #777; font-weight: 500; align-self: center; width: 100%; }

        /* =========================================
           8. MESSAGE ROW & BUBBLES
           ========================================= */
        .msg-row { display: flex; width: 100%; margin-bottom: 2px; position: relative; flex-direction: column; overflow: visible; transform: translateZ(0); }
        .msg-row.group-bottom, .msg-row.single { margin-bottom: 18px; }
        .msg-row.sent { align-items: flex-end; padding-right: 0px; }
        .msg-row.received { align-items: flex-start; }
        .received-inner-row { display: flex; align-items: flex-end; gap: 8px; max-width: 100%; position: relative; }
        .msg-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; flex-shrink: 0; margin-bottom: 4px; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); opacity: 0; }
        .msg-avatar.visible { opacity: 1; }
        .msg-bubble-box { position: relative; max-width: 75vw; display: flex; flex-direction: column; transition: transform 0.2s, padding-bottom 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .sent .msg-bubble-box { align-items: flex-end; }
        .received .msg-bubble-box { align-items: flex-start; }
        .bubble { padding: 12px 18px; border-radius: 22px; font-size: 1.05rem; line-height: 1.45; position: relative; word-wrap: break-word; z-index: 2; transition: box-shadow 0.2s ease, filter 0.2s ease; letter-spacing: 0.3px; }
        .bubble.jumbo-emoji { background: transparent !important; border: none !important; box-shadow: none !important; font-size: 2.2rem !important; padding: 0 !important; text-align: center; }
        .bubble:active { filter: brightness(1.1); }
        .sent .bubble { background: var(--sent-bg); color: var(--sent-text); text-align: left; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: var(--sent-shadow); }
        .sent .bubble.single { border-radius: 22px; border-bottom-right-radius: 4px; }
        .sent .bubble.group-top { border-radius: 22px; border-bottom-right-radius: 4px; margin-bottom: 1px; }
        .sent .bubble.group-mid { border-radius: 22px; border-top-right-radius: 4px; border-bottom-right-radius: 4px; margin-bottom: 1px; }
        .sent .bubble.group-bottom { border-radius: 22px; border-top-right-radius: 4px; border-bottom-right-radius: 22px; }
        .received .bubble { background: var(--received-bg); color: var(--received-text); text-align: left; border: 1px solid var(--glass-border); box-shadow: var(--received-shadow); }
        .received .bubble.single { border-radius: 22px; border-bottom-left-radius: 4px; }
        .received .bubble.group-top { border-radius: 22px; border-bottom-left-radius: 4px; margin-bottom: 1px; }
        .received .bubble.group-mid { border-radius: 22px; border-top-left-radius: 4px; border-bottom-left-radius: 4px; margin-bottom: 1px; }
        .received .bubble.group-bottom { border-radius: 22px; border-top-left-radius: 4px; border-bottom-left-radius: 22px; }
        .bubble a { color: #ffffff; text-decoration: underline; cursor: pointer; font-weight: 600; opacity: 0.9; }
        .received .bubble a { color: var(--accent); }
        .msg-timestamp-footer { font-size: 0.65rem; color: var(--text-secondary); font-weight: 500; opacity: 0; position: absolute; bottom: 4px; width: 100%; transition: opacity 0.2s ease-in-out; pointer-events: none; }
        .show-timestamps .msg-bubble-box { padding-bottom: 18px !important; }
        .show-timestamps .msg-timestamp-footer { opacity: 1; }
        .received .msg-timestamp-footer { text-align: left; left: 4px; }
        .sent .msg-timestamp-footer { text-align: right; right: 4px; }
        .sliding-timestamp { display: none !important; }
        .reaction-badge { position: absolute; bottom: -8px; background: #2a2a2a; border: 2px solid #000; border-radius: 12px; padding: 2px 6px; font-size: 0.8rem; z-index: 20; display: none; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.3); min-width: 24px; text-align: center; will-change: transform; }
        .reaction-badge.pop-in { animation: popOut 0.4s var(--ease-spring); }
        .reaction-badge.updated { animation: badgeUpdate 0.3s var(--ease-spring); }
        .sent .reaction-badge { right: 0; }
        .received .reaction-badge { left: 0; }
        .sent .reaction-badge { background: #333; color: white; border-color: #000; }
        .seen-status { font-size: 0.65rem; color: var(--text-secondary); margin-top: 2px; margin-right: 2px; text-align: right; font-weight: 500; height: 14px; width: 100%; opacity: 0; animation: fadeStatus 0.4s forwards; position: relative; z-index: 1; }
        .swipe-reply-icon { position: absolute; top: 50%; transform: translateY(-50%) scale(0); width: 30px; height: 30px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 0; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .swipe-reply-icon svg { width: 16px; height: 16px; fill: #fff; }
        .received .swipe-reply-icon { left: -45px; } 
        .sent .swipe-reply-icon { right: -45px; }
        .reply-box-ui { background: linear-gradient(90deg, var(--accent-dim) 0%, rgba(255, 255, 255, 0.05) 100%); padding: 10px 14px; border-radius: 12px; margin-bottom: 8px; font-size: 0.85rem; border-left: 4px solid var(--accent); color: rgba(255,255,255,0.95); max-width: 100%; cursor: pointer; position: relative; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 3; overflow: hidden; text-overflow: ellipsis; white-space: normal; line-height: 1.4; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); transition: all 0.25s var(--ease-spring); box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.05); border-left: 4px solid var(--accent); }
        .reply-box-ui::before { content: 'Replying to'; display: block; font-size: 0.7rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; opacity: 0.9; }
        .reply-box-ui:active { background: linear-gradient(90deg, var(--accent-dim) 0%, rgba(255, 255, 255, 0.1) 100%); transform: scale(0.97); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        #scroll-down-btn { position: fixed; bottom: 85px; right: 20px; width: 44px; height: 44px; background: rgba(30, 30, 30, 0.8); border-radius: 50%; display: none; align-items: center; justify-content: center; color: var(--accent); box-shadow: 0 4px 20px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); z-index: 900; cursor: pointer; font-size: 1.2rem; transition: all 0.3s var(--ease-elastic); backdrop-filter: blur(10px); }
        #scroll-down-btn.new-msg { background: var(--accent); color: #fff; animation: bounce 1s infinite; }
        #heart-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 100px; pointer-events: none; z-index: 3000; text-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .floating-emoji { position: fixed; font-size: 40px; pointer-events: none; z-index: 3001; animation: floatUp 1.2s var(--ease-spring) forwards; will-change: transform, opacity; }
        #effect-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 4000; }

        /* =========================================
           9. INPUT AREA (PROFESSIONAL REDESIGN)
           ========================================= */
        .input-area-container { background: transparent; border-top: 1px solid transparent; padding-bottom: env(safe-area-inset-bottom, 10px); flex-shrink: 0; width: 100%; z-index: 1000; position: relative; margin-top: auto; touch-action: pan-y !important; }
        .input-area { margin: 12px 24px; padding: 4px 8px; display: flex; align-items: flex-end; gap: 8px; background: var(--mobileToolbarBg, rgba(30, 30, 30, 0.75)); border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.15); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); box-shadow: 0 -2px 15px rgba(255, 109, 0, 0.15), 0 8px 25px rgba(0,0,0,0.4); transform: scale(0.96); transform-origin: bottom center; transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1); touch-action: none !important; position: relative; }
        .input-area:focus-within, .input-area.force-expand { margin: 8px 12px; transform: scale(1); border-radius: 26px; background: var(--mobileToolbarBg, rgba(25, 25, 25, 0.95)); border-color: var(--accent); box-shadow: 0 -2px 20px rgba(255, 109, 0, 0.3), 0 8px 25px rgba(255, 109, 0, 0.25); }
        .input-box { flex: 1; background: transparent !important; border-radius: 0; padding: 0; border: none !important; display: flex; align-items: center; min-height: 40px; box-shadow: none !important; }
        .msg-input { width: 100%; background: transparent; border: none; color: white; padding: 8px 4px; font-size: 15px; resize: none; max-height: 140px; overflow-y: auto; line-height: 1.4; touch-action: pan-y; overscroll-behavior-y: contain; }
        .plus-btn { background: rgba(255, 255, 255, 0.08); border-radius: 50%; font-size: 24px; color: var(--accent); cursor: pointer; height: 38px; width: 38px; display: flex; align-items: center; justify-content: center; align-self: flex-end; margin-bottom: 3px; transition: transform 0.2s var(--ease-elastic), background 0.2s; }
        .plus-btn:active { transform: rotate(90deg); background: rgba(255,255,255,0.2); }
        .send-btn { background: var(--accent); border: none; border-radius: 50%; min-width: 38px; width: 38px; height: 38px; display: none; align-items: center; justify-content: center; color: #fff; font-weight: 700; padding: 0; pointer-events: none; transition: all 0.3s var(--ease-spring); align-self: flex-end; margin-bottom: 3px; box-shadow: 0 4px 15px rgba(255, 109, 0, 0); }
        .send-btn.active { cursor: pointer; pointer-events: auto; box-shadow: 0 4px 15px var(--accent); transform: scale(1.05); display: flex !important; }
        .send-btn span { font-size: 20px; margin-left: 3px; }
        .mic-btn-wrapper { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; position: relative; z-index: 100; align-self: flex-end; margin-bottom: 3px; }
        .mic-btn { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: transparent; color: var(--accent); cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); -webkit-user-select: none; user-select: none; touch-action: none; }
        .mic-btn svg { width: 26px; height: 26px; fill: currentColor; pointer-events: none; }
        .mic-btn.recording { transform: scale(1.3); background: var(--accent); color: white; box-shadow: 0 0 20px var(--accent-dim); }
        .mic-btn.locked { transform: scale(1); background: var(--accent); color: white; }

    function renderAll() {
        let tempContainer = document.createElement('div');
        let originalContainer = container;
        container = tempContainer;

        const sorted = Array.from(messagesMap.entries()).sort((a, b) => a[1].timestamp.getTime() - b[1].timestamp.getTime());

        let lastDateLabel = "";
        let lastMsgTime = 0;

        sorted.forEach(([id, data], index) => {
            const msgDate = data.timestamp;
            const msgTime = msgDate.getTime();

            const dateLabel = getDateDivider(msgDate);
            if (dateLabel !== lastDateLabel) {
                const div = document.createElement('div');
                div.className = "date-divider"; div.innerText = dateLabel;
                container.appendChild(div);
                lastDateLabel = dateLabel; lastMsgTime = msgTime;
            } else if (lastMsgTime > 0 && (msgTime - lastMsgTime) > 3600000) {
                const tDiv = document.createElement('div');
                tDiv.className = "time-divider"; tDiv.innerText = formatTime12(msgDate);
                container.appendChild(tDiv);
            }
            lastMsgTime = msgTime;

            const prevMsg = index > 0 ? sorted[index - 1][1] : null;
            const nextMsg = index + 1 < sorted.length ? sorted[index + 1][1] : null;

            const isFirstInGroup = !prevMsg || prevMsg.sender !== data.sender || (msgDate - prevMsg.timestamp) > 300000;
            const isLastInGroup = !nextMsg || nextMsg.sender !== data.sender || (nextMsg.timestamp - msgDate) > 300000;

            renderMessage(data, id, isFirstInGroup, isLastInGroup);
        });

        container = originalContainer;
        if (container.children.length === 0) {
            while (tempContainer.firstChild) container.appendChild(tempContainer.firstChild);
        } else {
            let newChildren = Array.from(tempContainer.children);
            let oldChildren = Array.from(container.children);

            for (let i = 0; i < newChildren.length; i++) {
                if (!oldChildren[i]) container.appendChild(newChildren[i]);
                else if (newChildren[i].id && oldChildren[i].id === newChildren[i].id) {
                    if (oldChildren[i].innerHTML !== newChildren[i].innerHTML) {
                        let audio = oldChildren[i].querySelector('audio');
                        if (!audio || audio.paused) {
                            oldChildren[i].innerHTML = newChildren[i].innerHTML;
                            oldChildren[i].className = newChildren[i].className;
                            attachMessageListeners(oldChildren[i].querySelector('.msg-bubble-box') || oldChildren[i], newChildren[i].id, messagesMap.get(newChildren[i].id));
                        }
                    }
                } else container.replaceChild(newChildren[i], oldChildren[i]);
            }
            while (container.children.length > newChildren.length) container.removeChild(container.lastChild);
        }
    }

            </div>

    // =========================================
    //  INTERACTIONS & SWIPE LOGIC

    function attachMessageListeners(element, id, m) {
        let lastTap = 0;
        element.addEventListener('touchend', (e) => {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 300 && tapLength > 0) {
                e.preventDefault(); 
                if (m.sender === myUid) { vibrate(40); activeMenuId = id; initEdit(); } 
                else { vibrate(50); triggerHeartAnimation(); applyReactionToId(id, m.reactions?.[myUid]?.emoji === '❤️' ? '' : '❤️'); }
            }
            lastTap = currentTime;
        }, { passive: false });

        let startX = 0, currentX = 0, menuTimer = null, isScrolling = false;
        let swipeBubbleBox = element.querySelector('.msg-bubble-box') || element;
        let swipeIcon = swipeBubbleBox.querySelector('.swipe-reply-icon');
        let side = m.sender === myUid ? 'sent' : 'received';

        element.addEventListener('touchstart', (e) => {
            if (e.target.closest('.audio-control-btn') || e.target.closest('.audio-speed-btn')) return;
            startX = e.touches[0].clientX; currentX = startX; isScrolling = false; 
            menuTimer = setTimeout(() => {
                if (!isScrolling && Math.abs(currentX - startX) < 10) { vibrate(70); openMenu(id, m.sender, m.text); }
            }, 500);
        }, {passive: true});

        element.addEventListener('touchmove', (e) => {
            if (e.target.closest('.audio-control-btn')) return;
            currentX = e.touches[0].clientX;
            let diff = currentX - startX;
            if (Math.abs(diff) > 10) { clearTimeout(menuTimer); isScrolling = true; }
            if ((side === 'received' && diff > 0 && diff < 150) || (side === 'sent' && diff < 0 && diff > -150)) {
                swipeBubbleBox.style.transform = `translateX(${diff}px)`;
                if(swipeIcon) swipeIcon.style.transform = `translateY(-50%) scale(${Math.min(1, Math.abs(diff) / 60)})`;
            }
        }, {passive: true});

        element.addEventListener('touchend', (e) => {
            clearTimeout(menuTimer);
            if (e.target.closest('.audio-control-btn')) return;
            let diff = currentX - startX;
            if (((side === 'received' && diff > 60) || (side === 'sent' && diff < -60)) && isScrolling) {
                vibrate(40);
                triggerReply(m.text || (m.imageUrl ? "📷 Photo" : "Attachment"));
            }
            swipeBubbleBox.style.transition = "transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
            swipeBubbleBox.style.transform = `translateX(0px)`;
            if(swipeIcon) { swipeIcon.style.transition = "transform 0.2s"; swipeIcon.style.transform = `translateY(-50%) scale(0)`; }
            setTimeout(() => { swipeBubbleBox.style.transition = ""; if(swipeIcon) swipeIcon.style.transition = ""; }, 200);
        });
    }

    // Reaction & Menu Logic
    function applyReaction(emoji) { if (!activeMenuId) return; const msgId = activeMenuId; closeMenu(); vibrate(30); applyReactionToId(msgId, emoji); }
    function applyReactionToId(id, emoji) {
        if(!messagesMap.has(id)) return;
        let msg = messagesMap.get(id);
        if(!msg.reactions) msg.reactions = {};
        if(msg.reactions[myUid] && msg.reactions[myUid].emoji === emoji) delete msg.reactions[myUid];
        else if (emoji !== '') msg.reactions[myUid] = { emoji: emoji };
        messagesMap.set(id, msg);
        renderAll();
        triggerReactionPop(id, emoji);
    }

    // =========================================
    
    window.toggleAudio = function(id) {
        const audio = document.getElementById(id);
        const icon = document.getElementById('icon-' + id);
        const wave = document.getElementById('wave-' + id);
        if (!audio) return;
        document.querySelectorAll('audio').forEach(a => { if(a.id !== id && !a.paused) { a.pause(); window.resetAudioUI(a.id); } });
        if (audio.paused) {
            audio.play(); icon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            if(wave) wave.classList.add('audio-playing');
        } else {
            audio.pause(); icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
            if(wave) wave.classList.remove('audio-playing');
        }
    };
    
    window.changePlaybackRate = function(id) {
        const audio = document.getElementById(id);
        const btn = document.getElementById('speed-' + id);
        if(!audio) return;
        let next = audio.playbackRate === 1.0 ? 1.5 : audio.playbackRate === 1.5 ? 2.0 : 1.0;
        audio.playbackRate = next; btn.innerText = next + "x";
    }

    window.resetAudioUI = function(id) {
        const icon = document.getElementById('icon-' + id);
        const wave = document.getElementById('wave-' + id);
        if(icon) icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
        if(wave) wave.classList.remove('audio-playing');
    };

    // Recorder Local Simulation (Doesn't upload to API, just renders to UI)
    let mediaRecorder = null; let audioChunks = []; let recInterval = null; let isRecording = false; let isLocked = false;
    const recOverlay = document.getElementById('recording-overlay'); const recTimer = document.getElementById('rec-timer');
    const cancelZone = document.getElementById('cancel-trash'); const lockPill = document.getElementById('lock-pill');

    async function startRecording() {
        if (!navigator.mediaDevices) return;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream); audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.start(); isRecording = true; isLocked = false;
            
            mInput.blur(); micBtn.classList.add('recording'); recOverlay.style.display = 'flex'; lockPill.classList.add('visible');
            vibrate(50); popSound.play().catch(()=>{});
            
            let recStartTime = Date.now();
            recInterval = setInterval(() => {
                const diff = Math.floor((Date.now() - recStartTime) / 1000);
                recTimer.innerText = `${Math.floor(diff / 60)}:${diff % 60 < 10 ? '0'+(diff % 60) : diff % 60}`;
            }, 1000);
        } catch (err) { alert("Microphone access needed"); }
    }

    function stopRecording(shouldSend) {
        if (!mediaRecorder || !isRecording) return;
        isRecording = false; mediaRecorder.stop(); mediaRecorder.stream.getTracks().forEach(t => t.stop());
        clearInterval(recInterval); recTimer.innerText = "0:00";
        micBtn.classList.remove('recording', 'locked'); recOverlay.style.display = 'none'; lockPill.classList.remove('visible'); cancelZone.classList.remove('visible', 'active');
        
        if (shouldSend) {
            setTimeout(() => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const audioUrl = URL.createObjectURL(blob);
                addLocalMessage("", myUid, null, null, audioUrl);
                // Trigger AI response to voice note
                setTimeout(() => {
                    setAITypingStatus(true);
                    setTimeout(() => {
                        setAITypingStatus(false);
                        addLocalMessage("I see you sent a voice note! I am currently only processing text, but I hope to have ears soon.", targetUid);
                    }, 1500);
                }, 1000);
            }, 200);
        } else vibrate([30,50,30]);
    }

    micBtn.addEventListener('touchstart', (e) => { e.preventDefault(); mInput.blur(); if (isLocked) { stopRecording(true); return; } if (isRecording) return; startRecording(); }, { passive: false });
    micBtn.addEventListener('touchend', (e) => { e.preventDefault(); if (isLocked) return; stopRecording(true); });

    // File/Image Handlers (Render Locally for UI)
    const imagePickerComponent = document.getElementById('img-picker');
    if (imagePickerComponent) {
        imagePickerComponent.addEventListener('image-uploaded', (e) => {
            if (e.detail.url) {
                addLocalMessage("", myUid, null, e.detail.url);
                setAITypingStatus(true);
                setTimeout(() => { setAITypingStatus(false); addLocalMessage("That's a nice image! What would you like to know about it?", targetUid); }, 1500);
            }
        });
    }

    // Helpers
    function timeAgo(date) {
        const seconds = Math.floor((new Date() - date) / 1000);
        let interval = seconds / 31536000; if (interval > 1) return Math.floor(interval) + "y";
        interval = seconds / 2592000; if (interval > 1) return Math.floor(interval) + "mo";
        interval = seconds / 86400; if (interval > 1) return Math.floor(interval) + "d";
        interval = seconds / 3600; if (interval > 1) return Math.floor(interval) + "h";
        interval = seconds / 60; if (interval > 1) return Math.floor(interval) + "m";
        return "Now";
    }
    function formatTime12(date) {
        let hours = date.getHours(); let minutes = date.getMinutes();
        let ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12; hours = hours ? hours : 12; minutes = minutes < 10 ? '0'+minutes : minutes;
        return `${hours}:${minutes} ${ampm}`;
    }
    function getDateDivider(date) {
        const today = new Date(); const yesterday = new Date(); yesterday.setDate(today.getDate() - 1);
        if (date.toDateString() === today.toDateString()) return "Today";
        if (date.toDateString() === yesterday.toDateString()) return "Yesterday";
        return date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }
    function vibrate(pattern = 50) { if (navigator.vibrate) navigator.vibrate(pattern); }
    window.scrollToBottom = function(smooth = false) { chatFlow.scrollTo({ top: chatFlow.scrollHeight, behavior: smooth ? 'smooth' : 'auto' }); }
    function pushModalState(modalName) { history.pushState({modal: modalName}, null, ""); }
    function smartBack() { history.back(); }

    // Visual Effects
    function triggerHeartAnimation() { const h = document.getElementById('heart-overlay'); h.style.animation = 'none'; h.offsetHeight; h.style.animation = 'heartPop 0.8s ease-out'; likeSound.play().catch(e => {}); }
    function fireEffect(type) {
        const canvas = document.getElementById('effect-canvas'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = []; let particleCount = type === 'hearts' ? 60 : 50;
        for(let i=0; i < particleCount; i++) particles.push({ x: Math.random() * canvas.width, y: canvas.height + Math.random() * 200, size: Math.random() * 15 + 10, speedY: -(Math.random() * 4 + 3), speedX: Math.random() * 2 - 1, opacity: 1 });
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); let active = false;
            particles.forEach((p) => {
                p.x += p.speedX; p.y += p.speedY; p.opacity -= 0.0015;
                ctx.save(); ctx.globalAlpha = Math.max(0, p.opacity); ctx.translate(p.x, p.y);
                ctx.font = `${p.size*2}px Arial`; ctx.fillText('✨', -p.size, p.size); ctx.restore();
                if (p.opacity > 0 && p.y > -100) active = true;
            });
            if(active) requestAnimationFrame(animate); else ctx.clearRect(0,0, canvas.width, canvas.height);
        } animate();
    }
    function checkKeywords(text) {
        const lower = text.toLowerCase();
        if (lower.includes('love') || lower.includes('❤️')) fireEffect('hearts');
        else if (lower.includes('congrats') || lower.includes('🎉')) fireEffect('confetti');
    }
    function linkify(text) { return text.replace(/(https?:\/\/[^\s]+)/g, `<a onclick="event.stopPropagation(); window.open('$1', '_blank')">$1</a>`); }

    // Lock viewport scroll
    function lockViewportAndHeader() {
        document.body.style.height = '100vh'; 
        window.scrollTo(0, 0); document.documentElement.scrollTop = 0; document.body.scrollTop = 0;
        window.scrollToBottom();
    }
    if (window.visualViewport) { window.visualViewport.addEventListener('resize', lockViewportAndHeader); window.visualViewport.addEventListener('scroll', lockViewportAndHeader); }

</script>
