<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V | Coming Soon</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-color: #ffffff;
            --faded-white: rgba(255, 255, 255, 0.6);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--accent-color);
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        .logo-v {
            font-size: 12rem;
            font-weight: 900;
            letter-spacing: -10px;
            margin: 0;
            line-height: 1;
            background: linear-gradient(180deg, #fff 30%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 4s ease-in-out infinite;
        }

        .status-text {
            font-size: 1.2rem;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            color: var(--faded-white);
            margin-top: 1rem;
            font-weight: 300;
        }

        .line {
            width: 40px;
            height: 1px;
            background-color: var(--faded-white);
            margin: 20px auto;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.98); }
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .logo-v { font-size: 8rem; }
            .status-text { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="logo-v">V</h1>
        <div class="line"></div>
        <p class="status-text">Coming Soon</p>
    </div>

</body>
</html>
