<!DOCTYPE html>
<html lang="en" style="overflow: hidden;">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Quantum from Goorac</title>
    <meta name="description" content="Login or create an account now to get started with Goorac.">
    <meta property="og:title" content="Goorac">
    <meta property="og:description" content="Login or create an account now.">
    <meta property="og:image" content="images/icon.png"> 
    <meta property="og:type" content="website">

    <script src="config.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Quantum",
  "alternateName": "Quantum Web App",
  "url": "https://www.goorac.biz",
  "logo": "https://www.goorac.biz/logo.png",
  "sameAs": [
    "https://twitter.com/yourprofile",
    "https://www.linkedin.com/company/yourprofile"
  ]
}
</script>

    
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Quantum",
  "url": "https://www.goorac.biz/",
  "hasPart": [
    {
      "@type": "WebPage",
      "name": "Login",
      "url": "https://www.goorac.biz/login"
    },
    {
      "@type": "WebPage",
      "name": "Download App",
      "url": "https://www.goorac.biz/download"

      "@type": "WebPage",

    <style>
        :root {
            --bg: #000000;
        }

        html, body {
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
            -webkit-text-size-adjust: none;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .container {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* Splash Screen Image */
        .splash-logo {
            width: 90px;
            height: 90px;
            object-fit: contain;
            /* Subtle heartbeat scaling */
            animation: splash-pulse 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
        }

        @keyframes splash-pulse {
            0% { transform: scale(0.95); opacity: 0.9; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        /* Professional Bottom Branding */
        .bottom-section {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            width: 100%;
        }

        .from-text {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
        }

        .company-text {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.15rem;
            color: #ffffff;
            /* Optional: You can change the color above to var(--primary) if you want it blue */
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="container">
        <img src="images/icon.png" alt="Goorac" class="splash-logo" onerror="this.style.display='none'">
        
        <div class="bottom-section">
            <div class="from-text">from</div>
            <div class="company-text">GOORAC</div>
        </div>
    </div>

    <script>
        function initializeApp() {
            // 1. Initialize via config.js pattern
            if (typeof window.initFirebaseCore === 'function') {
                window.initFirebaseCore();
            } else if (!firebase.apps.length && window.firebaseConfig) {
                firebase.initializeApp(window.firebaseConfig);
            }

            if (!firebase.apps.length) {
                console.error("Firebase failed to load.");
                return;
            }

            // 2. Auth state check and immediate redirection
            const auth = firebase.auth();
            
            auth.onAuthStateChanged((user) => {
                // Redirects instantly as soon as Firebase finishes checking the auth state.
                if (user) {
                    window.location.replace("home.html");
                } else {
                    window.location.replace("login.html");
                }
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeApp);
        } else {
            initializeApp();
        }
    </script>
</body>
</html>
