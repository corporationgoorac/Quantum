<!DOCTYPE html>
<html lang="en" style="overflow: hidden;">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#121212">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="components/theme.js"></script>

    <title>Quantum from Goorac</title>
    
    <script src="config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --bg: #121212;
            --sidebar-width: 400px;
        }

        html, body {
            background-color: var(--bg);
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* --- SPLASH SCREEN (Visible during auth check) --- */
        #splash-screen {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--bg);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }

        .splash-logo {
            width: 90px; height: 90px; object-fit: contain;
            animation: splash-pulse 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
        }

        @keyframes splash-pulse {
            0% { transform: scale(0.95); opacity: 0.9; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        .bottom-branding {
            position: absolute; bottom: 50px; text-align: center;
        }

        /* --- PC SPA LAYOUT (Hidden by default) --- */
        #desktop-spa {
            display: none; height: 100vh; width: 100vw;
        }

        #sidebar-pane {
            width: var(--sidebar-width); height: 100%;
            border-right: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        #content-pane {
            flex: 1; height: 100%; background: var(--bg);
        }

        iframe { width: 100%; height: 100%; border: none; background: var(--bg); display: block; }

        @media (min-width: 1024px) {
            #desktop-spa.ready { display: flex; }
        }
    </style>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body oncontextmenu="return false;">

    <div id="splash-screen">
        <img src="images/icon.png" alt="Goorac" class="splash-logo" onerror="this.style.display='none'">
        <div class="bottom-branding">
            <div style="font-size: 0.85rem; color: rgba(255, 255, 255, 0.5);">from</div>
            <div style="font-size: 1.2rem; font-weight: 600; letter-spacing: 0.15rem; color: #fff;">GOORAC</div>
        </div>
    </div>

    <div id="desktop-spa">
        <div id="sidebar-pane">
            <iframe src="home.html" id="frame-sidebar"></iframe>
        </div>
        <div id="content-pane">
            <iframe src="messages.html" id="frame-main" name="main_content"></iframe>
        </div>
    </div>

    <script>
        const isPC = window.innerWidth >= 1024;
        const splash = document.getElementById('splash-screen');
        const spa = document.getElementById('desktop-spa');
        const frameMain = document.getElementById('frame-main');
        const frameSidebar = document.getElementById('frame-sidebar');

        function handleNavigation(user) {
            if (!user) {
                // Not logged in: Always redirect to login (Mobile & PC)
                window.location.replace("login.html");
                return;
            }

            // FIXED ROUTING LOGIC: Check for dynamic view parameter
            const params = new URLSearchParams(window.location.search);
            let requestedView = params.get('view');
            
            // Fix for 404: Ensure extension exists
            if (requestedView && !requestedView.includes('.html')) {
                requestedView += '.html';
            }

            if (!isPC) {
                // MOBILE: Perform standard window replacement
                // If a specific view was requested, go there, otherwise go home.
                window.location.replace(requestedView || "home.html");
            } else {
                // DESKTOP: Reveal the SPA
                if (requestedView) {
                    frameMain.src = requestedView;
                }

                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    spa.classList.add('ready');
                }, 500);
                initSPAInterceptors();
            }
        }

        // Intercept clicks inside PC iframes to keep them in the SPA
        function initSPAInterceptors() {
            [frameMain, frameSidebar].forEach(frame => {
                frame.onload = () => {
                    try {
                        const doc = frame.contentDocument || frame.contentWindow.document;
                        doc.addEventListener('click', (e) => {
                            const target = e.target.closest('a, .chat-item, .nav-item, .stat-card, .btn-msg, .btn-view');
                            if (!target) return;
                            
                            let href = target.getAttribute('href');
                            if (!href && target.onclick) {
                                const match = target.onclick.toString().match(/'(.*?)'/);
                                if (match) href = match[1];
                            }

                            if (href && href !== '#' && !href.startsWith('http')) {
                                e.preventDefault();
                                // Route content to the main (right) pane
                                frameMain.src = href; 
                                
                                // Update browser URL so refresh doesn't lose the page
                                const newUrl = `index.html?view=${encodeURIComponent(href)}`;
                                window.history.pushState({ path: href }, '', newUrl);
                            }
                        }, true);
                    } catch (e) {}
                };
            });
        }

        function initializeApp() {
            if (typeof window.initFirebaseCore === 'function') {
                window.initFirebaseCore();
            } else if (!firebase.apps.length && window.firebaseConfig) {
                firebase.initializeApp(window.firebaseConfig);
            }

            firebase.auth().onAuthStateChanged(handleNavigation);
        }

        document.readyState === 'loading' ? 
            document.addEventListener('DOMContentLoaded', initializeApp) : initializeApp();
    </script>
</body>
</html>
