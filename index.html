<!DOCTYPE html>
<html lang="en" style="overflow: hidden;">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#121212">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="components/theme.js"></script>

    <title>Quantum from Goorac</title>
    
    <script src="config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --bg: #121212;
            --sidebar-width: 400px;
        }

        html, body {
            background-color: var(--bg);
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* --- SPLASH SCREEN (Visible during auth check) --- */
        #splash-screen {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--bg);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }

        .splash-logo {
            width: 90px; height: 90px; object-fit: contain;
            animation: splash-pulse 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
        }

        @keyframes splash-pulse {
            0% { transform: scale(0.95); opacity: 0.9; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        .bottom-branding {
            position: absolute; bottom: 50px; text-align: center;
        }

        /* --- PC SPA LAYOUT (Hidden by default) --- */
        #desktop-spa {
            display: none; height: 100vh; width: 100vw;
        }

        #sidebar-pane {
            width: var(--sidebar-width); height: 100%;
            border-right: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        #content-pane {
            flex: 1; height: 100%; background: var(--bg);
            position: relative; /* ADDED FOR LOADER POSITIONING */
        }

        iframe { width: 100%; height: 100%; border: none; background: var(--bg); display: block; }

        @media (min-width: 1024px) {
            #desktop-spa.ready { display: flex; }
        }
        
        /* NEW STYLES FOR WELCOME SCREEN */
        #welcome-screen-default {
            width: 100%; height: 100%; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; background: var(--bg);
            text-align: center; color: white;
        }

        /* INSTALL BUTTON STYLE */
        #install-app-btn {
            margin-top: 25px; background: white; color: black; border: none;
            padding: 12px 24px; border-radius: 12px; font-weight: 700;
            cursor: pointer; display: none; align-items: center; gap: 8px;
            transition: transform 0.2s;
        }
        #install-app-btn:active { transform: scale(0.95); }

        /* ==========================================
           ADVANCED UI INJECTIONS (ADDED)
           ========================================== */
        
        /* Sleek Branded Spinner */
        #iframe-loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 40px; height: 40px; border: 3px solid rgba(255, 109, 0, 0.1);
            border-top-color: #FF6D00; border-radius: 50%;
            animation: iframe-spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
            display: none; z-index: 10;
        }
        @keyframes iframe-spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* Native App-Style Network Toast */
        #network-toast {
            position: fixed; top: -60px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.95); color: white; padding: 12px 24px;
            border-radius: 30px; font-size: 0.9rem; font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 10000; transition: top 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none;
        }
        #network-toast.show { top: 24px; }
        
        /* Smooth Iframe Fade-in to prevent flashing */
        #frame-main { transition: opacity 0.4s ease; opacity: 0; }
        #frame-main.loaded { opacity: 1; }
    </style>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body oncontextmenu="return false;">

    <div id="network-toast">Network Status</div>

    <div id="splash-screen">
        <img src="images/icon.png" alt="Goorac" class="splash-logo" onerror="this.style.display='none'">
        <div class="bottom-branding">
            <div style="font-size: 0.85rem; color: rgba(255, 255, 255, 0.5);">from</div>
            <div style="font-size: 1.2rem; font-weight: 600; letter-spacing: 0.15rem; color: #fff;">GOORAC</div>
        </div>
    </div>

    <div id="desktop-spa">
        <div id="sidebar-pane">
            <iframe src="home.html" id="frame-sidebar"></iframe>
        </div>
        <div id="content-pane">
            <div id="iframe-loader"></div>

            <div id="welcome-screen-default">
                <img src="images/icon.png" style="width: 80px; opacity: 0.2; margin-bottom: 20px;">
                <h1 style="font-weight: 800; font-size: 1.8rem; letter-spacing: -1px; margin-bottom: 10px;">Welcome to Quantum Desktop</h1>
                <p style="color: var(--text-dim); max-width: 300px; line-height: 1.5;">Select a conversation or explore your network to get started.</p>
                
                <button id="install-app-btn">
                    <span class="material-icons-round">download</span>
                    Install Quantum App
                </button>
            </div>
            <iframe src="about:blank" id="frame-main" name="main_content" style="display:none;"></iframe>
        </div>
    </div>

    <script>
        const isPC = window.innerWidth >= 1024;
        const splash = document.getElementById('splash-screen');
        const spa = document.getElementById('desktop-spa');
        const frameMain = document.getElementById('frame-main');
        const frameSidebar = document.getElementById('frame-sidebar');
        const welcomeScreen = document.getElementById('welcome-screen-default');

        // PWA INSTALL LOGIC
        let deferredPrompt;
        const installBtn = document.getElementById('install-app-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'flex';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.style.display = 'none';
                deferredPrompt = null;
            }
        });

        // REGISTER SERVICE WORKER
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed:', err));
            });
        }

        function handleNavigation(user) {
            if (!user) {
                // Not logged in: Always redirect to login (Mobile & PC)
                window.location.replace("login.html");
                return;
            }

            // FIXED ROUTING LOGIC: Check for dynamic view parameter
            const params = new URLSearchParams(window.location.search);
            let requestedView = params.get('view');
            
            // Fix for 404: Ensure extension exists
            if (requestedView && !requestedView.includes('.html')) {
                requestedView += '.html';
            }

            if (!isPC) {
                // MOBILE: Perform standard window replacement
                // If a specific view was requested, go there, otherwise go home.
                window.location.replace(requestedView || "home.html");
            } else {
                // DESKTOP: Reveal the SPA
                if (requestedView) {
                    welcomeScreen.style.display = 'none';
                    frameMain.style.display = 'block';
                    frameMain.src = requestedView;
                    
                    // --- ADVANCED CONTEXT SWITCHING (DEEP LINK) ---
                    // If the requested view is a chat, automatically flip the sidebar to messages.html
                    if (requestedView.includes('chat.html') || requestedView.includes('groupChat.html')) {
                        const currentSidebarSrc = frameSidebar.contentWindow ? frameSidebar.contentWindow.location.href : frameSidebar.src;
                        if (!currentSidebarSrc.includes('messages.html')) {
                            frameSidebar.src = 'messages.html';
                        }
                    }
                }

                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    spa.classList.add('ready');
                }, 500);
                initSPAInterceptors();
            }
        }

        // Intercept clicks inside PC iframes to keep them in the SPA
        function initSPAInterceptors() {
            [frameMain, frameSidebar].forEach(frame => {
                frame.onload = () => {
                    try {
                        const doc = frame.contentDocument || frame.contentWindow.document;
                        doc.addEventListener('click', (e) => {
                            const target = e.target.closest('a, .chat-item, .nav-item, .stat-card, .btn-msg, .btn-view');
                            if (!target) return;
                            
                            let href = target.getAttribute('href');
                            if (!href && target.onclick) {
                                const match = target.onclick.toString().match(/'(.*?)'/);
                                if (match) href = match[1];
                            }

                            if (href && href !== '#' && !href.startsWith('http')) {
                                // CRITICAL FIX: Stop the current frame from navigating if it's the sidebar
                                e.preventDefault();
                                e.stopPropagation();

                                // NEW NAVIGATION RULES:
                                // 1. If clicking "Messages", change the SIDEBAR (Left side)
                                if (href.includes('messages.html')) {
                                    frameSidebar.src = 'messages.html';
                                } 
                                // 2. If clicking "Home", change the SIDEBAR (Left side)
                                else if (href.includes('home.html')) {
                                    frameSidebar.src = 'home.html';
                                }
                                // 3. Fix 404 and Sidebar hijacking:
                                // If navigation is a raw username or specific chat/profile link, send to RIGHT PANE
                                else {
                                    let finalUrl = href;
                                    // Detect if it's a raw username (no .html and no parameters)
                                    if (!href.includes('.html') && !href.includes('?')) {
                                        finalUrl = `chat.html?user=${href}`;
                                    }

                                    welcomeScreen.style.display = 'none';
                                    frameMain.style.display = 'block';
                                    frameMain.src = finalUrl; 
                                    
                                    // --- ADVANCED CONTEXT SWITCHING (USER CLICK) ---
                                    // If a chat was clicked, automatically swap the sidebar to the inbox context
                                    if (finalUrl.includes('chat.html') || finalUrl.includes('groupChat.html')) {
                                        const currentSidebarSrc = frameSidebar.contentWindow ? frameSidebar.contentWindow.location.href : frameSidebar.src;
                                        if (!currentSidebarSrc.includes('messages.html')) {
                                            frameSidebar.src = 'messages.html';
                                        }
                                    }
                                }
                                
                                // Update browser URL so refresh doesn't lose the page
                                const newUrl = `index.html?view=${encodeURIComponent(href)}`;
                                window.history.pushState({ path: href }, '', newUrl);
                            }
                        }, true);
                    } catch (e) {}
                };
            });
        }

        function initializeApp() {
            if (typeof window.initFirebaseCore === 'function') {
                window.initFirebaseCore();
            } else if (!firebase.apps.length && window.firebaseConfig) {
                firebase.initializeApp(window.firebaseConfig);
            }

            firebase.auth().onAuthStateChanged(handleNavigation);
        }

        document.readyState === 'loading' ? 
            document.addEventListener('DOMContentLoaded', initializeApp) : initializeApp();


        // ==========================================
        // ADVANCED SPA FEATURES & PERFORMANCE BOOSTS (ADDED)
        // ==========================================

        // 1. Cross-Frame Communication Bridge (PostMessage API)
        // Allows internal sub-pages to safely send commands to the master shell without cross-origin errors
        window.addEventListener('message', (event) => {
            // Security guard to prevent cross-site scripting
            if (event.origin !== window.location.origin) return;
            
            const data = event.data;
            if (data && data.type === 'QUANTUM_NAVIGATE') {
                if (data.target === 'sidebar') {
                    frameSidebar.src = data.url;
                } else if (data.target === 'main') {
                    welcomeScreen.style.display = 'none';
                    frameMain.style.display = 'block';
                    frameMain.src = data.url;
                }
            }
        });

        // 2. Smooth Loading State Management for Main Content
        const loaderUi = document.getElementById('iframe-loader');

        // Remove spinner when iframe finishes loading
        frameMain.addEventListener('load', () => {
            if(frameMain.src !== 'about:blank' && !frameMain.src.endsWith('about:blank')) {
                loaderUi.style.display = 'none';
                frameMain.classList.add('loaded'); // Triggers smooth CSS fade-in
            }
        });

        // Intercept native src changes to instantly show the spinner
        const originalSetSrc = Object.getOwnPropertyDescriptor(HTMLIFrameElement.prototype, 'src').set;
        Object.defineProperty(frameMain, 'src', {
            set: function(val) {
                if(val !== 'about:blank' && !val.includes('about:blank')) {
                    this.classList.remove('loaded');
                    loaderUi.style.display = 'block';
                }
                return originalSetSrc.call(this, val);
            }
        });

        // 3. Native App-Style Network Status Detection
        const networkToast = document.getElementById('network-toast');
        let toastTimeout;
        
        function showNetworkToast(msg, isError = false) {
            networkToast.innerText = msg;
            networkToast.style.borderLeft = isError ? '4px solid #FF453A' : '4px solid #32D74B';
            networkToast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => networkToast.classList.remove('show'), 3500);
        }

        window.addEventListener('online', () => showNetworkToast('Back online! Connection restored.'));
        window.addEventListener('offline', () => showNetworkToast('You are currently offline.', true));

        // 4. Global Error Boundary for SPA Stability
        // Desktop SPAs often throw harmless resize errors that can clog the console or halt execution
        window.addEventListener('error', (e) => {
            if (e.message === 'ResizeObserver loop limit exceeded') {
                // Safely swallow harmless Chromium rendering loop warnings to keep SPA smooth
                e.preventDefault();
                e.stopImmediatePropagation();
            } else {
                console.warn("Quantum SPA Handled Error:", e.message);
            }
        });
    </script>
</body>
</html>
