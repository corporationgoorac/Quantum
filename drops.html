<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json"> <title>Create Drop | Quantum</title>
    <script src="components/theme.js"></script>

    <script src="config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="components/songPicker.js"></script>
    <script src="components/closeFriends.js" defer></script>
    <script src="components/imagePicker.js" defer></script>
    <script src="components/filePicker.js" defer></script>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root { 
            --bg: #030303; 
            --accent: #00d2ff; 
            --accent-glow: rgba(0, 210, 255, 0.5);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --safe-top: env(safe-area-inset-top, 20px);
            --glass-bg: rgba(20, 20, 20, 0.75);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.65);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body {
            background-color: var(--bg); color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; overflow: hidden; height: 100dvh; width: 100vw;
            overscroll-behavior-y: none;
            -webkit-font-smoothing: antialiased;
        }

        /* --- BACKGROUND TEXTURE --- */
        .bg-grid {
            position: absolute; inset: 0; z-index: 0; pointer-events: none; opacity: 0.12;
            background-image: radial-gradient(circle at center, rgba(255,255,255,0.8) 1px, transparent 1px);
            background-size: 28px 28px;
        }

        /* Pickers Base Z-Index */
        song-picker, close-friends-selector, image-picker, file-picker { 
            position: absolute !important; z-index: 2147483647 !important; top: 0; left: 0;
        }

        /* --- FLOATING HEADER (PREMIUM GLASSMORPHISM) --- */
        header {
            position: absolute; top: 0; left: 0; width: 100%; z-index: 50;
            padding: calc(12px + var(--safe-top)) 24px 16px;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 50%, transparent 100%);
            pointer-events: none; opacity: 0; transform: translateY(-20px);
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        header.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
        
        .header-left, .header-right { display: flex; align-items: center; gap: 14px; }
        
        .icon-btn { 
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center;
            color: #fff; cursor: pointer; border: 1px solid var(--glass-border);
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .icon-btn:active { transform: scale(0.88); }
        .icon-btn.active { 
            color: #fff; border-color: transparent; 
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); 
            box-shadow: 0 0 20px var(--accent-glow); 
        }

        #edit-cf-btn {
            position: absolute; top: calc(75px + var(--safe-top)); right: 24px;
            font-size: 11px; color: #fff; font-weight: 800; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 0.8px; display: none; z-index: 50;
            background: linear-gradient(135deg, #00ba7c 0%, #008f5d 100%); 
            padding: 8px 16px; border-radius: 100px;
            pointer-events: auto; box-shadow: 0 6px 20px rgba(0, 186, 124, 0.4);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* --- STATE 1: EMPTY SELECTION --- */
        #empty-state {
            position: absolute; inset: 0; z-index: 30;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
            background: transparent; transition: opacity 0.4s ease, transform 0.4s ease;
        }
        #empty-state.hidden { opacity: 0; transform: scale(0.97); pointer-events: none; }
        
        .media-btn {
            width: 85vw; max-width: 340px; padding: 22px 24px; border-radius: 28px;
            background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            color: var(--text-primary); font-size: 17px; font-weight: 700; letter-spacing: -0.3px;
            display: flex; align-items: center; gap: 20px;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
            box-shadow: 0 10px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1); 
            position: relative; overflow: hidden;
        }
        .media-btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            transform: skewX(-20deg); transition: 0.6s ease;
        }
        .media-btn:active { transform: scale(0.96); border-color: rgba(255,255,255,0.25); background: rgba(30, 30, 30, 0.85); }
        .media-btn:active::before { left: 150%; transition: 0.6s ease; }
        .media-btn .icon-wrapper {
            width: 52px; height: 52px; border-radius: 16px; 
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 100%);
            display: flex; align-items: center; justify-content: center; 
            border: 1px solid rgba(255,255,255,0.05); box-shadow: inset 0 2px 5px rgba(255,255,255,0.05);
        }
        .media-btn .material-icons-round { font-size: 28px; color: #fff; }

        /* --- STATE 2 & 3: MEDIA CANVAS --- */
        #canvas-container {
            position: absolute; inset: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: #000; z-index: 10; overflow: hidden; opacity: 0; pointer-events: none;
            transition: opacity 0.5s ease;
        }
        #canvas-container.active { opacity: 1; pointer-events: auto; }
        
        #media-backdrop {
            position: absolute; inset: -10%; width: 120%; height: 120%;
            object-fit: cover; filter: blur(45px) brightness(0.3); z-index: 0;
            transform: scale(1.15); transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #canvas-container.active #media-backdrop { transform: scale(1); }
        
        #media-preview, #video-preview { 
            width: 100%; height: 100%; object-fit: contain; display: none; 
            position: absolute; inset: 0; z-index: 1; 
        }

        /* --- THE ADVANCED YOUTUBE CARD --- */
        #youtube-card {
            display: none; position: relative; z-index: 2;
            width: 82vw; max-width: 360px; aspect-ratio: 9/16;
            background: #050505; border-radius: 32px; overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.95), inset 0 1px 1px rgba(255,255,255,0.15); 
            transform: rotate(-2deg) scale(0.92); transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.6s ease;
        }
        #youtube-card.visible { display: block; transform: rotate(0deg) scale(1); box-shadow: 0 20px 60px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.2); }
        
        #yt-player-preview { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1;}
        
        .yt-overlay {
            position: absolute; inset: 0; z-index: 3; cursor: pointer;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.3) 35%, rgba(0,0,0,0.6) 100%);
            display: flex; flex-direction: column; justify-content: flex-end; padding: 28px 24px;
            transition: background 0.4s ease;
        }
        .yt-overlay.playing { background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 25%, transparent 100%); }

        .yt-play-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1);
            width: 76px; height: 76px; background: rgba(255,255,255,0.1); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: #fff;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.25); box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .yt-overlay.playing .yt-play-btn { transform: translate(-50%, -50%) scale(0.7); opacity: 0; }
        
        .yt-text-wrap { transition: transform 0.4s ease, opacity 0.4s ease; }
        .yt-overlay.playing .yt-text-wrap { transform: translateY(15px); opacity: 0.3; }

        /* --- BOTTOM ACTION BAR (PREMIUM PWA) --- */
        #share-btn-wrap {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 24px 24px calc(24px + var(--safe-bottom));
            background: linear-gradient(to top, rgba(0,0,0,0.98) 15%, transparent);
            z-index: 60; display: none; opacity: 0; transform: translateY(30px); 
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            justify-content: flex-end;
        }
        #share-btn-wrap.visible { display: flex; opacity: 1; transform: translateY(0); }
        
        .share-btn {
            background: #ffffff; color: #000000; border: none; padding: 16px 30px;
            border-radius: 100px; font-weight: 800; font-size: 16px; letter-spacing: -0.2px;
            cursor: pointer; display: flex; align-items: center; gap: 12px; 
            box-shadow: 0 12px 30px rgba(255,255,255,0.25), inset 0 -2px 0 rgba(0,0,0,0.1);
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .share-btn:active { transform: scale(0.94); box-shadow: 0 6px 15px rgba(255,255,255,0.2); }
        
        @keyframes popIn { 0% { transform: scale(0.6); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <header id="top-header">
        <div class="header-left">
            <div class="icon-btn" onclick="resetToEmptyState()"><span class="material-icons-round">close</span></div>
        </div>
        <div class="header-right">
            <div class="icon-btn" id="music-btn" onclick="triggerHaptic(); document.getElementById('song-picker').open()">
                <span class="material-icons-round">music_note</span>
            </div>
            <div class="icon-btn" id="audience-btn" onclick="toggleAudience()">
                <span class="material-icons-round" id="aud-icon">public</span>
            </div>
        </div>
    </header>
    <div id="edit-cf-btn" onclick="document.getElementById('cf-selector').open()">Edit Close Friends <span class="material-icons-round">edit</span></div>

    <div id="empty-state">
        <div class="icon-btn" style="position:absolute; top:calc(15px + var(--safe-top)); left:24px; background: transparent; border: none; box-shadow: none; width:auto; height:auto; padding:8px;" onclick="history.back()">
            <span class="material-icons-round" style="font-size: 32px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));">arrow_back</span>
        </div>
        
        <div class="media-btn" onclick="triggerHaptic(); document.getElementById('img-picker').openPicker()">
            <div class="icon-wrapper"><span class="material-icons-round">image</span></div>
            <span>Choose Photo</span>
        </div>
        <div class="media-btn" onclick="triggerHaptic(); document.getElementById('file-picker').openPicker()">
            <div class="icon-wrapper"><span class="material-icons-round" style="color: #ff3b30;">videocam</span></div>
            <span>Choose Video</span>
        </div>
    </div>

    <div id="canvas-container">
        <img id="media-backdrop" src="">
        
        <img id="media-preview" src="">
        <video id="video-preview" loop playsinline autoplay></video>
        
        <div id="youtube-card">
            <div id="yt-player-preview"></div>
            <div class="yt-overlay" id="yt-overlay" onclick="toggleYtPreview()">
                <div class="yt-play-btn" id="yt-play-icon"><span class="material-icons-round" style="font-size: 42px;">play_arrow</span></div>
                <div class="yt-text-wrap">
                    <div style="font-weight: 800; font-size: 22px; letter-spacing: -0.5px; text-shadow: 0 4px 15px rgba(0,0,0,0.9);">Shared Bite</div>
                    <div style="font-size: 14px; color: var(--text-secondary); font-weight: 500; margin-top: 4px;">Tap to preview • Auto-loops</div>
                </div>
            </div>
        </div>
    </div>

    <div id="share-btn-wrap">
        <button class="share-btn" id="final-share-btn" onclick="publishDrop()">
            Share Drop <span class="material-icons-round" style="font-size: 20px; background: #000; color: #fff; border-radius: 50%; padding: 6px; margin-right: -4px;">arrow_forward</span>
        </button>
    </div>

    <audio id="bg-audio" loop></audio>

    <song-picker id="song-picker"></song-picker>
    <close-friends-selector id="cf-selector"></close-friends-selector>
    <image-picker id="img-picker"></image-picker>
    <file-picker id="file-picker"></file-picker>

<script>
    // --- INIT & STATE ---
    if (typeof window.initFirebaseCore === 'function') window.initFirebaseCore();
    else if (!firebase.apps.length && window.firebaseConfig) firebase.initializeApp(window.firebaseConfig);
    
    const db = firebase.firestore();
    let currentUser = null;
    
    let state = {
        type: null, 
        mediaUrl: null,
        videoMeta: null,
        youtubeId: null,
        audience: 'public',
        song: null
    };

    const els = {
        header: document.getElementById('top-header'),
        emptyState: document.getElementById('empty-state'),
        canvas: document.getElementById('canvas-container'),
        backdrop: document.getElementById('media-backdrop'),
        imgPreview: document.getElementById('media-preview'),
        vidPreview: document.getElementById('video-preview'),
        ytCard: document.getElementById('youtube-card'),
        ytOverlay: document.getElementById('yt-overlay'),
        ytPlayIcon: document.getElementById('yt-play-icon'),
        shareWrap: document.getElementById('share-btn-wrap'),
        bgAudio: document.getElementById('bg-audio'),
        musicBtn: document.getElementById('music-btn'),
        shareBtn: document.getElementById('final-share-btn')
    };

    function triggerHaptic() { if (navigator.vibrate) navigator.vibrate(15); }

    firebase.auth().onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            checkUrlForSharedBite();
        } else {
            window.location.href = 'login.html';
        }
    });

    // --- YOUTUBE IFRAME API SETUP ---
    let ytPlayer = null;
    let isYtApiReady = false;

    window.onYouTubeIframeAPIReady = function() {
        isYtApiReady = true;
        // If state is already set to youtube, init the player now
        if (state.type === 'youtube' && state.youtubeId && !ytPlayer) {
            initYoutubePlayer(state.youtubeId);
        }
    };

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function initYoutubePlayer(ytId) {
        ytPlayer = new YT.Player('yt-player-preview', {
            videoId: ytId,
            playerVars: { 
                'autoplay': 0, 'controls': 0, 'disablekb': 1, 'fs': 0, 
                'rel': 0, 'modestbranding': 1, 'playsinline': 1, 'mute': 0
            },
            events: {
                'onStateChange': onYtStateChange
            }
        });
    }

    function onYtStateChange(event) {
        // Auto-loop logic
        if (event.data === YT.PlayerState.ENDED) {
            ytPlayer.playVideo();
        }
    }

    function toggleYtPreview() {
        triggerHaptic();
        if (ytPlayer && typeof ytPlayer.getPlayerState === 'function') {
            const playerState = ytPlayer.getPlayerState();
            if (playerState === YT.PlayerState.PLAYING) {
                ytPlayer.pauseVideo();
                els.ytOverlay.classList.remove('playing');
                els.ytPlayIcon.innerHTML = '<span class="material-icons-round" style="font-size: 42px;">play_arrow</span>';
            } else {
                // Pause background music if it's playing so audio doesn't clash
                if (state.song) {
                    els.bgAudio.pause();
                }
                ytPlayer.playVideo();
                els.ytOverlay.classList.add('playing');
                els.ytPlayIcon.innerHTML = '<span class="material-icons-round" style="font-size: 42px;">pause</span>';
            }
        }
    }

    // --- PARSE URL FOR SHARED BITE ---
    function checkUrlForSharedBite() {
        const urlParams = new URLSearchParams(window.location.search);
        const rawUrlParam = urlParams.get('v') || urlParams.get('url');
        
        if (rawUrlParam) {
            let ytId = null;
            if (rawUrlParam.length === 11) ytId = rawUrlParam;
            else {
                const match = rawUrlParam.match(/(?:v=|youtu\.be\/|shorts\/)([\w-]{11})/);
                if (match) ytId = match[1];
            }

            if (ytId) activateYoutubeState(ytId);
        }
    }

    // --- STATE ACTIVATORS ---
    function activateYoutubeState(ytId) {
        state.type = 'youtube';
        state.youtubeId = ytId;
        
        // Setup blurry background using YT thumbnail
        els.backdrop.src = `https://img.youtube.com/vi/${ytId}/maxresdefault.jpg`;
        
        // Init Player if API is ready, else wait for callback
        if (isYtApiReady && !ytPlayer) {
            initYoutubePlayer(ytId);
        } else if (ytPlayer && typeof ytPlayer.loadVideoById === 'function') {
            ytPlayer.loadVideoById(ytId);
            ytPlayer.pauseVideo();
            els.ytOverlay.classList.remove('playing');
            els.ytPlayIcon.innerHTML = '<span class="material-icons-round" style="font-size: 42px;">play_arrow</span>';
        }
        
        els.emptyState.classList.add('hidden');
        els.canvas.classList.add('active');
        els.ytCard.classList.add('visible');
        
        showOverlays();
    }

    function activateLocalMediaState(type, url, meta = null) {
        state.type = type;
        state.mediaUrl = url;
        state.videoMeta = meta;

        els.backdrop.src = url;
        els.emptyState.classList.add('hidden');
        els.canvas.classList.add('active');

        if (type === 'image') {
            els.imgPreview.style.display = 'block';
            els.imgPreview.src = url;
        } else if (type === 'video') {
            els.vidPreview.style.display = 'block';
            els.vidPreview.src = url;
            els.vidPreview.muted = !!state.song; 
        }

        showOverlays();
    }

    function resetToEmptyState() {
        triggerHaptic();
        state = { type: null, mediaUrl: null, videoMeta: null, youtubeId: null, audience: 'public', song: null };
        
        els.imgPreview.style.display = 'none'; els.imgPreview.src = '';
        els.vidPreview.style.display = 'none'; els.vidPreview.src = ''; els.vidPreview.muted = false;
        
        els.ytCard.classList.remove('visible');
        if (ytPlayer && typeof ytPlayer.pauseVideo === 'function') {
            ytPlayer.pauseVideo();
            els.ytOverlay.classList.remove('playing');
            els.ytPlayIcon.innerHTML = '<span class="material-icons-round" style="font-size: 42px;">play_arrow</span>';
        }

        els.backdrop.src = '';
        
        if(els.bgAudio) { els.bgAudio.pause(); els.bgAudio.src = ''; }
        els.musicBtn.classList.remove('active');
        
        document.getElementById('aud-icon').innerText = 'public';
        document.getElementById('edit-cf-btn').style.display = 'none';
        document.getElementById('audience-btn').classList.remove('active');

        els.header.classList.remove('visible');
        els.shareWrap.classList.remove('visible');
        els.canvas.classList.remove('active');
        
        setTimeout(() => els.emptyState.classList.remove('hidden'), 300);
    }

    function showOverlays() {
        els.header.classList.add('visible');
        els.shareWrap.classList.add('visible');
    }

    // --- PICKER LISTENERS ---
    document.addEventListener('image-uploaded', (e) => activateLocalMediaState('image', e.detail.url));
    
    document.addEventListener('file-uploaded', (e) => {
        if(e.detail.metadata.type === 'video') activateLocalMediaState('video', e.detail.url, e.detail.metadata);
        else alert("Only videos are supported.");
    });

    document.addEventListener('song-selected', (e) => {
        state.song = e.detail;
        if (state.song && state.song.previewUrl) {
            els.musicBtn.classList.add('active');
            els.bgAudio.src = state.song.previewUrl;
            
            // If YT is currently playing, pause it so song takes over
            if (state.type === 'youtube' && ytPlayer && typeof ytPlayer.getPlayerState === 'function') {
                if (ytPlayer.getPlayerState() === YT.PlayerState.PLAYING) {
                    toggleYtPreview();
                }
            }
            
            els.bgAudio.play().catch(err => console.log(err));
            if (state.type === 'video') els.vidPreview.muted = true;
        } else {
            els.musicBtn.classList.remove('active');
            els.bgAudio.pause(); els.bgAudio.src = '';
            if (state.type === 'video') els.vidPreview.muted = false;
        }
    });

    // --- AUDIENCE TOGGLE ---
    function toggleAudience() {
        triggerHaptic();
        state.audience = state.audience === 'public' ? 'close_friends' : 'public';
        const isCF = state.audience === 'close_friends';
        
        document.getElementById('aud-icon').innerText = isCF ? 'stars' : 'public';
        document.getElementById('edit-cf-btn').style.display = isCF ? 'block' : 'none';
        document.getElementById('audience-btn').classList.toggle('active', isCF);
    }

    // --- PUBLISH TO FIRESTORE ---
    async function publishDrop() {
        if (!currentUser || !state.type) return;
        triggerHaptic();
        
        els.shareBtn.innerHTML = `<span class="material-icons-round" style="animation:spin 1s linear infinite;">refresh</span> Sending...`;
        els.shareBtn.style.pointerEvents = 'none';

        try {
            // FULL PROFESSIONAL PROPRIETARY DATA FETCH
            const userDoc = await db.collection("users").doc(currentUser.uid).get();
            const userData = userDoc.exists ? userDoc.data() : {};
            
            const expiry = new Date();
            expiry.setHours(expiry.getHours() + 24);

            const payload = {
                uid: currentUser.uid,
                username: userData.username || currentUser.displayName || "User",
                displayName: userData.name || userData.displayName || currentUser.displayName || "User",
                pfp: userData.photoURL || userData.profilePic || currentUser.photoURL || "https://via.placeholder.com/150",
                verified: userData.verified === true ? true : false,
                
                type: state.type,
                audience: state.audience,
                
                // Music Data
                songName: state.song ? state.song.trackName : null,
                songArtist: state.song ? state.song.artistName : null,
                songPreview: state.song ? state.song.previewUrl : null,
                
                // Active status & Timestamps
                isActive: true,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                expiresAt: firebase.firestore.Timestamp.fromDate(expiry)
            };

            // Inject media-specific data
            if (state.type === 'image') {
                payload.mediaUrl = state.mediaUrl;
            } else if (state.type === 'video') {
                payload.mediaUrl = state.mediaUrl;
                payload.videoMeta = state.videoMeta;
            } else if (state.type === 'youtube') {
                payload.youtubeId = state.youtubeId;
            }

            // CRITICAL CLEANUP: Delete old likes and views subcollections before overwriting
            try {
                const dropRef = db.collection("drops").doc(currentUser.uid);
                const batch = db.batch();
                
                const likesSnap = await dropRef.collection("likes").get();
                likesSnap.forEach(doc => batch.delete(doc.ref));
                
                const viewsSnap = await dropRef.collection("views").get();
                viewsSnap.forEach(doc => batch.delete(doc.ref));
                
                if (likesSnap.size > 0 || viewsSnap.size > 0) {
                    await batch.commit();
                }
            } catch (cleanupErr) {
                console.warn("Failed to clean up old stats, proceeding to save anyway", cleanupErr);
            }

            // OVERWRITE the specific user's document
            await db.collection("drops").doc(currentUser.uid).set(payload);
            
            window.location.href = 'home.html';
            
        } catch (error) {
            console.error("Failed to post Drop:", error);
            alert("Failed to share Drop. Please try again.");
            els.shareBtn.innerHTML = `Share Drop <span class="material-icons-round" style="font-size: 20px; background: #000; color: #fff; border-radius: 50%; padding: 6px; margin-right: -4px;">arrow_forward</span>`;
            els.shareBtn.style.pointerEvents = 'auto';
        }
    }
</script>
</body>
</html>
